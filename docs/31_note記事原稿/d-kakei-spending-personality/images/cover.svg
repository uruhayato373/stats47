<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <linearGradient id="coverBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="670" fill="url(#coverBg)"/>

  <!-- Decorative circles -->
  <circle cx="180" cy="520" r="200" fill="#ea580c" opacity="0.06"/>
  <circle cx="1100" cy="130" r="260" fill="#3b82f6" opacity="0.06"/>
  <circle cx="640" cy="600" r="150" fill="#7c3aed" opacity="0.05"/>

  <!-- stats47 branding -->
  <text x="1248" y="36" text-anchor="end" font-size="18" fill="#475569">stats47</text>

  <!-- Subtitle top -->
  <text x="640" y="180" text-anchor="middle" font-size="24" fill="#94a3b8">家計調査データ分析</text>

  <!-- Main title line 1 -->
  <text x="640" y="270" text-anchor="middle" font-size="64" font-weight="900" fill="white">690品目でわかる</text>

  <!-- Main title line 2 with accent -->
  <text x="640" y="370" text-anchor="middle" font-size="72" font-weight="900" fill="#fb923c">「47都道府県の消費グセ」</text>

  <!-- Accent items -->
  <rect x="155" y="430" width="220" height="44" fill="#ea580c" rx="22" opacity="0.9"/>
  <text x="265" y="458" text-anchor="middle" font-size="18" font-weight="bold" fill="white">ラーメン1位 山形</text>

  <rect x="425" y="430" width="220" height="44" fill="#16a34a" rx="22" opacity="0.9"/>
  <text x="535" y="458" text-anchor="middle" font-size="18" font-weight="bold" fill="white">冷凍ぎょうざ1位 宮崎</text>

  <rect x="695" y="430" width="220" height="44" fill="#dc2626" rx="22" opacity="0.9"/>
  <text x="805" y="458" text-anchor="middle" font-size="18" font-weight="bold" fill="white">焼肉1位 高知</text>

  <rect x="965" y="430" width="220" height="44" fill="#2563eb" rx="22" opacity="0.9"/>
  <text x="1075" y="458" text-anchor="middle" font-size="18" font-weight="bold" fill="white">すし外食1位 富山</text>

