  <line x1="30" y1="98" x2="770" y2="98" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Row 1: ラーメン外食 - 山形 22,389円 -->
  <rect x="30" y="106" width="740" height="48" fill="white" rx="6" opacity="0.7"/>
