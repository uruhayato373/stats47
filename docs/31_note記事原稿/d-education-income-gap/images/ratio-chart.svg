<text x="300" y="50" text-anchor="middle" font-size="11" fill="#64748b">Q5（年収1,242万円）÷ Q1（年収262万円）の支出倍率 ── 2024年</text>

<!-- Plot background -->
<rect x="150" y="70" width="410" height="415" fill="white" stroke="#e2e8f0"/>

