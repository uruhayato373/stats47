<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670">
<style>
  text { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
</style>
<rect width="1280" height="670" fill="#ffffff"/>

<!-- Decorative circles -->
<circle cx="1100" cy="120" r="180" fill="#fef2f2" opacity="0.4"/>
<circle cx="180" cy="580" r="120" fill="#fef2f2" opacity="0.25"/>

<!-- stats47 watermark -->
<text x="1250" y="35" text-anchor="end" font-size="18" fill="#cbd5e1">stats47</text>

<!-- Lead text -->
<text x="640" y="120" text-anchor="middle" font-size="40" fill="#64748b">年収の差は4.74倍なのに</text>

<!-- Main catch -->
<text x="640" y="260" text-anchor="middle" font-size="180" font-weight="900" fill="#dc2626">56倍</text>

<!-- Subtitle -->
<text x="640" y="320" text-anchor="middle" font-size="26" fill="#94a3b8">── 塾代にかける金額の差 ──</text>

<!-- Mini comparison bars -->
<text x="306" y="419" text-anchor="end" font-size="15" fill="#475569">補習教育</text>
<rect x="320" y="400" width="542.3000000000001" height="28" fill="#dc2626" rx="4" opacity="0.85"/>
<text x="872.3000000000001" y="420" font-size="15" font-weight="bold" fill="#dc2626">56.1倍</text>
<text x="306" y="467" text-anchor="end" font-size="15" fill="#475569">教育全体</text>
<rect x="320" y="448" width="162.4" height="28" fill="#f97316" rx="4" opacity="0.85"/>
<text x="492.4" y="468" font-size="15" font-weight="bold" fill="#f97316">16.8倍</text>
<text x="306" y="515" text-anchor="end" font-size="15" fill="#475569">月謝類</text>
<rect x="320" y="496" width="61.86666666666667" height="28" fill="#3b82f6" rx="4" opacity="0.85"/>
<text x="391.8666666666667" y="516" font-size="15" font-weight="bold" fill="#3b82f6">6.4倍</text>

<!-- Reference line for income gap -->
<line x1="365.82" y1="382" x2="365.82" y2="532" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="365.82" y="376" text-anchor="middle" font-size="11" fill="#94a3b8">年収格差 4.74倍</text>

<!-- Separator -->
<line x1="400" y1="585" x2="880" y2="585" stroke="#e2e8f0" stroke-width="1"/>

<!-- Footer -->
<text x="640" y="620" text-anchor="middle" font-size="17" fill="#94a3b8">家計調査（2024年）年間収入五分位階級別 ── Q1 vs Q5</text>
<text x="640" y="648" text-anchor="middle" font-size="15" fill="#cbd5e1">stats47.jp</text>

</svg>