<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="440" fill="#FAFAFA"/>
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">VBA → Python 移植: Before / After (1 マクロあたり)</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#64748B">VBA 400 行を Python 280 行に移植する例</text>

  <!-- Before -->
  <text x="60" y="115" font-size="16" font-weight="bold" fill="#7F1D1D">Before</text>
  <text x="60" y="135" font-size="11" fill="#94A3B8">従来: 人間 100%</text>

  <!-- 時間バー: 1-2 週間 ≈ 60 時間 → 600 px のうち 600 px -->
  <rect x="160" y="100" width="580" height="60" fill="#DC2626" stroke="#7F1D1D" stroke-width="1.5" rx="3"/>
  <text x="280" y="125" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">業務理解 + コード読解</text>
  <text x="280" y="143" text-anchor="middle" font-size="11" fill="#FEE2E2">20-30 時間 (人間 100%)</text>

  <rect x="440" y="100" width="200" height="60" fill="#EA580C" stroke="#7C2D12" stroke-width="1.5" rx="3" opacity="0.85"/>
  <text x="540" y="125" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">手作業移植</text>
  <text x="540" y="143" text-anchor="middle" font-size="11" fill="#FED7AA">20 時間</text>

  <rect x="640" y="100" width="100" height="60" fill="#F59E0B" stroke="#78350F" stroke-width="1.5" rx="3" opacity="0.85"/>
  <text x="690" y="125" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">手動テスト</text>
  <text x="690" y="143" text-anchor="middle" font-size="11" fill="#FEF3C7">10 時間</text>

  <text x="755" y="135" font-size="18" fill="#7F1D1D" font-weight="bold">60h</text>

  <!-- Arrow + caption -->
  <text x="400" y="225" text-anchor="middle" font-size="24" fill="#2563EB" font-weight="bold">↓ 約 15× faster</text>

  <!-- After -->
  <text x="60" y="285" font-size="16" font-weight="bold" fill="#1E3A8A">After</text>
  <text x="60" y="305" font-size="11" fill="#94A3B8">Claude Code: 人間 30% + Claude 70%</text>

  <!-- 時間バー: 4 時間 → 40 px width  -->
  <rect x="160" y="260" width="15" height="60" fill="#9D174D" stroke="#831843" stroke-width="1.5" rx="3"/>
  <rect x="175" y="260" width="20" height="60" fill="#2563EB" stroke="#1E3A8A" stroke-width="1.5" rx="3"/>
  <rect x="195" y="260" width="5" height="60" fill="#059669" stroke="#064E3B" stroke-width="1.5" rx="3"/>

  <text x="215" y="295" font-size="18" fill="#1E3A8A" font-weight="bold">4h</text>

  <!-- Callout lines -->
  <line x1="167" y1="320" x2="167" y2="350" stroke="#475569" stroke-width="1"/>
  <text x="167" y="365" text-anchor="middle" font-size="11" fill="#9D174D" font-weight="bold">業務理解 (人間)</text>
  <text x="167" y="380" text-anchor="middle" font-size="10" fill="#475569">1.5 h</text>

  <line x1="185" y1="320" x2="185" y2="350" stroke="#475569" stroke-width="1"/>
  <text x="285" y="365" font-size="11" fill="#1E3A8A" font-weight="bold">Python 移植 (Claude) 2 h</text>

  <line x1="197" y1="320" x2="197" y2="350" stroke="#475569" stroke-width="1"/>
  <text x="285" y="383" font-size="11" fill="#059669" font-weight="bold">並列テスト (Claude) 0.5 h</text>

  <!-- スケール基準線 -->
  <line x1="160" y1="415" x2="740" y2="415" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="400" y="430" text-anchor="middle" font-size="11" fill="#94A3B8">スケール: 1 px = 0.1 時間 (Before / After 共通)</text>
</svg>
