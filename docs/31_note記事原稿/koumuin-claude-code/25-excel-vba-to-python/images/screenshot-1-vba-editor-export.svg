<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 432" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif">
  <rect width="760" height="432" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect width="760" height="46" rx="10" fill="#f1f5f9"/>
  <rect y="28" width="760" height="18" fill="#f1f5f9"/>
  <circle cx="26" cy="23" r="6" fill="#f87171"/>
  <circle cx="48" cy="23" r="6" fill="#fbbf24"/>
  <circle cx="70" cy="23" r="6" fill="#34d399"/>
  <text x="380" y="28" text-anchor="middle" font-size="12" fill="#64748b">Microsoft Visual Basic for Applications — 予算執行月次集計.xlsm</text>

  <!-- Project Explorer panel -->
  <rect x="20" y="62" width="260" height="288" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="20" y="62" width="260" height="26" rx="6" fill="#e2e8f0"/>
  <text x="34" y="80" font-size="12" font-weight="bold" fill="#334155">プロジェクト — VBAProject</text>
  <g font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-size="12.5" fill="#1e293b">
    <text x="36" y="112">📁 VBAProject (予算執行月次集計)</text>
    <text x="56" y="138" fill="#64748b">📂 Microsoft Excel Objects</text>
    <text x="76" y="162">📄 Sheet1 (集計)</text>
    <text x="76" y="186">📄 ThisWorkbook</text>
    <text x="56" y="212" fill="#64748b">📂 標準モジュール</text>
    <rect x="74" y="223" width="190" height="22" rx="3" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="80" y="238" font-weight="bold">📄 Module1</text>
    <text x="80" y="266">📄 Module2</text>
  </g>

  <!-- Code window (描画はコンテキストメニューより前) -->
  <rect x="300" y="62" width="440" height="288" rx="6" fill="#fbfbfd" stroke="#cbd5e1"/>
  <rect x="300" y="62" width="440" height="24" rx="6" fill="#e2e8f0"/>
  <text x="314" y="79" font-size="11.5" fill="#334155">Module1 (コード)</text>
  <g font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-size="12">
    <text x="314" y="110" fill="#7c3aed">Sub <tspan fill="#1e293b">MonthlyAggregate()</tspan></text>
    <text x="330" y="132" fill="#94a3b8">' 月次予算執行を科目別に集計</text>
    <text x="330" y="154" fill="#1e293b">Dim ws As Worksheet</text>
    <text x="330" y="176" fill="#1e293b">Set ws = Sheets("集計")</text>
    <text x="330" y="198" fill="#1e293b">For r = 2 To lastRow</text>
    <text x="346" y="220" fill="#1e293b">total = total + ws.Cells(r, 4)</text>
    <text x="330" y="242" fill="#1e293b">Next r</text>
    <text x="314" y="264" fill="#7c3aed">End Sub</text>
  </g>

  <!-- Context menu (最後に描画 = 最前面) -->
  <rect x="158" y="244" width="316" height="118" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="176" y="266" font-size="12.5" fill="#1e293b">表示</text>
  <rect x="160" y="276" width="312" height="24" fill="#2563eb"/>
  <text x="176" y="293" font-size="12.5" fill="#ffffff">ファイルのエクスポート(E)...</text>
  <text x="176" y="320" font-size="12.5" fill="#1e293b">ファイルのインポート(I)...</text>
  <text x="176" y="346" font-size="12.5" fill="#94a3b8">Module1 の解放(R)</text>

  <!-- caption -->
  <rect x="0" y="382" width="760" height="40" fill="#f1f5f9"/>
  <text x="24" y="407" font-size="13" fill="#475569">▲ VBA エディタで Module1 を右クリック、「ファイルのエクスポート」を選ぶ画面</text>
</svg>
