<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="380" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">VBA → Python 移植パイプライン (3-4 時間で 1 マクロ)</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Step 1: VBA マクロ -->
  <g>
    <rect x="20" y="80" width="120" height="60" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="80" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">VBA マクロ</text>
    <text x="80" y="125" text-anchor="middle" font-size="11" fill="#7F1D1D">.xlsm (400 行)</text>
  </g>
  <line x1="140" y1="110" x2="168" y2="110" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: エクスポート .bas -->
  <g>
    <rect x="170" y="80" width="130" height="60" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="235" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">エクスポート</text>
    <text x="235" y="123" text-anchor="middle" font-size="10" fill="#64748B">.bas / .cls / .frm</text>
  </g>
  <line x1="300" y1="110" x2="328" y2="110" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Shift_JIS 変換 -->
  <g>
    <rect x="330" y="80" width="140" height="60" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="400" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Shift_JIS → UTF-8</text>
    <text x="400" y="123" text-anchor="middle" font-size="10" fill="#92400E">nkf / iconv</text>
  </g>
  <line x1="470" y1="110" x2="498" y2="110" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: 業務理解 (Claude) -->
  <g>
    <rect x="500" y="80" width="160" height="60" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="580" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">業務理解 (Claude)</text>
    <text x="580" y="123" text-anchor="middle" font-size="10" fill="#0F766E">入力 / 処理 / 出力 / 不明点</text>
  </g>
  <line x1="660" y1="110" x2="688" y2="110" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: 人間が検証 -->
  <g>
    <rect x="690" y="80" width="180" height="60" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5" rx="6"/>
    <text x="780" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">人間が検証</text>
    <text x="780" y="123" text-anchor="middle" font-size="10" fill="#9D174D">業務担当者 + 後任者</text>
  </g>

  <!-- 折り返し矢印 -->
  <line x1="780" y1="140" x2="780" y2="170" stroke="#64748B" stroke-width="2"/>
  <line x1="780" y1="170" x2="80" y2="170" stroke="#64748B" stroke-width="2"/>
  <line x1="80" y1="170" x2="80" y2="195" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 6: Python 移植 -->
  <g>
    <rect x="20" y="200" width="160" height="60" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="6"/>
    <text x="100" y="223" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Python 移植 (Claude)</text>
    <text x="100" y="243" text-anchor="middle" font-size="10" fill="#1E40AF">openpyxl + pandas</text>
  </g>
  <line x1="180" y1="230" x2="208" y2="230" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 7: 並列テスト -->
  <g>
    <rect x="210" y="200" width="180" height="60" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5" rx="6"/>
    <text x="300" y="223" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">並列テスト</text>
    <text x="300" y="243" text-anchor="middle" font-size="10" fill="#4338CA">VBA vs Python 出力 diff</text>
  </g>
  <line x1="390" y1="230" x2="418" y2="230" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 8: 差分確認 -->
  <g>
    <rect x="420" y="200" width="160" height="60" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="500" y="223" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">差分確認</text>
    <text x="500" y="243" text-anchor="middle" font-size="10" fill="#92400E">VBA バグ / 移植ミス判定</text>
  </g>
  <line x1="580" y1="230" x2="608" y2="230" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 9: 廃止判定 or 本番運用 -->
  <g>
    <rect x="610" y="200" width="260" height="60" fill="#CCFBF1" stroke="#0F766E" stroke-width="2" rx="6"/>
    <text x="740" y="223" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">廃止判定 or 本番運用</text>
    <text x="740" y="243" text-anchor="middle" font-size="10" fill="#0F766E">Python 移行 / 業務見直し / 現状維持</text>
  </g>

  <!-- 凡例: 担当 -->
  <rect x="60" y="300" width="14" height="14" fill="#FCE7F3" stroke="#9D174D"/>
  <text x="80" y="312" font-size="11" fill="#1E293B">人間担当 (業務理解検証・廃止判定)</text>
  <rect x="320" y="300" width="14" height="14" fill="#CCFBF1" stroke="#0F766E"/>
  <text x="340" y="312" font-size="11" fill="#1E293B">Claude 担当 (コード移植・テスト)</text>
  <rect x="560" y="300" width="14" height="14" fill="#F1F5F9" stroke="#475569"/>
  <text x="580" y="312" font-size="11" fill="#1E293B">準備 (エクスポート・文字コード変換)</text>

  <text x="450" y="355" text-anchor="middle" font-size="11" fill="#94A3B8">Claude 70% (移植・テスト) + 人間 30% (業務理解・判定) で 1 マクロ 3-4 時間</text>
</svg>
