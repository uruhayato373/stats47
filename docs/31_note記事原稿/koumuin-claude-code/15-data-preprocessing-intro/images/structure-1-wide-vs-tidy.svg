<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="420" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">Wide 形式 と Tidy/Long 形式 の対比 (pandas melt で変換)</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748B">人間が見やすい横展開 vs 機械処理しやすい縦展開</text>

  <defs>
    <marker id="arr15b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1E3A8A"/>
    </marker>
  </defs>

  <!-- Left: Wide -->
  <g>
    <rect x="40" y="80" width="340" height="280" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="8"/>
    <text x="210" y="105" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400E">Wide 形式 (横展開)</text>
    <text x="210" y="123" text-anchor="middle" font-size="11" fill="#92400E">e-Stat 標準・人間が見やすい</text>

    <!-- Header -->
    <rect x="60" y="140" width="80" height="28" fill="#FFFFFF" stroke="#92400E" stroke-width="1"/>
    <text x="100" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E293B">都道府県</text>
    <rect x="140" y="140" width="73" height="28" fill="#FFFFFF" stroke="#92400E" stroke-width="1"/>
    <text x="177" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E293B">0-14歳</text>
    <rect x="213" y="140" width="73" height="28" fill="#FFFFFF" stroke="#92400E" stroke-width="1"/>
    <text x="250" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E293B">15-64歳</text>
    <rect x="286" y="140" width="74" height="28" fill="#FFFFFF" stroke="#92400E" stroke-width="1"/>
    <text x="323" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E293B">65歳以上</text>

    <!-- Row 1 -->
    <rect x="60" y="168" width="80" height="26" fill="#FFFFFF" stroke="#92400E" stroke-width="0.5"/>
    <text x="100" y="186" text-anchor="middle" font-size="11" fill="#1E293B">北海道</text>
    <rect x="140" y="168" width="73" height="26" fill="#FFFFFF" stroke="#92400E" stroke-width="0.5"/>
    <text x="177" y="186" text-anchor="middle" font-size="11" fill="#1E293B">580,000</text>
    <rect x="213" y="168" width="73" height="26" fill="#FFFFFF" stroke="#92400E" stroke-width="0.5"/>
    <text x="250" y="186" text-anchor="middle" font-size="11" fill="#1E293B">3,100,000</text>
    <rect x="286" y="168" width="74" height="26" fill="#FFFFFF" stroke="#92400E" stroke-width="0.5"/>
    <text x="323" y="186" text-anchor="middle" font-size="11" fill="#1E293B">1,670,000</text>

    <!-- Row 2 -->
    <rect x="60" y="194" width="80" height="26" fill="#FFFFFF" stroke="#92400E" stroke-width="0.5"/>
    <text x="100" y="212" text-anchor="middle" font-size="11" fill="#1E293B">青森県</text>
    <rect x="140" y="194" width="73" height="26" fill="#FFFFFF" stroke="#92400E" stroke-width="0.5"/>
    <text x="177" y="212" text-anchor="middle" font-size="11" fill="#1E293B">130,000</text>
    <rect x="213" y="194" width="73" height="26" fill="#FFFFFF" stroke="#92400E" stroke-width="0.5"/>
    <text x="250" y="212" text-anchor="middle" font-size="11" fill="#1E293B">700,000</text>
    <rect x="286" y="194" width="74" height="26" fill="#FFFFFF" stroke="#92400E" stroke-width="0.5"/>
    <text x="323" y="212" text-anchor="middle" font-size="11" fill="#1E293B">410,000</text>

    <!-- Row 3 -->
    <rect x="60" y="220" width="80" height="26" fill="#FFFFFF" stroke="#92400E" stroke-width="0.5"/>
    <text x="100" y="238" text-anchor="middle" font-size="11" fill="#1E293B">岩手県</text>
    <rect x="140" y="220" width="73" height="26" fill="#FFFFFF" stroke="#92400E" stroke-width="0.5"/>
    <text x="177" y="238" text-anchor="middle" font-size="11" fill="#1E293B">128,000</text>
    <rect x="213" y="220" width="73" height="26" fill="#FFFFFF" stroke="#92400E" stroke-width="0.5"/>
    <text x="250" y="238" text-anchor="middle" font-size="11" fill="#1E293B">690,000</text>
    <rect x="286" y="220" width="74" height="26" fill="#FFFFFF" stroke="#92400E" stroke-width="0.5"/>
    <text x="323" y="238" text-anchor="middle" font-size="11" fill="#1E293B">400,000</text>

    <text x="210" y="270" text-anchor="middle" font-size="11" fill="#92400E" font-style="italic">... 47 都道府県 × 3 列</text>

    <text x="60" y="298" font-size="11" font-weight="bold" fill="#1E293B">特性:</text>
    <text x="60" y="316" font-size="10" fill="#475569">○ 一覧視認性が高い</text>
    <text x="60" y="332" font-size="10" fill="#475569">○ 表として印刷しやすい</text>
    <text x="60" y="348" font-size="10" fill="#7F1D1D">× groupby/pivot で扱いにくい</text>
  </g>

  <!-- Arrow center -->
  <g>
    <line x1="390" y1="220" x2="510" y2="220" stroke="#1E3A8A" stroke-width="2.5" marker-end="url(#arr15b)"/>
    <text x="450" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E3A8A">pd.melt()</text>
    <text x="450" y="240" text-anchor="middle" font-size="10" fill="#1E3A8A">wide → long</text>
  </g>

  <!-- Right: Tidy/Long -->
  <g>
    <rect x="520" y="80" width="340" height="280" fill="#CCFBF1" stroke="#0F766E" stroke-width="2" rx="8"/>
    <text x="690" y="105" text-anchor="middle" font-size="15" font-weight="bold" fill="#0F766E">Tidy/Long 形式 (縦展開)</text>
    <text x="690" y="123" text-anchor="middle" font-size="11" fill="#0F766E">1 行 = 1 観測、1 列 = 1 変数</text>

    <!-- Header -->
    <rect x="540" y="140" width="100" height="28" fill="#FFFFFF" stroke="#0F766E" stroke-width="1"/>
    <text x="590" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E293B">都道府県</text>
    <rect x="640" y="140" width="120" height="28" fill="#FFFFFF" stroke="#0F766E" stroke-width="1"/>
    <text x="700" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E293B">年齢区分</text>
    <rect x="760" y="140" width="80" height="28" fill="#FFFFFF" stroke="#0F766E" stroke-width="1"/>
    <text x="800" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E293B">人口</text>

    <!-- Rows -->
    <rect x="540" y="168" width="100" height="22" fill="#FFFFFF" stroke="#0F766E" stroke-width="0.5"/>
    <text x="590" y="184" text-anchor="middle" font-size="10" fill="#1E293B">北海道</text>
    <rect x="640" y="168" width="120" height="22" fill="#FFFFFF" stroke="#0F766E" stroke-width="0.5"/>
    <text x="700" y="184" text-anchor="middle" font-size="10" fill="#1E293B">0-14歳</text>
    <rect x="760" y="168" width="80" height="22" fill="#FFFFFF" stroke="#0F766E" stroke-width="0.5"/>
    <text x="800" y="184" text-anchor="middle" font-size="10" fill="#1E293B">580,000</text>

    <rect x="540" y="190" width="100" height="22" fill="#FFFFFF" stroke="#0F766E" stroke-width="0.5"/>
    <text x="590" y="206" text-anchor="middle" font-size="10" fill="#1E293B">北海道</text>
    <rect x="640" y="190" width="120" height="22" fill="#FFFFFF" stroke="#0F766E" stroke-width="0.5"/>
    <text x="700" y="206" text-anchor="middle" font-size="10" fill="#1E293B">15-64歳</text>
    <rect x="760" y="190" width="80" height="22" fill="#FFFFFF" stroke="#0F766E" stroke-width="0.5"/>
    <text x="800" y="206" text-anchor="middle" font-size="10" fill="#1E293B">3,100,000</text>

    <rect x="540" y="212" width="100" height="22" fill="#FFFFFF" stroke="#0F766E" stroke-width="0.5"/>
    <text x="590" y="228" text-anchor="middle" font-size="10" fill="#1E293B">北海道</text>
    <rect x="640" y="212" width="120" height="22" fill="#FFFFFF" stroke="#0F766E" stroke-width="0.5"/>
    <text x="700" y="228" text-anchor="middle" font-size="10" fill="#1E293B">65歳以上</text>
    <rect x="760" y="212" width="80" height="22" fill="#FFFFFF" stroke="#0F766E" stroke-width="0.5"/>
    <text x="800" y="228" text-anchor="middle" font-size="10" fill="#1E293B">1,670,000</text>

    <rect x="540" y="234" width="100" height="22" fill="#FFFFFF" stroke="#0F766E" stroke-width="0.5"/>
    <text x="590" y="250" text-anchor="middle" font-size="10" fill="#1E293B">青森県</text>
    <rect x="640" y="234" width="120" height="22" fill="#FFFFFF" stroke="#0F766E" stroke-width="0.5"/>
    <text x="700" y="250" text-anchor="middle" font-size="10" fill="#1E293B">0-14歳</text>
    <rect x="760" y="234" width="80" height="22" fill="#FFFFFF" stroke="#0F766E" stroke-width="0.5"/>
    <text x="800" y="250" text-anchor="middle" font-size="10" fill="#1E293B">130,000</text>

    <text x="690" y="278" text-anchor="middle" font-size="11" fill="#0F766E" font-style="italic">... 47 × 3 = 141 行</text>

    <text x="540" y="298" font-size="11" font-weight="bold" fill="#1E293B">特性:</text>
    <text x="540" y="316" font-size="10" fill="#475569">◎ groupby/pivot/可視化と相性</text>
    <text x="540" y="332" font-size="10" fill="#475569">◎ 多次元への拡張が容易</text>
    <text x="540" y="348" font-size="10" fill="#7F1D1D">× そのままだと表として見にくい</text>
  </g>

  <text x="450" y="395" text-anchor="middle" font-size="11" fill="#94A3B8">集計・可視化の前段で必ず Tidy 化する → pivot_table で表示用 Wide に戻すのは最後</text>
  <text x="450" y="411" text-anchor="middle" font-size="10" fill="#94A3B8">pd.melt(id_vars=['都道府県'], value_vars=['0-14歳','15-64歳','65歳以上'], var_name='年齢区分', value_name='人口')</text>
</svg>
