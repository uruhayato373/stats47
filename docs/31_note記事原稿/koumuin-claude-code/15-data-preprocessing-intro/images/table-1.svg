<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 548 241" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif"><rect width="548" height="241" fill="#ffffff"/><rect x="0" y="0" width="208" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="26.0" font-size="15" font-weight="700" fill="#ffffff">✗ 漠然とした指示</text><rect x="208" y="0" width="340" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="222" y="26.0" font-size="15" font-weight="700" fill="#ffffff">◎ 具体的な目的</text><rect x="0" y="43" width="208" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="80.5" font-size="15" font-weight="400" fill="#1e293b">「人口データを整理して」</text><rect x="208" y="43" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="222" y="69.0" font-size="15" font-weight="400" fill="#1e293b">「47 都道府県の高齢化率を低い順に並べた C</text><text x="222" y="92.0" font-size="15" font-weight="400" fill="#1e293b">SV と棒グラフが欲しい」</text><rect x="0" y="109" width="208" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="146.5" font-size="15" font-weight="400" fill="#1e293b">「予算データ見たい」</text><rect x="208" y="109" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="222" y="135.0" font-size="15" font-weight="400" fill="#1e293b">「過去 10 年の本市の歳出推移を 5 大分類別</text><text x="222" y="158.0" font-size="15" font-weight="400" fill="#1e293b">にグラフ化、議会答弁用」</text><rect x="0" y="175" width="208" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="212.5" font-size="15" font-weight="400" fill="#1e293b">「人口推移知りたい」</text><rect x="208" y="175" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="222" y="201.0" font-size="15" font-weight="400" fill="#1e293b">「県内市町村の合計特殊出生率の 5 年移動平</text><text x="222" y="224.0" font-size="15" font-weight="400" fill="#1e293b">均を散布図に」</text><rect x="0.5" y="0.5" width="547" height="240" 