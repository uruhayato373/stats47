<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="420" fill="#FAFAFA"/>
  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">ダウンロードから地図化までの作業時間 3 ケース比較</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#64748B">47 都道府県データ → コロプレス地図生成までの所要時間</text>

  <!-- Y axis -->
  <line x1="160" y1="100" x2="160" y2="340" stroke="#475569" stroke-width="1.5"/>
  <line x1="160" y1="340" x2="820" y2="340" stroke="#475569" stroke-width="1.5"/>

  <!-- Y axis labels (0, 2h, 4h, 6h) -->
  <text x="148" y="344" text-anchor="end" font-size="11" fill="#475569">0</text>
  <line x1="155" y1="260" x2="160" y2="260" stroke="#475569" stroke-width="1"/>
  <text x="148" y="264" text-anchor="end" font-size="11" fill="#475569">2 時間</text>
  <line x1="155" y1="180" x2="160" y2="180" stroke="#475569" stroke-width="1"/>
  <text x="148" y="184" text-anchor="end" font-size="11" fill="#475569">4 時間</text>
  <line x1="155" y1="100" x2="160" y2="100" stroke="#475569" stroke-width="1"/>
  <text x="148" y="104" text-anchor="end" font-size="11" fill="#475569">6 時間</text>
  <line x1="160" y1="100" x2="820" y2="100" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Scale: 240px = 6h → 1h = 40px, baseline y=340 -->
  <!-- Bar 1: 6h → height=240, y=100 -->
  <rect x="220" y="100" width="130" height="240" fill="#DC2626" stroke="#7F1D1D" stroke-width="1.5" rx="3"/>
  <text x="285" y="225" text-anchor="middle" font-size="22" font-weight="bold" fill="#FFFFFF">6 時間</text>
  <text x="285" y="250" text-anchor="middle" font-size="12" fill="#FEE2E2">毎回フルコスト</text>

  <text x="285" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">(1) 手作業</text>
  <text x="285" y="378" text-anchor="middle" font-size="11" fill="#64748B">Excel + QGIS</text>
  <text x="285" y="394" text-anchor="middle" font-size="10" fill="#7F1D1D">DL → クレンジング</text>
  <text x="285" y="408" text-anchor="middle" font-size="10" fill="#7F1D1D">→ QGIS で結合・描画</text>

  <!-- Bar 2: 2h → height=80, y=260 -->
  <rect x="400" y="260" width="130" height="80" fill="#F59E0B" stroke="#92400E" stroke-width="1.5" rx="3"/>
  <text x="465" y="305" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFFFFF">2 時間</text>

  <text x="465" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">(2) Python 自力</text>
  <text x="465" y="378" text-anchor="middle" font-size="11" fill="#64748B">pandas + plotly</text>
  <text x="465" y="394" text-anchor="middle" font-size="10" fill="#92400E">スクリプト都度作成</text>
  <text x="465" y="408" text-anchor="middle" font-size="10" fill="#92400E">毎回 trial &amp; error</text>

  <!-- Bar 3: initial 2h + recurring 5min (essentially zero on this scale) -->
  <!-- Initial part: 2h = 80px → y=260 -->
  <rect x="580" y="260" width="130" height="80" fill="#94A3B8" stroke="#475569" stroke-width="1.5" rx="3"/>
  <text x="645" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">初回 2h</text>

  <!-- 2回目以降: ~5min ≒ 3px, on top -->
  <rect x="580" y="252" width="130" height="8" fill="#059669" stroke="#0F766E" stroke-width="1.5" rx="2"/>
  <text x="645" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F766E">+ 5 分 / 月</text>

  <text x="645" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">(3) Claude Code スキル化</text>
  <text x="645" y="378" text-anchor="middle" font-size="11" fill="#64748B">.claude/skills/stats/</text>
  <text x="645" y="394" text-anchor="middle" font-size="10" fill="#059669">初回構築後は 1 コマンド</text>
  <text x="645" y="408" text-anchor="middle" font-size="10" fill="#059669">原典突合検証も自動</text>

  <!-- Note -->
  <text x="490" y="86" text-anchor="middle" font-size="13" fill="#1E3A8A" font-weight="bold">→ 月次運用は 72 倍 / 24 倍の効率化 (5 分 vs 6 時間 / 2 時間)</text>
</svg>
