<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 883.8 324" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif"><rect width="883.8" height="324" fill="#ffffff"/><rect x="0" y="0" width="203.8" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="26.0" font-size="15" font-weight="700" fill="#ffffff">罠</text><rect x="203.8" y="0" width="340" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="217.8" y="26.0" font-size="15" font-weight="700" fill="#ffffff">例</text><rect x="543.8" y="0" width="340" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="557.8" y="26.0" font-size="15" font-weight="700" fill="#ffffff">検知方法</text><rect x="0" y="43" width="203.8" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="80.5" font-size="15" font-weight="400" fill="#1e293b">千人 vs 人</text><rect x="203.8" y="43" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="217.8" y="69.0" font-size="15" font-weight="400" fill="#1e293b">「東京都人口 14,000」(千人) を 14,000 人</text><text x="217.8" y="92.0" font-size="15" font-weight="400" fill="#1e293b">と読む</text><rect x="543.8" y="43" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="557.8" y="69.0" font-size="15" font-weight="400" fill="#1e293b">A1 セル / カラム名 / 元データの「単位」表記</text><text x="557.8" y="92.0" font-size="15" font-weight="400" fill="#1e293b">必読</text><rect x="0" y="109" width="203.8" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="135.0" font-size="15" font-weight="400" fill="#1e293b">年度 vs 暦年</text><rect x="203.8" y="109" width="340" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="217.8" y="135.0" font-size="15" font-weight="400" fill="#1e293b">「2024 年度予算」は 2024/4 〜 2025/3</text><rect x="543.8" y="109" width="340" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="557.8" y="135.0" font-size="15" font-weight="400" fill="#1e293b">列名に「年度」or「年」かを必ず確認</text><rect x="0" y="152" width="203.8" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="178.0" font-size="15" font-weight="400" fill="#1e293b">元号 vs 西暦</text><rect x="203.8" y="152" width="340" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="217.8" y="178.0" font-size="15" font-weight="400" fill="#1e293b">「令和 8 年 = 2026 年」を取り違え</text><rect x="543.8" y="152" width="340" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="557.8" y="178.0" font-size="15" font-weight="400" fill="#1e293b">変換表をプロジェクト固定で持つ</text><rect x="0" y="195" width="203.8" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="221.0" font-size="15" font-weight="400" fill="#1e293b">千円・百万円・円</text><rect x="203.8" y="195" width="340" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="217.8" y="221.0" font-size="15" font-weight="400" fill="#1e293b">予算データで頻発、合計が桁違いになる</text><rect x="543.8" y="195" width="340" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="557.8" y="221.0" font-size="15" font-weight="400" fill="#1e293b">金額列は必ず単位確認</text><rect x="0" y="238" width="203.8" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="264.0" font-size="15" font-weight="400" fill="#1e293b">推計値 vs 確定値</text><rect x="203.8" y="238" width="340" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="217.8" y="264.0" font-size="15" font-weight="400" fill="#1e293b">国勢調査年と中間年で精度が違う</text><rect x="543.8" y="238" width="340" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="557.8" y="264.0" font-size="15" font-weight="400" fill="#1e293b">データ取得元の説明書を読む</text><rect x="0" y="281" width="203.8" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="307.0" font-size="15" font-weight="400" fill="#1e293b">旧地域コード vs 新コード</text><rect x="203.8" y="281" width="340" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="217.8" y="307.0" font-size="15" font-weight="400" fill="#1e293b">市町村合併で同じ自治体が別 ID に</text><rect x="543.8" y="281" width="340" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="557.8" y="307.0" font-size="15" font-weight="400" fill="#1e293b">過去データには合併前後対応表が必須</text><rect x="0.5" y="0.5" width="882.8" height="323" fill="none" stroke="#cbd5e1" stroke-width="1.5"/></svg>