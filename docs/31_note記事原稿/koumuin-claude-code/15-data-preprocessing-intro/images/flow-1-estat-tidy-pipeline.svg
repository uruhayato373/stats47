<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="340" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">e-Stat CSV → tidy → 集計 → 検証 → 可視化のパイプライン</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748B">構造把握 / ffill+注釈除外 / 原典突合 / matplotlib・plotly</text>

  <defs>
    <marker id="arr15" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arr15red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- Row 1: top pipeline -->
  <!-- 1 e-Stat DL -->
  <g>
    <rect x="20" y="100" width="120" height="60" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="80" y="123" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">e-Stat CSV</text>
    <text x="80" y="143" text-anchor="middle" font-size="10" fill="#92400E">Shift_JIS / 結合セル</text>
  </g>
  <line x1="140" y1="130" x2="168" y2="130" stroke="#64748B" stroke-width="2" marker-end="url(#arr15)"/>

  <!-- 2 構造把握 -->
  <g>
    <rect x="170" y="100" width="130" height="60" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="6"/>
    <text x="235" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Claude Code</text>
    <text x="235" y="138" text-anchor="middle" font-size="10" fill="#1E40AF">head/info で構造把握</text>
    <text x="235" y="152" text-anchor="middle" font-size="10" fill="#1E40AF">skiprows 推定</text>
  </g>
  <line x1="300" y1="130" x2="328" y2="130" stroke="#64748B" stroke-width="2" marker-end="url(#arr15)"/>

  <!-- 3 整形コード生成 -->
  <g>
    <rect x="330" y="100" width="140" height="60" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="400" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">preprocess.py</text>
    <text x="400" y="138" text-anchor="middle" font-size="10" fill="#0F766E">ffill / 注釈除外</text>
    <text x="400" y="152" text-anchor="middle" font-size="10" fill="#0F766E">melt で wide→long</text>
  </g>
  <line x1="470" y1="130" x2="498" y2="130" stroke="#64748B" stroke-width="2" marker-end="url(#arr15)"/>

  <!-- 4 tidy CSV -->
  <g>
    <rect x="500" y="100" width="140" height="60" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5" rx="6"/>
    <text x="570" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">tidy データ</text>
    <text x="570" y="138" text-anchor="middle" font-size="10" fill="#4338CA">output/tidy/*.csv</text>
    <text x="570" y="152" text-anchor="middle" font-size="10" fill="#6366F1">1行=1観測</text>
  </g>
  <line x1="640" y1="130" x2="668" y2="130" stroke="#64748B" stroke-width="2" marker-end="url(#arr15)"/>

  <!-- 5 集計 -->
  <g>
    <rect x="670" y="100" width="140" height="60" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5" rx="6"/>
    <text x="740" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">集計</text>
    <text x="740" y="138" text-anchor="middle" font-size="10" fill="#9D174D">groupby / pivot_table</text>
    <text x="740" y="152" text-anchor="middle" font-size="10" fill="#9D174D">高齢化率等</text>
  </g>

  <!-- Down to verification -->
  <line x1="740" y1="160" x2="740" y2="190" stroke="#64748B" stroke-width="2" marker-end="url(#arr15)"/>

  <!-- 6 検証 (合計突合) -->
  <g>
    <rect x="640" y="195" width="200" height="60" fill="#FFFFFF" stroke="#DC2626" stroke-width="2" rx="6"/>
    <text x="740" y="216" text-anchor="middle" font-size="13" font-weight="bold" fill="#7F1D1D">検証: 原典との突合</text>
    <text x="740" y="234" text-anchor="middle" font-size="10" fill="#DC2626">expected_total と差分</text>
    <text x="740" y="248" text-anchor="middle" font-size="10" fill="#DC2626">0.1% 超で assert 失敗</text>
  </g>

  <!-- 7 可視化 -->
  <line x1="640" y1="225" x2="412" y2="225" stroke="#64748B" stroke-width="2" marker-end="url(#arr15)"/>
  <g>
    <rect x="220" y="195" width="190" height="60" fill="#FFFFFF" stroke="#059669" stroke-width="2.5" rx="6"/>
    <text x="315" y="216" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">可視化</text>
    <text x="315" y="234" text-anchor="middle" font-size="10" fill="#059669">matplotlib / plotly</text>
    <text x="315" y="248" text-anchor="middle" font-size="10" fill="#059669">グラフ / コロプレス</text>
  </g>

  <!-- Output / 提出 -->
  <line x1="315" y1="255" x2="315" y2="280" stroke="#64748B" stroke-width="2" marker-end="url(#arr15)"/>
  <g>
    <rect x="180" y="285" width="270" height="34" fill="#F1F5F9" stroke="#475569" stroke-width="1" rx="6"/>
    <text x="315" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">議会答弁資料 / 首長レク資料</text>
  </g>

  <text x="450" y="330" text-anchor="middle" font-size="11" fill="#94A3B8">検証 NG → 整形ロジック修正へ戻る (assert 1 件でも CI 失敗)</text>
</svg>
