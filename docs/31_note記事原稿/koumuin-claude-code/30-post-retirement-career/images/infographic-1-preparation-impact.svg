<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="440" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">在職中準備の有無による退職後年収比較 (4 領域別)</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748B">準備 0 vs 3 セット (note / 講演 / GitHub) / 体感値 / 単位: 万円</text>

  <!-- Y axis -->
  <line x1="100" y1="80" x2="100" y2="320" stroke="#475569" stroke-width="1.5"/>
  <line x1="100" y1="320" x2="870" y2="320" stroke="#475569" stroke-width="1.5"/>

  <text x="50" y="200" font-size="11" fill="#64748B" transform="rotate(-90,50,200)">年収 (万円)</text>

  <!-- Y ticks: 0-900, 240px → 30万/8px -->
  <line x1="96" y1="320" x2="104" y2="320" stroke="#475569" stroke-width="1"/>
  <text x="92" y="324" text-anchor="end" font-size="10" fill="#64748B">0</text>
  <line x1="96" y1="293" x2="104" y2="293" stroke="#475569" stroke-width="1"/>
  <text x="92" y="297" text-anchor="end" font-size="10" fill="#64748B">100</text>
  <line x1="96" y1="266" x2="104" y2="266" stroke="#475569" stroke-width="1"/>
  <text x="92" y="270" text-anchor="end" font-size="10" fill="#64748B">200</text>
  <line x1="96" y1="240" x2="104" y2="240" stroke="#475569" stroke-width="1"/>
  <text x="92" y="244" text-anchor="end" font-size="10" fill="#64748B">300</text>
  <line x1="96" y1="213" x2="104" y2="213" stroke="#475569" stroke-width="1"/>
  <text x="92" y="217" text-anchor="end" font-size="10" fill="#64748B">400</text>
  <line x1="96" y1="186" x2="104" y2="186" stroke="#475569" stroke-width="1"/>
  <text x="92" y="190" text-anchor="end" font-size="10" fill="#64748B">500</text>
  <line x1="96" y1="160" x2="104" y2="160" stroke="#475569" stroke-width="1"/>
  <text x="92" y="164" text-anchor="end" font-size="10" fill="#64748B">600</text>
  <line x1="96" y1="133" x2="104" y2="133" stroke="#475569" stroke-width="1"/>
  <text x="92" y="137" text-anchor="end" font-size="10" fill="#64748B">700</text>
  <line x1="96" y1="106" x2="104" y2="106" stroke="#475569" stroke-width="1"/>
  <text x="92" y="110" text-anchor="end" font-size="10" fill="#64748B">800</text>
  <line x1="96" y1="80" x2="104" y2="80" stroke="#475569" stroke-width="1"/>
  <text x="92" y="84" text-anchor="end" font-size="10" fill="#64748B">900</text>

  <!-- 4 領域 各 2 本 (準備 0 / 3 セット) -->
  <!-- 1px ≈ 3.75万 / 100万 = 26.67px -->

  <!-- 民間DX: 0=500 / 3セット=800 -->
  <rect x="140" y="187" width="50" height="133" fill="#CBD5E1" stroke="#475569" stroke-width="1" rx="3"/>
  <text x="165" y="181" text-anchor="middle" font-size="11" fill="#475569" font-weight="bold">500</text>
  <rect x="195" y="107" width="50" height="213" fill="#2563EB" stroke="#1E3A8A" stroke-width="1.5" rx="3"/>
  <text x="220" y="101" text-anchor="middle" font-size="11" fill="#1E3A8A" font-weight="bold">800</text>
  <text x="192" y="345" text-anchor="middle" font-size="11" fill="#1E293B" font-weight="bold">民間 DX</text>
  <text x="192" y="360" text-anchor="middle" font-size="10" fill="#1E3A8A">差 +300</text>

  <!-- GovTech: 0=450 / 3=750 -->
  <rect x="320" y="200" width="50" height="120" fill="#CBD5E1" stroke="#475569" stroke-width="1" rx="3"/>
  <text x="345" y="194" text-anchor="middle" font-size="11" fill="#475569" font-weight="bold">450</text>
  <rect x="375" y="120" width="50" height="200" fill="#059669" stroke="#0F766E" stroke-width="1.5" rx="3"/>
  <text x="400" y="114" text-anchor="middle" font-size="11" fill="#0F766E" font-weight="bold">750</text>
  <text x="372" y="345" text-anchor="middle" font-size="11" fill="#1E293B" font-weight="bold">GovTech</text>
  <text x="372" y="360" text-anchor="middle" font-size="10" fill="#0F766E">差 +300</text>

  <!-- NPO顧問: 0=200 / 3=450 -->
  <rect x="500" y="267" width="50" height="53" fill="#CBD5E1" stroke="#475569" stroke-width="1" rx="3"/>
  <text x="525" y="261" text-anchor="middle" font-size="11" fill="#475569" font-weight="bold">200</text>
  <rect x="555" y="200" width="50" height="120" fill="#F59E0B" stroke="#92400E" stroke-width="1.5" rx="3"/>
  <text x="580" y="194" text-anchor="middle" font-size="11" fill="#92400E" font-weight="bold">450</text>
  <text x="552" y="345" text-anchor="middle" font-size="11" fill="#1E293B" font-weight="bold">NPO 顧問</text>
  <text x="552" y="360" text-anchor="middle" font-size="10" fill="#92400E">差 +250</text>

  <!-- 大学実務家: 0=300 / 3=650 -->
  <rect x="680" y="240" width="50" height="80" fill="#CBD5E1" stroke="#475569" stroke-width="1" rx="3"/>
  <text x="705" y="234" text-anchor="middle" font-size="11" fill="#475569" font-weight="bold">300</text>
  <rect x="735" y="147" width="50" height="173" fill="#9D174D" stroke="#831843" stroke-width="1.5" rx="3"/>
  <text x="760" y="141" text-anchor="middle" font-size="11" fill="#831843" font-weight="bold">650</text>
  <text x="732" y="345" text-anchor="middle" font-size="11" fill="#1E293B" font-weight="bold">大学実務家教員</text>
  <text x="732" y="360" text-anchor="middle" font-size="10" fill="#9D174D">差 +350</text>

  <!-- Legend -->
  <g transform="translate(140,385)">
    <rect x="0" y="0" width="16" height="16" fill="#CBD5E1" stroke="#475569" stroke-width="1"/>
    <text x="22" y="13" font-size="11" fill="#1E293B">準備 0 (退職時点で動き出す)</text>
    <rect x="240" y="0" width="16" height="16" fill="#2563EB"/>
    <text x="262" y="13" font-size="11" fill="#1E293B">準備 3 セット (note + 講演 + GitHub)</text>
  </g>

  <text x="450" y="425" text-anchor="middle" font-size="11" fill="#1E3A8A" font-weight="bold">★ 10 年累積差額: 約 3,000 万 (4 領域平均 +300 万 × 10 年)。準備コストは時間のみで実費はほぼゼロ</text>
</svg>
