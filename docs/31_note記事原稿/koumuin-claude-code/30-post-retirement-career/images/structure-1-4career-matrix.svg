<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="480" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">公務員退職後キャリア 4 領域 (年収 × 勤務形態 × 準備の必要度)</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748B">準備の必要度: ★ 少 → ★★★★ 多 / 年収レンジは正規雇用ベース</text>

  <!-- Table header -->
  <rect x="40" y="80" width="220" height="40" fill="#1E293B" rx="4"/>
  <text x="150" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">領域</text>
  <rect x="270" y="80" width="200" height="40" fill="#1E293B" rx="4"/>
  <text x="370" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">年収レンジ</text>
  <rect x="480" y="80" width="200" height="40" fill="#1E293B" rx="4"/>
  <text x="580" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">勤務形態</text>
  <rect x="690" y="80" width="170" height="40" fill="#0F766E" rx="4"/>
  <text x="775" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">在職中準備の必要度</text>

  <!-- Row 1: 民間 DX -->
  <rect x="40" y="130" width="220" height="80" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="4"/>
  <text x="150" y="158" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E3A8A">民間 DX</text>
  <text x="150" y="178" text-anchor="middle" font-size="11" fill="#475569">大手 SIer / コンサル</text>
  <text x="150" y="195" text-anchor="middle" font-size="10" fill="#64748B">行政営業 / DX 推進職</text>

  <rect x="270" y="130" width="200" height="80" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="370" y="170" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">600 - 900 万</text>
  <text x="370" y="190" text-anchor="middle" font-size="10" fill="#64748B">役職次第で 1,000 超え</text>

  <rect x="480" y="130" width="200" height="80" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="580" y="165" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="bold">正社員</text>
  <text x="580" y="185" text-anchor="middle" font-size="10" fill="#64748B">フルタイム / 通勤型</text>

  <rect x="690" y="130" width="170" height="80" fill="#FEF3C7" stroke="#92400E" stroke-width="1" rx="4"/>
  <text x="775" y="165" text-anchor="middle" font-size="16" fill="#92400E" font-weight="bold">★ ★ ★</text>
  <text x="775" y="185" text-anchor="middle" font-size="10" fill="#475569">自治体実績 + 業界知識</text>

  <!-- Row 2: GovTech スタートアップ -->
  <rect x="40" y="220" width="220" height="80" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="4"/>
  <text x="150" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#0F766E">GovTech スタートアップ</text>
  <text x="150" y="268" text-anchor="middle" font-size="11" fill="#475569">行政向け SaaS / 内資</text>
  <text x="150" y="285" text-anchor="middle" font-size="10" fill="#64748B">PdM / カスタマーサクセス</text>

  <rect x="270" y="220" width="200" height="80" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="370" y="260" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">500 - 800 万</text>
  <text x="370" y="280" text-anchor="middle" font-size="10" fill="#64748B">+ ストックオプション</text>

  <rect x="480" y="220" width="200" height="80" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="580" y="255" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="bold">正社員 / 業務委託</text>
  <text x="580" y="275" text-anchor="middle" font-size="10" fill="#64748B">リモート可</text>

  <rect x="690" y="220" width="170" height="80" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="4"/>
  <text x="775" y="255" text-anchor="middle" font-size="16" fill="#DC2626" font-weight="bold">★ ★ ★ ★</text>
  <text x="775" y="275" text-anchor="middle" font-size="10" fill="#475569">業界人脈 + 技術発信</text>

  <!-- Row 3: NPO 顧問 -->
  <rect x="40" y="310" width="220" height="80" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="4"/>
  <text x="150" y="338" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400E">NPO 顧問</text>
  <text x="150" y="358" text-anchor="middle" font-size="11" fill="#475569">行政連携 NPO / 財団</text>
  <text x="150" y="375" text-anchor="middle" font-size="10" fill="#64748B">事務局長 / アドバイザー</text>

  <rect x="270" y="310" width="200" height="80" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="370" y="350" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">200 - 500 万</text>
  <text x="370" y="370" text-anchor="middle" font-size="10" fill="#64748B">複数兼務で積み上げ</text>

  <rect x="480" y="310" width="200" height="80" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="580" y="345" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="bold">非常勤 / 業務委託</text>
  <text x="580" y="365" text-anchor="middle" font-size="10" fill="#64748B">週 2-3 / 時間自由</text>

  <rect x="690" y="310" width="170" height="80" fill="#CCFBF1" stroke="#0F766E" stroke-width="1" rx="4"/>
  <text x="775" y="345" text-anchor="middle" font-size="16" fill="#0F766E" font-weight="bold">★ ★</text>
  <text x="775" y="365" text-anchor="middle" font-size="10" fill="#475569">在職中の連携実績</text>

  <!-- Row 4: 大学実務家教員 -->
  <rect x="40" y="400" width="220" height="80" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5" rx="4"/>
  <text x="150" y="428" text-anchor="middle" font-size="14" font-weight="bold" fill="#9D174D">大学実務家教員</text>
  <text x="150" y="448" text-anchor="middle" font-size="11" fill="#475569">公共政策大学院</text>
  <text x="150" y="465" text-anchor="middle" font-size="10" fill="#64748B">特任准教授 / 客員</text>

  <rect x="270" y="400" width="200" height="80" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="370" y="440" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">400 - 700 万</text>
  <text x="370" y="460" text-anchor="middle" font-size="10" fill="#64748B">講演 / 寄稿で上積み</text>

  <rect x="480" y="400" width="200" height="80" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="580" y="435" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="bold">正社員 / 非常勤</text>
  <text x="580" y="455" text-anchor="middle" font-size="10" fill="#64748B">講義 + 研究時間</text>

  <rect x="690" y="400" width="170" height="80" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="4"/>
  <text x="775" y="435" text-anchor="middle" font-size="16" fill="#DC2626" font-weight="bold">★ ★ ★ ★</text>
  <text x="775" y="455" text-anchor="middle" font-size="10" fill="#475569">論文 / 著書 + 学位</text>
</svg>
