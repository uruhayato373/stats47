<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="360" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">退職後キャリア準備タイムライン (在職中 → 退職 → 3 ヶ月後)</text>

  <defs>
    <marker id="arr30-1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Timeline -->
  <line x1="60" y1="170" x2="860" y2="170" stroke="#CBD5E1" stroke-width="3"/>

  <!-- Milestones markers -->
  <circle cx="160" cy="170" r="8" fill="#2563EB" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="360" cy="170" r="8" fill="#F59E0B" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="540" cy="170" r="8" fill="#DC2626" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="680" cy="170" r="8" fill="#1E293B" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="820" cy="170" r="8" fill="#059669" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Stage 1: Year 1-3 在職中の準備 -->
  <g>
    <rect x="60" y="80" width="200" height="70" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="6"/>
    <text x="160" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E3A8A">① 在職中の準備</text>
    <text x="160" y="123" text-anchor="middle" font-size="11" fill="#1E293B">Year 1-3</text>
    <text x="160" y="140" text-anchor="middle" font-size="10" fill="#475569">note / 講演 / GitHub の 3 セット</text>
  </g>
  <text x="160" y="200" text-anchor="middle" font-size="11" fill="#1E3A8A" font-weight="bold">退職 5+ 年前</text>

  <!-- Stage 2: 動き始める -->
  <g>
    <rect x="260" y="80" width="200" height="70" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="360" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">② 動き始める</text>
    <text x="360" y="123" text-anchor="middle" font-size="11" fill="#1E293B">退職 5 年前</text>
    <text x="360" y="140" text-anchor="middle" font-size="10" fill="#475569">求人定期チェック + 人脈構築</text>
  </g>
  <text x="360" y="200" text-anchor="middle" font-size="11" fill="#92400E" font-weight="bold">転職市場の相場感を掴む</text>

  <!-- Stage 3: 退職 1 年前 -->
  <g>
    <rect x="440" y="80" width="200" height="70" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5" rx="6"/>
    <text x="540" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#DC2626">③ 退職 1 年前</text>
    <text x="540" y="123" text-anchor="middle" font-size="11" fill="#1E293B">面接 / 退職金試算</text>
    <text x="540" y="140" text-anchor="middle" font-size="10" fill="#475569">複数オファー比較 + 家族合意</text>
  </g>
  <text x="540" y="200" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="bold">最終意思決定の年</text>

  <!-- Stage 4: 退職 -->
  <g>
    <rect x="600" y="80" width="160" height="70" fill="#1E293B" rx="6"/>
    <text x="680" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">④ 退職</text>
    <text x="680" y="123" text-anchor="middle" font-size="11" fill="#FFFFFF">Day 0</text>
    <text x="680" y="140" text-anchor="middle" font-size="10" fill="#CBD5E1">退職金 / 年金確定</text>
  </g>
  <text x="680" y="200" text-anchor="middle" font-size="11" fill="#1E293B" font-weight="bold">退職の日</text>

  <!-- Stage 5: 新組織立ち上がり 3 ヶ月 -->
  <g>
    <rect x="720" y="80" width="180" height="70" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="810" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#0F766E">⑤ 新組織立ち上がり</text>
    <text x="810" y="123" text-anchor="middle" font-size="11" fill="#1E293B">+ 3 ヶ月</text>
    <text x="810" y="140" text-anchor="middle" font-size="10" fill="#475569">期待調整 + 早期成果</text>
  </g>
  <text x="820" y="200" text-anchor="middle" font-size="11" fill="#0F766E" font-weight="bold">定着期</text>

  <!-- Bottom: do's per stage -->
  <text x="60" y="240" font-size="12" fill="#1E293B" font-weight="bold">各段階のアクション</text>

  <text x="60" y="262" font-size="10" fill="#1E3A8A">①</text>
  <text x="80" y="262" font-size="10" fill="#1E293B">月 1 note 発信 / 庁外講演 1 回 / GitHub に庁内事例公開</text>

  <text x="60" y="280" font-size="10" fill="#92400E">②</text>
  <text x="80" y="280" font-size="10" fill="#1E293B">転職エージェント登録 / 元同僚 / 派遣先 OB に近況連絡 / 業界カンファ参加</text>

  <text x="60" y="298" font-size="10" fill="#DC2626">③</text>
  <text x="80" y="298" font-size="10" fill="#1E293B">本格面接 2-3 社 / 退職金 / 年金 / 健保のシミュ / 配偶者と移行プラン合意</text>

  <text x="60" y="316" font-size="10" fill="#1E293B">④</text>
  <text x="80" y="316" font-size="10" fill="#1E293B">退職手続き / 引き継ぎ / 有給消化中に新環境準備 (PC / 名刺 / Slack)</text>

  <text x="60" y="334" font-size="10" fill="#0F766E">⑤</text>
  <text x="80" y="334" font-size="10" fill="#1E293B">90 日プラン作成 / 30 / 60 / 90 日で小さな成果 / 過去の役職を持ち込まない</text>
</svg>
