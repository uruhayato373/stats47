<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 396" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif">
  <rect width="760" height="396" rx="10" fill="#1e1e2e"/>
  <rect width="760" height="38" rx="10" fill="#313244"/>
  <rect y="20" width="760" height="18" fill="#313244"/>
  <circle cx="26" cy="19" r="6" fill="#f38ba8"/>
  <circle cx="48" cy="19" r="6" fill="#f9e2af"/>
  <circle cx="70" cy="19" r="6" fill="#a6e3a1"/>
  <text x="380" y="24" text-anchor="middle" font-size="12" fill="#9399b2">ターミナル — Claude Code</text>
  <g font-family="'SFMono-Regular','Menlo','Consolas','Courier New',monospace" font-size="14">
    <text x="24" y="74" fill="#89b4fa">&gt; <tspan fill="#cdd6f4">/skills</tspan></text>
    <text x="24" y="100" fill="#6c7086"># 利用可能なスキル: 4 件</text>

    <text x="24" y="138" fill="#a6e3a1">monthly-report</text>
    <text x="44" y="160" fill="#bac2de">課別の起案件数・決裁日数を月次集計し Excel に出力</text>

    <text x="24" y="200" fill="#a6e3a1">inquiry-aggregate</text>
    <text x="44" y="222" fill="#bac2de">議会・住民からの問い合わせを分類し件数を集計</text>

    <text x="24" y="262" fill="#a6e3a1">subsidy-consistency-check</text>
    <text x="44" y="284" fill="#bac2de">補助金交付実績の整合性を点検し不一致を抽出</text>

    <text x="24" y="324" fill="#a6e3a1">kessai-bo-monthly</text>
    <text x="44" y="346" fill="#bac2de">決裁簿を読み込み課別の平均決裁日数・滞留案件を集計</text>
  </g>

  <rect x="0" y="356" width="760" height="40" fill="#181825"/>
  <text x="24" y="381" font-size="13" fill="#bac2de">▲ /skills コマンドで 4 つの月次業務スキルが一覧表示された画面</text>
</svg>
