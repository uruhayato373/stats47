<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="440" fill="#FAFAFA"/>
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">Skills 化 3 条件判定 + 廃止検討フローチャート</text>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Start -->
  <g>
    <rect x="320" y="60" width="160" height="50" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="400" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">対象業務を 1 つ選ぶ</text>
  </g>
  <line x1="400" y1="110" x2="400" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Cond 1: 月 1 回以上 -->
  <g>
    <polygon points="400,135 530,170 400,205 270,170" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5"/>
    <text x="400" y="166" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">月 1 回以上?</text>
    <text x="400" y="184" text-anchor="middle" font-size="10" fill="#92400E">使用頻度の判定</text>
  </g>
  <!-- YES → down -->
  <line x1="400" y1="205" x2="400" y2="225" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="412" y="221" font-size="10" fill="#0F766E" font-weight="bold">YES</text>
  <!-- NO → right -->
  <line x1="530" y1="170" x2="600" y2="170" stroke="#DC2626" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="540" y="160" font-size="10" fill="#7F1D1D" font-weight="bold">NO</text>
  <rect x="605" y="148" width="180" height="44" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
  <text x="695" y="166" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F1D1D">廃止候補</text>
  <text x="695" y="182" text-anchor="middle" font-size="10" fill="#7F1D1D">年 1 回ならマニュアルで十分</text>

  <!-- Cond 2: 30 分以上 -->
  <g>
    <polygon points="400,230 530,265 400,300 270,265" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5"/>
    <text x="400" y="261" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">30 分以上?</text>
    <text x="400" y="279" text-anchor="middle" font-size="10" fill="#92400E">所要時間の判定</text>
  </g>
  <line x1="400" y1="300" x2="400" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="412" y="316" font-size="10" fill="#0F766E" font-weight="bold">YES</text>
  <line x1="530" y1="265" x2="600" y2="265" stroke="#DC2626" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="540" y="255" font-size="10" fill="#7F1D1D" font-weight="bold">NO</text>
  <rect x="605" y="243" width="180" height="44" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
  <text x="695" y="261" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F1D1D">Excel 関数で十分</text>
  <text x="695" y="277" text-anchor="middle" font-size="10" fill="#7F1D1D">5 分以下は ROI 出ない</text>

  <!-- Cond 3: 判断より作業 -->
  <g>
    <polygon points="400,325 545,360 400,395 255,360" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5"/>
    <text x="400" y="356" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">判断より作業?</text>
    <text x="400" y="374" text-anchor="middle" font-size="10" fill="#92400E">業務の性質判定</text>
  </g>
  <line x1="545" y1="360" x2="600" y2="360" stroke="#DC2626" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="555" y="350" font-size="10" fill="#7F1D1D" font-weight="bold">NO</text>
  <rect x="605" y="338" width="180" height="44" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
  <text x="695" y="356" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F1D1D">人間で処理</text>
  <text x="695" y="372" text-anchor="middle" font-size="10" fill="#7F1D1D">判断業務は AI に任せず</text>

  <!-- YES Goal -->
  <line x1="255" y1="360" x2="200" y2="360" stroke="#0F766E" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="220" y="350" font-size="10" fill="#0F766E" font-weight="bold">YES</text>
  <rect x="40" y="338" width="160" height="44" fill="#CCFBF1" stroke="#0F766E" stroke-width="2" rx="6"/>
  <text x="120" y="358" text-anchor="middle" font-size="12" font-weight="bold" fill="#0F766E">Skills 化候補</text>
  <text x="120" y="374" text-anchor="middle" font-size="10" fill="#1E293B">SKILL.md 起票</text>

  <text x="400" y="425" text-anchor="middle" font-size="11" fill="#94A3B8">3 条件すべて YES のみ Skills 化。1 つでも NO なら別ルート</text>
</svg>
