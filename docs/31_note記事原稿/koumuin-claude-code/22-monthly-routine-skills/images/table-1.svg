<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 903 241" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif"><rect width="903" height="241" fill="#ffffff"/><rect x="0" y="0" width="223" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="26.0" font-size="15" font-weight="700" fill="#ffffff">理由</text><rect x="223" y="0" width="340" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="237" y="26.0" font-size="15" font-weight="700" fill="#ffffff">内容</text><rect x="563" y="0" width="340" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="577" y="26.0" font-size="15" font-weight="700" fill="#ffffff">Claude Code での対応</text><rect x="0" y="43" width="223" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="80.5" font-size="15" font-weight="400" fill="#1e293b">発注予算がない</text><rect x="223" y="43" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="237" y="69.0" font-size="15" font-weight="400" fill="#1e293b">1 業務専用システム構築は予算化されない(数</text><text x="237" y="92.0" font-size="15" font-weight="400" fill="#1e293b">百万単位の話)</text><rect x="563" y="43" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="577" y="80.5" font-size="15" font-weight="400" fill="#1e293b">個人 Claude Code (月 $20-200) で完結</text><rect x="0" y="109" width="223" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="146.5" font-size="15" font-weight="400" fill="#1e293b">属人化が許容</text><rect x="223" y="109" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="237" y="146.5" font-size="15" font-weight="400" fill="#1e293b">「○○さんしか分からない」が現場で許される</text><rect x="563" y="109" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="577" y="135.0" font-size="15" font-weight="400" fill="#1e293b">SKILL.md がそのまま手順書になり属人化を解</text><text x="577" y="158.0" font-size="15" font-weight="400" fill="#1e293b">消</text><rect x="0" y="175" width="223" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="212.5" font-size="15" font-weight="400" fill="#1e293b">ツール選定の判断主体が不在</text><rect x="223" y="175" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="237" y="201.0" font-size="15" font-weight="400" fill="#1e293b">IT 部門は全庁システム優先、課単位の効率化</text><text x="237" y="224.0" font-size="15" font-weight="400" fill="#1e293b">は後回し</text><rect x="563" y="175" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="577" y="212.5" font-size="15" font-weight="400" fill="#1e293b">課単位 / 個人単位で開始、稟議不要</text><rect x="0.5" y="0.5" width="902" height="240" fill="none" stroke="#cbd5e1" stroke-width="1.5"/></svg>