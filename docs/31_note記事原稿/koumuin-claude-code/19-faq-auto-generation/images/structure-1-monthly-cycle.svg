<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="400" fill="#FAFAFA"/>
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">FAQ 生成の月次サイクル (差分検出で鮮度を保つ)</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#64748B">.claude/state/faq-history/ に前月クラスタを蓄積</text>

  <defs>
    <marker id="arr19s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- 当月 CSV -->
  <g>
    <rect x="40" y="100" width="160" height="60" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="120" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">当月 CSV</text>
    <text x="120" y="144" text-anchor="middle" font-size="10" fill="#64748B">inquiries-YYYY-MM.csv</text>
  </g>
  <line x1="200" y1="130" x2="228" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arr19s)"/>

  <!-- 当月クラスタ -->
  <g>
    <rect x="230" y="100" width="160" height="60" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="6"/>
    <text x="310" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">当月クラスタ</text>
    <text x="310" y="144" text-anchor="middle" font-size="10" fill="#1E40AF">代表質問 + 件数</text>
  </g>

  <!-- 前月クラスタ (memory) -->
  <g>
    <rect x="230" y="200" width="160" height="60" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5" stroke-dasharray="4,3" rx="6"/>
    <text x="310" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338CA">前月クラスタ</text>
    <text x="310" y="244" text-anchor="middle" font-size="10" fill="#4338CA">clusters-prev.json</text>
  </g>

  <!-- Diff 中央 -->
  <g>
    <rect x="430" y="150" width="140" height="60" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="8"/>
    <text x="500" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400E">差分検出</text>
    <text x="500" y="194" text-anchor="middle" font-size="10" fill="#92400E">diff 出力</text>
  </g>

  <line x1="390" y1="130" x2="465" y2="155" stroke="#475569" stroke-width="2" marker-end="url(#arr19s)"/>
  <line x1="390" y1="230" x2="465" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arr19s)"/>

  <!-- 3 flags -->
  <g>
    <rect x="610" y="80" width="160" height="46" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="690" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#0F766E">★新規クラスタ</text>
    <text x="690" y="118" text-anchor="middle" font-size="10" fill="#0F766E">FAQ 化推奨</text>
  </g>
  <g>
    <rect x="610" y="156" width="160" height="46" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5" rx="6"/>
    <text x="690" y="176" text-anchor="middle" font-size="12" font-weight="bold" fill="#9D174D">↑件数増加</text>
    <text x="690" y="194" text-anchor="middle" font-size="10" fill="#9D174D">優先度引上げ</text>
  </g>
  <g>
    <rect x="610" y="232" width="160" height="46" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="690" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#7F1D1D">↓陳腐化候補</text>
    <text x="690" y="270" text-anchor="middle" font-size="10" fill="#7F1D1D">30% 未満は確認</text>
  </g>

  <line x1="570" y1="170" x2="608" y2="100" stroke="#475569" stroke-width="1.5" marker-end="url(#arr19s)"/>
  <line x1="570" y1="180" x2="608" y2="178" stroke="#475569" stroke-width="1.5" marker-end="url(#arr19s)"/>
  <line x1="570" y1="190" x2="608" y2="252" stroke="#475569" stroke-width="1.5" marker-end="url(#arr19s)"/>

  <!-- Bottom: 公開判断 -->
  <g>
    <rect x="280" y="320" width="240" height="50" fill="#FFFFFF" stroke="#059669" stroke-width="2.5" rx="6"/>
    <text x="400" y="343" text-anchor="middle" font-size="13" font-weight="bold" fill="#065F46">公開判断 (所管課決裁)</text>
    <text x="400" y="361" text-anchor="middle" font-size="10" fill="#059669">差分付き diff-YYYY-MM.md を起案添付</text>
  </g>
  <line x1="500" y1="210" x2="450" y2="315" stroke="#475569" stroke-width="1.5" marker-end="url(#arr19s)"/>
</svg>
