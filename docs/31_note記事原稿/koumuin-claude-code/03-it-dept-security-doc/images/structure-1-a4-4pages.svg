<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="880" height="440" fill="#FAFAFA"/>
  <text x="440" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">提出資料の構成: A4 4 ページ</text>
  <text x="440" y="56" text-anchor="middle" font-size="12" fill="#64748B">情シス向け説明資料の標準レイアウト</text>

  <!-- Page 1 -->
  <g>
    <rect x="60" y="90" width="180" height="330" fill="#FFFFFF" stroke="#1E3A8A" stroke-width="2" rx="6"/>
    <rect x="60" y="90" width="180" height="40" fill="#1E3A8A" rx="6"/>
    <text x="150" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">P1: 概要</text>

    <text x="80" y="155" font-size="11" font-weight="bold" fill="#1E293B">件名・申請者</text>
    <text x="80" y="172" font-size="10" fill="#64748B">部署 / 氏名 / 日付</text>

    <text x="80" y="200" font-size="11" font-weight="bold" fill="#1E293B">ツール名</text>
    <text x="80" y="217" font-size="10" fill="#64748B">Claude Code</text>

    <text x="80" y="245" font-size="11" font-weight="bold" fill="#1E293B">利用目的</text>
    <text x="80" y="262" font-size="10" fill="#64748B">議事録要約 / 答弁案補助</text>

    <text x="80" y="290" font-size="11" font-weight="bold" fill="#1E293B">利用範囲</text>
    <text x="80" y="307" font-size="10" fill="#64748B">本人 1 名 (個人)</text>

    <text x="80" y="335" font-size="11" font-weight="bold" fill="#1E293B">利用環境</text>
    <text x="80" y="352" font-size="10" fill="#64748B">私物 PC + モバイル</text>

    <text x="80" y="380" font-size="11" font-weight="bold" fill="#1E293B">課金体系</text>
    <text x="80" y="397" font-size="10" fill="#64748B">個人契約 / 自費</text>
  </g>

  <!-- Page 2 -->
  <g>
    <rect x="260" y="90" width="180" height="330" fill="#FFFFFF" stroke="#92400E" stroke-width="2" rx="6"/>
    <rect x="260" y="90" width="180" height="40" fill="#92400E" rx="6"/>
    <text x="350" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">P2: データフロー</text>

    <text x="280" y="155" font-size="11" font-weight="bold" fill="#1E293B">送信するデータ</text>
    <text x="280" y="172" font-size="10" fill="#64748B">一般化された業務質問</text>
    <text x="280" y="187" font-size="10" fill="#64748B">匿名化テキスト</text>

    <text x="280" y="215" font-size="11" font-weight="bold" fill="#DC2626">送信しないデータ</text>
    <text x="280" y="232" font-size="10" fill="#64748B">住民個人情報</text>
    <text x="280" y="247" font-size="10" fill="#64748B">職員情報 / 内部資料</text>

    <text x="280" y="275" font-size="11" font-weight="bold" fill="#1E293B">Anthropic 取扱</text>
    <text x="280" y="292" font-size="10" fill="#64748B">学習利用なし (API)</text>
    <text x="280" y="307" font-size="10" fill="#64748B">SOC 2 / ISO 27001</text>
    <text x="280" y="322" font-size="10" fill="#64748B">TLS / AES-256</text>

    <text x="280" y="350" font-size="11" font-weight="bold" fill="#1E293B">データセンター</text>
    <text x="280" y="367" font-size="10" fill="#64748B">AWS US-East-1</text>

    <text x="280" y="395" font-size="11" font-weight="bold" fill="#1E293B">法管轄</text>
    <text x="280" y="412" font-size="10" fill="#64748B">米国 ToS 準拠</text>
  </g>

  <!-- Page 3 -->
  <g>
    <rect x="460" y="90" width="180" height="330" fill="#FFFFFF" stroke="#0F766E" stroke-width="2" rx="6"/>
    <rect x="460" y="90" width="180" height="40" fill="#0F766E" rx="6"/>
    <text x="550" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">P3: 監査・統制</text>

    <text x="480" y="155" font-size="11" font-weight="bold" fill="#1E293B">利用ログ</text>
    <text x="480" y="172" font-size="10" fill="#64748B">hooks → audit.tsv</text>

    <text x="480" y="200" font-size="11" font-weight="bold" fill="#1E293B">保管場所</text>
    <text x="480" y="217" font-size="10" fill="#64748B">~/.claude/logs/</text>
    <text x="480" y="232" font-size="10" fill="#64748B">私物 PC 内のみ</text>

    <text x="480" y="260" font-size="11" font-weight="bold" fill="#1E293B">保管期間</text>
    <text x="480" y="277" font-size="10" fill="#64748B">6 ヶ月 / cron 削除</text>

    <text x="480" y="305" font-size="11" font-weight="bold" fill="#DC2626">緊急停止</text>
    <text x="480" y="322" font-size="10" fill="#64748B">API キー無効化</text>
    <text x="480" y="337" font-size="10" fill="#64748B">5 分以内</text>

    <text x="480" y="365" font-size="11" font-weight="bold" fill="#1E293B">監査対応</text>
    <text x="480" y="382" font-size="10" fill="#64748B">過去 6 ヶ月 CSV 提出</text>

    <text x="480" y="405" font-size="10" fill="#64748B">月次: 利用件数を部内共有</text>
  </g>

  <!-- Page 4 -->
  <g>
    <rect x="660" y="90" width="180" height="330" fill="#FFFFFF" stroke="#9D174D" stroke-width="2" rx="6"/>
    <rect x="660" y="90" width="180" height="40" fill="#9D174D" rx="6"/>
    <text x="750" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">P4: 想定問答</text>

    <text x="680" y="155" font-size="11" font-weight="bold" fill="#1E293B">Q1. ChatGPT との違い</text>
    <text x="680" y="180" font-size="11" font-weight="bold" fill="#1E293B">Q2. 学習に使われるか</text>
    <text x="680" y="205" font-size="11" font-weight="bold" fill="#1E293B">Q3. 個人情報入力時</text>
    <text x="680" y="230" font-size="11" font-weight="bold" fill="#1E293B">Q4. 漏洩責任の所在</text>
    <text x="680" y="255" font-size="11" font-weight="bold" fill="#1E293B">Q5. 他自治体事例</text>
    <text x="680" y="280" font-size="11" font-weight="bold" fill="#1E293B">Q6. Anthropic 信頼性</text>
    <text x="680" y="305" font-size="11" font-weight="bold" fill="#1E293B">Q7. 庁内 NW 接続有無</text>
    <text x="680" y="330" font-size="11" font-weight="bold" fill="#1E293B">Q8. 業務時間中の扱い</text>
    <text x="680" y="355" font-size="11" font-weight="bold" fill="#1E293B">Q9. 課金トラブル</text>
    <text x="680" y="380" font-size="11" font-weight="bold" fill="#1E293B">Q10. やめさせ方</text>

    <text x="680" y="408" font-size="10" fill="#94A3B8">想定 10 問で追加質問半減</text>
  </g>
</svg>
