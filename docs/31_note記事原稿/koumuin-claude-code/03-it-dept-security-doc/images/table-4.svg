<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 594" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif"><rect width="650" height="594" fill="#ffffff"/><rect x="0" y="0" width="72" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="26.0" font-size="15" font-weight="700" fill="#ffffff">#</text><rect x="72" y="0" width="238" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="26.0" font-size="15" font-weight="700" fill="#ffffff">NG パターン</text><rect x="310" y="0" width="340" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="324" y="26.0" font-size="15" font-weight="700" fill="#ffffff">改善策</text><rect x="0" y="43" width="72" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="80.5" font-size="15" font-weight="400" fill="#1e293b">1</text><rect x="72" y="43" width="238" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="80.5" font-size="15" font-weight="400" fill="#1e293b">資料が 10 ページ超</text><rect x="310" y="43" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="324" y="69.0" font-size="15" font-weight="400" fill="#1e293b">5 ページ以内が読まれる限界。詳細は別添資</text><text x="324" y="92.0" font-size="15" font-weight="400" fill="#1e293b">料に分離</text><rect x="0" y="109" width="72" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="146.5" font-size="15" font-weight="400" fill="#1e293b">2</text><rect x="72" y="109" width="238" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="146.5" font-size="15" font-weight="400" fill="#1e293b">技術用語を多用</text><rect x="310" y="109" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="324" y="135.0" font-size="15" font-weight="400" fill="#1e293b">「LLM」「API」は OK、「hooks」「MCP」「</text><text x="324" y="158.0" font-size="15" font-weight="400" fill="#1e293b">Subagents」は注釈必須</text><rect x="0" y="175" width="72" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="212.5" font-size="15" font-weight="400" fill="#1e293b">3</text><rect x="72" y="175" width="238" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="212.5" font-size="15" font-weight="400" fill="#1e293b">「絶対安全」と言い切る</text><rect x="310" y="175" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="324" y="201.0" font-size="15" font-weight="400" fill="#1e293b">信頼を失う。「リスクとその対策」をペアで</text><text x="324" y="224.0" font-size="15" font-weight="400" fill="#1e293b">提示</text><rect x="0" y="241" width="72" height="89" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="290.0" font-size="15" font-weight="400" fill="#1e293b">4</text><rect x="72" y="241" width="238" height="89" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="290.0" font-size="15" font-weight="400" fill="#1e293b">責任分界の明文化が曖昧</text><rect x="310" y="241" width="340" height="89" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="324" y="267.0" font-size="15" font-weight="400" fill="#1e293b">後で揉める原因。「利用者の利用ルール遵守</text><text x="324" y="290.0" font-size="15" font-weight="400" fill="#1e293b">責任」と「組織の承認範囲の管理責任」の線</text><text x="324" y="313.0" font-size="15" font-weight="400" fill="#1e293b">引きを明記</text><rect x="0" y="330" width="72" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="367.5" font-size="15" font-weight="400" fill="#1e293b">5</text><rect x="72" y="330" width="238" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="367.5" font-size="15" font-weight="400" fill="#1e293b">継続報告の約束なし</text><rect x="310" y="330" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="324" y="356.0" font-size="15" font-weight="400" fill="#1e293b">3 ヶ月後の振り返り報告を約束すると通りや</text><text x="324" y="379.0" font-size="15" font-weight="400" fill="#1e293b">すい</text><rect x="0" y="396" width="72" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="433.5" font-size="15" font-weight="400" fill="#1e293b">6</text><rect x="72" y="396" width="238" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="433.5" font-size="15" font-weight="400" fill="#1e293b">他自治体事例ゼロ</text><rect x="310" y="396" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="324" y="422.0" font-size="15" font-weight="400" fill="#1e293b">横須賀市・神戸市等の AI 一般事例だけでも引</text><text x="324" y="445.0" font-size="15" font-weight="400" fill="#1e293b">用</text><rect x="0" y="462" width="72" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="499.5" font-size="15" font-weight="400" fill="#1e293b">7</text><rect x="72" y="462" width="238" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="499.5" font-size="15" font-weight="400" fill="#1e293b">撤退手順が「停止します」だけ</text><rect x="310" y="462" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="324" y="488.0" font-size="15" font-weight="400" fill="#1e293b">何分以内に / 誰が / どう停止するかを step-</text><text x="324" y="511.0" font-size="15" font-weight="400" fill="#1e293b">by-step で</text><rect x="0" y="528" width="72" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="565.5" font-size="15" font-weight="400" fill="#1e293b">8</text><rect x="72" y="528" width="238" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="565.5" font-size="15" font-weight="400" fill="#1e293b">監査ログの仕様が曖昧</text><rect x="310" y="528" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="324" y="554.0" font-size="15" font-weight="400" fill="#1e293b">実際の TSV サンプルを添付。「取れます」だ</text><text x="324" y="577.0" font-size="15" font-weight="400" fill="#1e293b">けは弱い</text><rect x="0.5" y="0.5" width="649" height="593" fill="none" stroke="#cbd5e1" stroke-width="1.5"/></svg>