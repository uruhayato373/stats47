<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="380" fill="#FAFAFA"/>
  <text x="400" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">情シスが気にする 3 点の比重</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748B">「データはどこへ / ログは取れるか / 止められるか」</text>

  <!-- Pie: 3 segments around center 240,220 r 110 -->
  <!-- データ送信先 45%, ログ取得 30%, 停止手順 25% -->
  <!-- 45% = 162deg, 30% = 108deg, 25% = 90deg -->
  <!-- start 0 (top), data 0→162 -->
  <path d="M 240 220 L 240 110 A 110 110 0 0 1 273.99 324.65 Z" fill="#DC2626" stroke="#FAFAFA" stroke-width="2"/>
  <!-- ログ 162→270 -->
  <path d="M 240 220 L 273.99 324.65 A 110 110 0 0 1 130 220 Z" fill="#2563EB" stroke="#FAFAFA" stroke-width="2"/>
  <!-- 停止 270→360 -->
  <path d="M 240 220 L 130 220 A 110 110 0 0 1 240 110 Z" fill="#059669" stroke="#FAFAFA" stroke-width="2"/>

  <!-- Labels on pie -->
  <text x="290" y="190" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">45%</text>
  <text x="220" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">30%</text>
  <text x="180" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">25%</text>

  <!-- Legend -->
  <g>
    <rect x="450" y="120" width="20" height="20" fill="#DC2626" rx="3"/>
    <text x="480" y="136" font-size="14" font-weight="bold" fill="#1E293B">データ送信先 (45%)</text>
    <text x="480" y="155" font-size="11" fill="#64748B">「住民情報・公文書はどこへ?」</text>
    <text x="480" y="170" font-size="11" fill="#64748B">→ Data Usage Policy で回答</text>

    <rect x="450" y="195" width="20" height="20" fill="#2563EB" rx="3"/>
    <text x="480" y="211" font-size="14" font-weight="bold" fill="#1E293B">ログ取得 (30%)</text>
    <text x="480" y="230" font-size="11" fill="#64748B">「監査ログ取れるか?」</text>
    <text x="480" y="245" font-size="11" fill="#64748B">→ hooks で audit.tsv 自動化</text>

    <rect x="450" y="270" width="20" height="20" fill="#059669" rx="3"/>
    <text x="480" y="286" font-size="14" font-weight="bold" fill="#1E293B">停止手順 (25%)</text>
    <text x="480" y="305" font-size="11" fill="#64748B">「何分以内に止められるか?」</text>
    <text x="480" y="320" font-size="11" fill="#64748B">→ API キー無効化 5 分以内</text>
  </g>

  <text x="400" y="365" text-anchor="middle" font-size="11" fill="#94A3B8">この 3 点に明確に答えれば 7 割は通る</text>
</svg>
