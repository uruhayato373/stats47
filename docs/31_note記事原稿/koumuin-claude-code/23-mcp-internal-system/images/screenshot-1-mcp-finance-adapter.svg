<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 522" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif">
  <rect width="760" height="522" rx="10" fill="#1e1e2e"/>
  <rect width="760" height="38" rx="10" fill="#313244"/>
  <rect y="20" width="760" height="18" fill="#313244"/>
  <circle cx="26" cy="19" r="6" fill="#f38ba8"/>
  <circle cx="48" cy="19" r="6" fill="#f9e2af"/>
  <circle cx="70" cy="19" r="6" fill="#a6e3a1"/>
  <text x="380" y="24" text-anchor="middle" font-size="12" fill="#9399b2">Claude Code — finance-adapter</text>
  <g font-family="'SFMono-Regular','Menlo','Consolas','Courier New',monospace" font-size="14">
    <text x="24" y="74" fill="#89b4fa">&gt; <tspan fill="#cdd6f4">2026 年 5 月の予算執行率を全課取得 → 30% 未満を抽出</tspan></text>
    <text x="24" y="106" fill="#f9e2af">⚙ Tool call: mcp__finance-adapter__get_budget_execution</text>
    <text x="44" y="130" fill="#6c7086">args: { year: 2026, month: 5 }</text>
    <text x="44" y="154" fill="#a6e3a1">→ budget-2026-05.csv 取得 (10 行)</text>
    <text x="24" y="190" fill="#cdd6f4">執行率 30% 未満の課:</text>
    <text x="44" y="216" fill="#bac2de">課コード  課名      当初予算   執行額    執行率</text>
    <text x="44" y="238" fill="#6c7086">─────────────────────────────────────────</text>
    <text x="44" y="262" fill="#bac2de">0001     総務課A   50,000,000  12,000,000  24%</text>
    <text x="44" y="286" fill="#bac2de">0002     企画推進室 30,000,000   8,000,000  27%</text>
    <text x="44" y="310" fill="#bac2de">0007     管財課    18,000,000   3,600,000  20%</text>
    <text x="24" y="346" fill="#cdd6f4">各課への執行加速提案:</text>
    <text x="44" y="372" fill="#a6e3a1">・0001 総務課A: 備品更新の前倒し発注で 6 月内 +8%</text>
    <text x="44" y="396" fill="#a6e3a1">・0002 企画推進室: 委託契約の概算払い切替を提案</text>
    <text x="44" y="420" fill="#a6e3a1">・0007 管財課: 修繕工事の入札スケジュール繰上げ</text>
  </g>
  <rect x="0" y="442" width="760" height="40" fill="#181825"/>
  <text x="24" y="467" font-size="13" fill="#bac2de">▲ MCP tool が CSV を取得し、執行率テーブルと加速提案を生成する対話画面</text>
