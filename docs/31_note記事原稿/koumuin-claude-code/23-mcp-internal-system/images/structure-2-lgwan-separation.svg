<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="420" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">LGWAN 環境での MCP 分離構成</text>
  <text x="450" y="55" text-anchor="middle" font-size="13" fill="#DC2626" font-weight="bold">リアルタイム連携は不可 — 日次バッチで割り切る</text>

  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- インターネット系 PC 領域 -->
  <g>
    <rect x="40" y="80" width="380" height="290" fill="#FFFFFF" stroke="#1E3A8A" stroke-width="2" stroke-dasharray="6,4" rx="8"/>
    <text x="60" y="105" font-size="13" font-weight="bold" fill="#1E3A8A">インターネット系 PC</text>
    <text x="60" y="120" font-size="10" fill="#64748B">個人席 or 分析用共用 PC</text>

    <!-- Claude Code 本体 -->
    <rect x="70" y="135" width="320" height="50" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="230" y="156" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Claude Code 本体 + MCP Client</text>
    <text x="230" y="174" text-anchor="middle" font-size="10" fill="#0F766E">Anthropic API (TLS)</text>

    <!-- 矢印 (stdio) -->
    <line x1="230" y1="185" x2="230" y2="205" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow3)"/>
    <text x="240" y="200" font-size="10" fill="#475569">stdio (外部通信なし)</text>

    <!-- MCP server -->
    <rect x="70" y="210" width="320" height="50" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="230" y="231" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">MCP Server (Node.js / アダプタ層)</text>
    <text x="230" y="249" text-anchor="middle" font-size="10" fill="#92400E">ホワイトリスト + マスキング + 監査ログ</text>

    <line x1="230" y1="260" x2="230" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow3)"/>
    <text x="240" y="275" font-size="10" fill="#475569">ファイル読み取り</text>

    <!-- data/ -->
    <rect x="70" y="285" width="320" height="50" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="6"/>
    <text x="230" y="306" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">data/ CSV (UTF-8 統一)</text>
    <text x="230" y="324" text-anchor="middle" font-size="10" fill="#1E40AF">LGWAN 系から日次エクスポート</text>
  </g>

  <!-- データ移送 -->
  <g>
    <rect x="440" y="200" width="80" height="80" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5" rx="6"/>
    <text x="480" y="230" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E293B">USB 二要素</text>
    <text x="480" y="246" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E293B">端末</text>
    <text x="480" y="266" text-anchor="middle" font-size="10" fill="#9D174D">1 日 1 回</text>
  </g>
  <line x1="395" y1="310" x2="430" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="395" y="295" font-size="10" fill="#475569">承認 1 回</text>
  <line x1="525" y1="240" x2="555" y2="240" stroke="#475569" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- LGWAN 系 PC 領域 -->
  <g>
    <rect x="560" y="80" width="320" height="290" fill="#FFFFFF" stroke="#7F1D1D" stroke-width="2" stroke-dasharray="6,4" rx="8"/>
    <text x="580" y="105" font-size="13" font-weight="bold" fill="#7F1D1D">LGWAN 系 PC</text>
    <text x="580" y="120" font-size="10" fill="#64748B">業務系ネットワーク</text>

    <!-- 庁内システム -->
    <rect x="590" y="135" width="260" height="35" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="720" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E293B">財務会計システム</text>
    <rect x="590" y="175" width="260" height="35" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="720" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E293B">文書管理システム</text>
    <rect x="590" y="215" width="260" height="35" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="720" y="238" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E293B">住基システム (集計のみ)</text>

    <!-- 日次バッチ -->
    <rect x="590" y="270" width="260" height="50" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="720" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E293B">日次 CSV エクスポートバッチ</text>
    <text x="720" y="308" text-anchor="middle" font-size="10" fill="#92400E">深夜実行 / UTF-8 変換 / マスキング</text>
  </g>

  <text x="450" y="400" text-anchor="middle" font-size="11" fill="#94A3B8">セキュリティ承認のハードルを大幅に下げる現実解 / リアルタイム性は諦める</text>
</svg>
