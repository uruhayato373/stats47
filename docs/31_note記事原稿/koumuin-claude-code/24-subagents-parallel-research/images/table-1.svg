dth="72" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="212.5" font-size="15" font-weight="400" fill="#1e293b">悪い</text><rect x="72" y="175" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="201.0" font-size="15" font-weight="400" fill="#1e293b">○○施策を調査して関連法令も見て補助金も探</text><text x="86" y="224.0" font-size="15" font-weight="400" fill="#1e293b">して議員説明資料も作って</text><rect x="412" y="175" width="103" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="212.5" font-size="15" font-weight="400" fill="#1e293b">×</text><rect x="0" y="241" width="72" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="278.5" font-size="15" font-weight="400" fill="#1e293b">悪い</text><rect x="72" y="241" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="267.0" font-size="15" font-weight="400" fill="#1e293b">A の結果を見て B の調査範囲を決めて C を判</text><text x="86" y="290.0" font-size="15" font-weight="400" fill="#1e293b">断</text><rect x="412" y="241" width="103" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="278.5" font-size="15" font-weight="400" fill="#1e293b">× (依存)</text><rect x="0.5" y="0.5" width="514" height="306" fill="none" stroke="#cbd5e1" stroke-width="1.5"/></svg>