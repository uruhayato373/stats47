<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="380" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">メインエージェント × Subagent の関係</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#64748B">独立コンテキスト / トークン消費は別カウント / Web ツール個別設定</text>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- メインセッション (Opus) -->
  <g>
    <rect x="320" y="80" width="260" height="90" fill="#E0E7FF" stroke="#4338CA" stroke-width="2" rx="8"/>
    <text x="450" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#4338CA">メインセッション (Opus)</text>
    <text x="450" y="130" text-anchor="middle" font-size="11" fill="#1E293B">Task ツール呼び出し</text>
    <text x="450" y="148" text-anchor="middle" font-size="10" fill="#475569">コンテキスト: フル / 結果統合担当</text>
    <text x="450" y="162" text-anchor="middle" font-size="10" fill="#475569">tools: 全て利用可</text>
  </g>

  <!-- 矢印 5 本 -->
  <line x1="450" y1="170" x2="120" y2="225" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="450" y1="170" x2="290" y2="225" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="450" y1="170" x2="450" y2="225" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="450" y1="170" x2="610" y2="225" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="450" y1="170" x2="780" y2="225" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="465" y="200" font-size="10" fill="#64748B">Task × 5 並列起動</text>

  <!-- 5 Subagent -->
  <g>
    <rect x="40" y="230" width="160" height="110" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="120" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Subagent 1</text>
    <text x="120" y="270" text-anchor="middle" font-size="10" fill="#0F766E">researcher-prefecture</text>
    <text x="120" y="288" text-anchor="middle" font-size="10" fill="#475569">model: Sonnet 4.5</text>
    <text x="120" y="304" text-anchor="middle" font-size="10" fill="#475569">tools: WebSearch</text>
    <text x="120" y="320" text-anchor="middle" font-size="10" fill="#475569">context: 独立</text>
    <text x="120" y="334" text-anchor="middle" font-size="10" fill="#64748B">Output: table only</text>
  </g>
  <g>
    <rect x="210" y="230" width="160" height="110" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="290" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Subagent 2</text>
    <text x="290" y="270" text-anchor="middle" font-size="10" fill="#0F766E">subsidy-finder</text>
    <text x="290" y="288" text-anchor="middle" font-size="10" fill="#475569">model: Sonnet 4.5</text>
    <text x="290" y="304" text-anchor="middle" font-size="10" fill="#475569">tools: WebSearch</text>
    <text x="290" y="320" text-anchor="middle" font-size="10" fill="#475569">context: 独立</text>
    <text x="290" y="334" text-anchor="middle" font-size="10" fill="#64748B">Output: table only</text>
  </g>
  <g>
    <rect x="380" y="230" width="160" height="110" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="460" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Subagent 3</text>
    <text x="460" y="270" text-anchor="middle" font-size="10" fill="#0F766E">law-researcher</text>
    <text x="460" y="288" text-anchor="middle" font-size="10" fill="#475569">model: Sonnet 4.5</text>
    <text x="460" y="304" text-anchor="middle" font-size="10" fill="#475569">tools: WebFetch</text>
    <text x="460" y="320" text-anchor="middle" font-size="10" fill="#475569">context: 独立</text>
    <text x="460" y="334" text-anchor="middle" font-size="10" fill="#64748B">Output: table only</text>
  </g>
  <g>
    <rect x="550" y="230" width="160" height="110" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="630" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Subagent 4</text>
    <text x="630" y="270" text-anchor="middle" font-size="10" fill="#0F766E">assembly-analyst</text>
    <text x="630" y="288" text-anchor="middle" font-size="10" fill="#475569">model: Sonnet 4.5</text>
    <text x="630" y="304" text-anchor="middle" font-size="10" fill="#475569">tools: WebSearch</text>
    <text x="630" y="320" text-anchor="middle" font-size="10" fill="#475569">context: 独立</text>
    <text x="630" y="334" text-anchor="middle" font-size="10" fill="#64748B">Output: table only</text>
  </g>
  <g>
    <rect x="720" y="230" width="160" height="110" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="800" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Subagent 5</text>
    <text x="800" y="270" text-anchor="middle" font-size="10" fill="#0F766E">resident-faq</text>
    <text x="800" y="288" text-anchor="middle" font-size="10" fill="#475569">model: Sonnet 4.5</text>
    <text x="800" y="304" text-anchor="middle" font-size="10" fill="#475569">tools: Read</text>
    <text x="800" y="320" text-anchor="middle" font-size="10" fill="#475569">context: 独立</text>
    <text x="800" y="334" text-anchor="middle" font-size="10" fill="#64748B">Output: table only</text>
  </g>

  <text x="450" y="365" text-anchor="middle" font-size="11" fill="#94A3B8">.claude/agents/&lt;name&gt;.md で各エージェントを定義 / Sonnet にすることでコスト最適化</text>
</svg>
