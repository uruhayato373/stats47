<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="440" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">日本語ローカル LLM 5 種の特徴比較 (5 軸レーダー)</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748B">網羅性 / 固有名詞保持 / 速度 / 誤情報少なさ / 日本語自然さ</text>

  <!-- Radar background: 5-axis pentagon centered at (300, 240), radius 130 -->
  <!-- 5 levels -->
  <g fill="none" stroke="#CBD5E1" stroke-width="0.5">
    <polygon points="300,110 423.7,200 376.3,346 223.7,346 176.3,200"/>
    <polygon points="300,136 398.9,208 360.9,326 239.1,326 201.1,208"/>
    <polygon points="300,162 374.2,216 345.6,306 254.4,306 225.8,216"/>
    <polygon points="300,188 349.5,224 330.3,286 269.7,286 250.5,224"/>
    <polygon points="300,214 324.7,232 314.9,266 285.1,266 275.3,232"/>
  </g>
  <!-- 5 axis lines -->
  <g stroke="#94A3B8" stroke-width="0.8">
    <line x1="300" y1="240" x2="300" y2="110"/>
    <line x1="300" y1="240" x2="423.7" y2="200"/>
    <line x1="300" y1="240" x2="376.3" y2="346"/>
    <line x1="300" y1="240" x2="223.7" y2="346"/>
    <line x1="300" y1="240" x2="176.3" y2="200"/>
  </g>

  <!-- Axis labels -->
  <text x="300" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">網羅性</text>
  <text x="438" y="200" font-size="12" font-weight="bold" fill="#1E293B">固有名詞</text>
  <text x="438" y="214" font-size="11" fill="#475569">保持率</text>
  <text x="390" y="360" font-size="12" font-weight="bold" fill="#1E293B">速度</text>
  <text x="210" y="360" text-anchor="end" font-size="12" font-weight="bold" fill="#1E293B">誤情報の少なさ</text>
  <text x="160" y="200" text-anchor="end" font-size="12" font-weight="bold" fill="#1E293B">日本語</text>
  <text x="160" y="214" text-anchor="end" font-size="11" fill="#475569">自然さ</text>

  <!-- Model polygons (scaled: r=26 per level, axis dir vectors normalized) -->
  <!-- axis vectors (unit): top(0,-1) NE(0.951,-0.309) SE(0.588,0.809) SW(-0.588,0.809) NW(-0.951,-0.309) -->
  <!-- Qwen 2.5 14B: 4,5,3,4,5 (best ja overall) -->
  <polygon points="300,136 423.7,200 345.6,306 239.1,326 176.3,200" fill="#2563EB" fill-opacity="0.18" stroke="#1E3A8A" stroke-width="2"/>
  <!-- Llama 3.1 Swallow 8B: 4,4,4,3,4 -->
  <polygon points="300,136 398.9,208 360.9,326 254.4,306 201.1,208" fill="#059669" fill-opacity="0.15" stroke="#0F766E" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Qwen 2.5 7B: 3,4,5,3,4 (fast) -->
  <polygon points="300,162 398.9,208 376.3,346 254.4,306 201.1,208" fill="#F59E0B" fill-opacity="0.15" stroke="#92400E" stroke-width="2" stroke-dasharray="2,2"/>
  <!-- Gemma 3 12B: 4,3,3,4,3 -->
  <polygon points="300,136 374.2,216 345.6,306 239.1,326 225.8,216" fill="#9D174D" fill-opacity="0.12" stroke="#831843" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Phi 4 14B: 3,3,3,5,3 (less ja, less halu) -->
  <polygon points="300,162 374.2,216 345.6,306 223.7,346 225.8,216" fill="#4338CA" fill-opacity="0.12" stroke="#312E81" stroke-width="2" stroke-dasharray="1,3"/>

  <!-- Legend -->
  <g>
    <rect x="560" y="120" width="320" height="240" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="6"/>
    <text x="720" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">凡例 (5 段階評価)</text>
    <line x1="570" y1="150" x2="870" y2="150" stroke="#CBD5E1"/>

    <rect x="580" y="160" width="22" height="10" fill="#2563EB" fill-opacity="0.4" stroke="#1E3A8A" stroke-width="2"/>
    <text x="608" y="170" font-size="12" font-weight="bold" fill="#1E3A8A">Qwen 2.5 14B</text>
    <text x="608" y="184" font-size="10" fill="#475569">日本語高精度の主力、要 16GB</text>

    <rect x="580" y="195" width="22" height="10" fill="#059669" fill-opacity="0.4" stroke="#0F766E" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="608" y="205" font-size="12" font-weight="bold" fill="#0F766E">Llama 3.1 Swallow 8B</text>
    <text x="608" y="219" font-size="10" fill="#475569">行政文書に強い、東工大継続学習</text>

    <rect x="580" y="230" width="22" height="10" fill="#F59E0B" fill-opacity="0.4" stroke="#92400E" stroke-width="2" stroke-dasharray="2,2"/>
    <text x="608" y="240" font-size="12" font-weight="bold" fill="#92400E">Qwen 2.5 7B</text>
    <text x="608" y="254" font-size="10" fill="#475569">8GB RAM で動く、推奨スターター</text>

    <rect x="580" y="265" width="22" height="10" fill="#9D174D" fill-opacity="0.4" stroke="#831843" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="608" y="275" font-size="12" font-weight="bold" fill="#9D174D">Gemma 3 12B</text>
    <text x="608" y="289" font-size="10" fill="#475569">複雑な要約 / 中程度の日本語</text>

    <rect x="580" y="300" width="22" height="10" fill="#4338CA" fill-opacity="0.4" stroke="#312E81" stroke-width="2" stroke-dasharray="1,3"/>
    <text x="608" y="310" font-size="12" font-weight="bold" fill="#312E81">Phi 4 14B</text>
    <text x="608" y="324" font-size="10" fill="#475569">推論強・誤情報少、日本語は弱め</text>

    <text x="720" y="350" text-anchor="middle" font-size="10" fill="#64748B">※ 議事録要約 50 件評価の概況</text>
  </g>

  <text x="450" y="410" text-anchor="middle" font-size="11" fill="#94A3B8">運用原則: 個人情報含有 × 単純作業 = ローカル LLM / 機密低 × 高度作業 = クラウド Claude</text>
  <text x="450" y="426" text-anchor="middle" font-size="10" fill="#94A3B8">中央 = 0 / 外周 = 5、面積が大きいほどバランス良</text>
</svg>
