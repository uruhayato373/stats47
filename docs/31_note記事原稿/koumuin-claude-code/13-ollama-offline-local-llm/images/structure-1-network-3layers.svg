<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="380" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">自治体 3 層ネットワーク × AI 利用可能性マトリクス</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748B">基幹系 / LGWAN 系 / インターネット系 で利用可能な AI 手段の違い</text>

  <!-- Header row -->
  <rect x="60" y="80" width="200" height="40" fill="#F1F5F9" stroke="#475569" stroke-width="1"/>
  <rect x="260" y="80" width="200" height="40" fill="#F1F5F9" stroke="#475569" stroke-width="1"/>
  <rect x="460" y="80" width="180" height="40" fill="#F1F5F9" stroke="#475569" stroke-width="1"/>
  <rect x="640" y="80" width="200" height="40" fill="#F1F5F9" stroke="#475569" stroke-width="1"/>
  <text x="160" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">ネットワーク層</text>
  <text x="360" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">扱うデータ</text>
  <text x="550" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">クラウド AI</text>
  <text x="740" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">ローカル LLM</text>

  <!-- Row 1: 基幹系 -->
  <rect x="60" y="120" width="200" height="80" fill="#FEE2E2" stroke="#475569" stroke-width="1"/>
  <rect x="260" y="120" width="200" height="80" fill="#FFFFFF" stroke="#475569" stroke-width="1"/>
  <rect x="460" y="120" width="180" height="80" fill="#FFFFFF" stroke="#475569" stroke-width="1"/>
  <rect x="640" y="120" width="200" height="80" fill="#CCFBF1" stroke="#475569" stroke-width="1"/>
  <text x="70" y="145" font-size="13" font-weight="bold" fill="#7F1D1D">基幹系</text>
  <text x="70" y="163" font-size="10" fill="#7F1D1D">マイナンバー利用事務系</text>
  <text x="70" y="180" font-size="10" fill="#7F1D1D">完全独立 / USB 禁止</text>
  <text x="270" y="145" font-size="11" fill="#1E293B">住民票・税・福祉</text>
  <text x="270" y="163" font-size="11" fill="#1E293B">国保・後期高齢</text>
  <text x="270" y="180" font-size="11" fill="#1E293B">マイナンバー含む</text>
  <text x="550" y="160" text-anchor="middle" font-size="26" font-weight="bold" fill="#DC2626">×</text>
  <text x="550" y="186" text-anchor="middle" font-size="10" fill="#7F1D1D">完全不可</text>
  <text x="740" y="160" text-anchor="middle" font-size="26" font-weight="bold" fill="#059669">◎</text>
  <text x="740" y="186" text-anchor="middle" font-size="10" fill="#0F766E">唯一の選択肢</text>

  <!-- Row 2: LGWAN 系 -->
  <rect x="60" y="200" width="200" height="80" fill="#FEF3C7" stroke="#475569" stroke-width="1"/>
  <rect x="260" y="200" width="200" height="80" fill="#FFFFFF" stroke="#475569" stroke-width="1"/>
  <rect x="460" y="200" width="180" height="80" fill="#FFFFFF" stroke="#475569" stroke-width="1"/>
  <rect x="640" y="200" width="200" height="80" fill="#CCFBF1" stroke="#475569" stroke-width="1"/>
  <text x="70" y="225" font-size="13" font-weight="bold" fill="#92400E">LGWAN 系</text>
  <text x="70" y="243" font-size="10" fill="#92400E">総合行政ネットワーク</text>
  <text x="70" y="260" font-size="10" fill="#92400E">自治体間専用網 / 外部遮断</text>
  <text x="270" y="225" font-size="11" fill="#1E293B">自治体間連携文書</text>
  <text x="270" y="243" font-size="11" fill="#1E293B">調定・補助金申請</text>
  <text x="270" y="260" font-size="11" fill="#1E293B">国・県との往復文書</text>
  <text x="550" y="240" text-anchor="middle" font-size="26" font-weight="bold" fill="#F59E0B">△</text>
  <text x="550" y="266" text-anchor="middle" font-size="10" fill="#92400E">原則不可 / 一部 API 可</text>
  <text x="740" y="240" text-anchor="middle" font-size="26" font-weight="bold" fill="#059669">◎</text>
  <text x="740" y="266" text-anchor="middle" font-size="10" fill="#0F766E">主力</text>

  <!-- Row 3: インターネット系 -->
  <rect x="60" y="280" width="200" height="70" fill="#DBEAFE" stroke="#475569" stroke-width="1"/>
  <rect x="260" y="280" width="200" height="70" fill="#FFFFFF" stroke="#475569" stroke-width="1"/>
  <rect x="460" y="280" width="180" height="70" fill="#FFFFFF" stroke="#475569" stroke-width="1"/>
  <rect x="640" y="280" width="200" height="70" fill="#FFFFFF" stroke="#475569" stroke-width="1"/>
  <text x="70" y="305" font-size="13" font-weight="bold" fill="#1E3A8A">インターネット系</text>
  <text x="70" y="323" font-size="10" fill="#1E3A8A">通常のインターネット</text>
  <text x="70" y="340" font-size="10" fill="#1E3A8A">Web 閲覧・庁内グループメール</text>
  <text x="270" y="305" font-size="11" fill="#1E293B">Web 検索・庁外メール</text>
  <text x="270" y="323" font-size="11" fill="#1E293B">広報資料・調査</text>
  <text x="270" y="340" font-size="11" fill="#1E293B">個人情報を含まない</text>
  <text x="550" y="315" text-anchor="middle" font-size="26" font-weight="bold" fill="#059669">◎</text>
  <text x="550" y="341" text-anchor="middle" font-size="10" fill="#0F766E">Claude/ChatGPT 推奨</text>
  <text x="740" y="315" text-anchor="middle" font-size="26" font-weight="bold" fill="#94A3B8">○</text>
  <text x="740" y="341" text-anchor="middle" font-size="10" fill="#475569">補助的</text>

  <text x="450" y="375" text-anchor="middle" font-size="11" fill="#94A3B8">基幹系の文書業務 (= 最も AI 効率化のニーズ) に刺さるのはローカル LLM 一択</text>
</svg>
