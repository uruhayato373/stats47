<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="340" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">Claude Code → litellm → Ollama: すべて localhost で完結</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748B">ANTHROPIC_BASE_URL=http://localhost:4000 で外部通信ゼロ</text>

  <defs>
    <marker id="arr13" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Localhost outer box -->
  <rect x="60" y="80" width="780" height="200" fill="none" stroke="#0F766E" stroke-width="2" stroke-dasharray="6,4" rx="8"/>
  <text x="80" y="105" font-size="12" fill="#0F766E" font-weight="bold">localhost — 物理通信なし、外部到達ゼロ</text>

  <!-- User input -->
  <g>
    <rect x="80" y="135" width="120" height="60" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="140" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">ユーザー入力</text>
    <text x="140" y="180" text-anchor="middle" font-size="11" fill="#64748B">プロンプト</text>
  </g>
  <line x1="200" y1="165" x2="228" y2="165" stroke="#64748B" stroke-width="2" marker-end="url(#arr13)"/>

  <!-- Claude Code -->
  <g>
    <rect x="230" y="135" width="140" height="60" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="6"/>
    <text x="300" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Claude Code</text>
    <text x="300" y="172" text-anchor="middle" font-size="10" fill="#1E40AF">ANTHROPIC_BASE_URL</text>
    <text x="300" y="186" text-anchor="middle" font-size="10" fill="#1E40AF">=http://localhost:4000</text>
  </g>
  <line x1="370" y1="165" x2="398" y2="165" stroke="#64748B" stroke-width="2" marker-end="url(#arr13)"/>

  <!-- litellm proxy -->
  <g>
    <rect x="400" y="135" width="140" height="60" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="470" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">litellm proxy</text>
    <text x="470" y="172" text-anchor="middle" font-size="10" fill="#92400E">port 4000</text>
    <text x="470" y="186" text-anchor="middle" font-size="10" fill="#92400E">Anthropic ↔ OpenAI 変換</text>
  </g>
  <line x1="540" y1="165" x2="568" y2="165" stroke="#64748B" stroke-width="2" marker-end="url(#arr13)"/>

  <!-- Ollama -->
  <g>
    <rect x="570" y="135" width="130" height="60" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="635" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Ollama</text>
    <text x="635" y="172" text-anchor="middle" font-size="10" fill="#0F766E">port 11434</text>
    <text x="635" y="186" text-anchor="middle" font-size="10" fill="#0F766E">OpenAI 互換 API</text>
  </g>
  <line x1="700" y1="165" x2="728" y2="165" stroke="#64748B" stroke-width="2" marker-end="url(#arr13)"/>

  <!-- Local model -->
  <g>
    <rect x="730" y="135" width="100" height="60" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5" rx="6"/>
    <text x="780" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">ローカル</text>
    <text x="780" y="172" text-anchor="middle" font-size="11" fill="#4338CA">モデル推論</text>
    <text x="780" y="186" text-anchor="middle" font-size="10" fill="#6366F1">Qwen 2.5 7B 等</text>
  </g>

  <!-- Return flow -->
  <text x="450" y="230" text-anchor="middle" font-size="11" fill="#0F766E" font-weight="bold">← 応答 (Anthropic API 形式に変換) ←</text>

  <!-- Output indicator -->
  <g>
    <rect x="320" y="245" width="260" height="28" fill="#FFFFFF" stroke="#059669" stroke-width="2" rx="6"/>
    <text x="450" y="264" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">Claude Code UI に応答表示</text>
  </g>

  <!-- External network = blocked -->
  <g>
    <line x1="450" y1="295" x2="450" y2="325" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3"/>
    <rect x="280" y="295" width="340" height="36" fill="none" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4,3" rx="6"/>
    <text x="450" y="318" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="bold">外部ネットワーク (Anthropic / OpenAI 等) には一切到達しない</text>
  </g>
</svg>
