  </g>
  <text x="694" y="26" font-size="11" fill="#f38ba8">Wi-Fi オフ</text>
  <g font-family="'SFMono-Regular','Menlo','Consolas','Courier New',monospace" font-size="14">
    <text x="24" y="74" fill="#6c7086"># ネットワーク切断 — 外部送信ゼロ</text>
    <text x="24" y="102" fill="#89b4fa">user@koumuin-mac ~ % <tspan fill="#cdd6f4">ollama run qwen2.5:7b \</tspan></text>
    <text x="44" y="124" fill="#cdd6f4">"総務省の文書管理規程の趣旨を 200 字以内で要約"</text>
    <text x="24" y="156" fill="#bac2de">文書管理規程は、行政文書の作成から保存・廃棄</text>
