  <circle cx="48" cy="19" r="6" fill="#f9e2af"/>
  <circle cx="70" cy="19" r="6" fill="#a6e3a1"/>
  <text x="350" y="24" text-anchor="middle" font-size="12" fill="#9399b2">ターミナル — Ollama ローカル推論</text>
  <g transform="translate(610,10)">
    <path d="M14 8 a13 13 0 0 1 26 0" fill="none" stroke="#6c7086" stroke-width="3" stroke-linecap="round"/>
    <path d="M19 14 a8 8 0 0 1 16 0" fill="none" stroke="#6c7086" stroke-width="3" stroke-linecap="round"/>
