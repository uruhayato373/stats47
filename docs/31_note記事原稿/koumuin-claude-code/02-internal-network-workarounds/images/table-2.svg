<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 443 175" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif"><rect width="443" height="175" fill="#ffffff"/><rect x="0" y="0" width="103" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="26.0" font-size="15" font-weight="700" fill="#ffffff">項目</text><rect x="103" y="0" width="340" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="117" y="26.0" font-size="15" font-weight="700" fill="#ffffff">内容</text><rect x="0" y="43" width="103" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="80.5" font-size="15" font-weight="400" fill="#1e293b">メリット</text><rect x="103" y="43" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="117" y="69.0" font-size="15" font-weight="400" fill="#1e293b">組織との衝突なし、自由度最大、稟議不要、</text><text x="117" y="92.0" font-size="15" font-weight="400" fill="#1e293b">即日開始可能</text><rect x="0" y="109" width="103" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="146.5" font-size="15" font-weight="400" fill="#1e293b">デメリット</text><rect x="103" y="109" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="117" y="135.0" font-size="15" font-weight="400" fill="#1e293b">自費、業務時間外の私的時間を使う、庁内デ</text><text x="117" y="158.0" font-size="15" font-weight="400" fill="#1e293b">ータを扱えない</text><rect x="0.5" y="0.5" width="442" height="174" fill="none" stroke="#cbd5e1" stroke-width="1.5"/></svg>