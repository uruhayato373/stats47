<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="880" height="400" fill="#FAFAFA"/>
  <text x="440" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">自治体ネットワーク 3 層分離 (αモデル) と Claude Code 通信</text>
  <text x="440" y="56" text-anchor="middle" font-size="12" fill="#64748B">api.anthropic.com / npm registry / GitHub への到達経路を可視化</text>

  <defs>
    <marker id="arr3l" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arr3lblock" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- LGWAN -->
  <g>
    <rect x="60" y="80" width="430" height="70" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="2" rx="6"/>
    <text x="80" y="110" font-size="14" font-weight="bold" fill="#7F1D1D">LGWAN 系</text>
    <text x="80" y="132" font-size="11" fill="#7F1D1D">人事給与・税務・住基ネット連携  /  外部接続なし</text>
  </g>
  <text x="500" y="125" font-size="13" fill="#DC2626" font-weight="bold">× 利用不可</text>

  <!-- 庁内系 -->
  <g>
    <rect x="60" y="170" width="430" height="70" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="6"/>
    <text x="80" y="200" font-size="14" font-weight="bold" fill="#92400E">庁内系</text>
    <text x="80" y="222" font-size="11" fill="#92400E">財務会計・文書管理・グループウェア  /  LGWAN 経由のみ</text>
  </g>
  <text x="500" y="215" font-size="13" fill="#DC2626" font-weight="bold">× 通常利用不可</text>

  <!-- インターネット系 -->
  <g>
    <rect x="60" y="260" width="430" height="70" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="2" rx="6"/>
    <text x="80" y="290" font-size="14" font-weight="bold" fill="#1E3A8A">インターネット系</text>
    <text x="80" y="312" font-size="11" fill="#1E3A8A">Web 閲覧・メール  /  プロキシ + ホワイトリスト</text>
  </g>
  <text x="500" y="305" font-size="13" fill="#92400E" font-weight="bold">△ 申請後のみ</text>

  <!-- Proxy -->
  <g>
    <rect x="600" y="170" width="220" height="160" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4" rx="6"/>
    <text x="710" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">プロキシ (許可リスト)</text>

    <rect x="620" y="210" width="180" height="28" fill="#DC2626" stroke="#7F1D1D" stroke-width="1" rx="3"/>
    <text x="710" y="229" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">api.anthropic.com ✗</text>

    <rect x="620" y="244" width="180" height="28" fill="#DC2626" stroke="#7F1D1D" stroke-width="1" rx="3"/>
    <text x="710" y="263" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">registry.npmjs.org ✗</text>

    <rect x="620" y="278" width="180" height="28" fill="#DC2626" stroke="#7F1D1D" stroke-width="1" rx="3"/>
    <text x="710" y="297" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">github.com ✗</text>
  </g>

  <!-- Arrow from internet zone to proxy -->
  <line x1="490" y1="295" x2="595" y2="250" stroke="#DC2626" stroke-width="2" marker-end="url(#arr3lblock)"/>
  <text x="510" y="288" font-size="10" fill="#DC2626">デフォルト遮断</text>

  <!-- Footer note -->
  <text x="440" y="365" text-anchor="middle" font-size="11" fill="#94A3B8">必要ドメインを情シスに追加申請するルートが「抜け道 2」</text>
  <text x="440" y="382" text-anchor="middle" font-size="11" fill="#94A3B8">LGWAN / 庁内系での Claude Code 利用は禁則 (3 層分離違反)</text>
</svg>
