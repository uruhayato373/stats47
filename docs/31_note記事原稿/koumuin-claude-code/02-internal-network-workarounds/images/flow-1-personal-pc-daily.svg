<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 290" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="290" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">私物 PC ルートのデイリーフロー</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#64748B">「庁内データを持ち出さない × 学んだ知見だけ業務に転用」</text>

  <defs>
    <marker id="arrpc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Step 1: 朝 自宅 -->
  <g>
    <rect x="40" y="100" width="150" height="80" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="115" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">朝 / 自宅</text>
    <text x="115" y="145" text-anchor="middle" font-size="11" fill="#92400E">iPhone テザリング</text>
    <text x="115" y="163" text-anchor="middle" font-size="11" fill="#92400E">私物 MacBook 起動</text>
  </g>
  <line x1="190" y1="140" x2="220" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrpc)"/>

  <!-- Step 2: 業務時間 -->
  <g>
    <rect x="225" y="100" width="160" height="80" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="305" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">業務時間 / 庁内</text>
    <text x="305" y="145" text-anchor="middle" font-size="11" fill="#64748B">通常業務 (PC は触らず)</text>
    <text x="305" y="163" text-anchor="middle" font-size="11" fill="#64748B">課題をメモに整理</text>
  </g>
  <line x1="385" y1="140" x2="415" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrpc)"/>

  <!-- Step 3: 業務時間外 -->
  <g>
    <rect x="420" y="100" width="180" height="80" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="6"/>
    <text x="510" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">業務時間外 / 自宅</text>
    <text x="510" y="145" text-anchor="middle" font-size="11" fill="#1E40AF">Claude Code で勉強</text>
    <text x="510" y="163" text-anchor="middle" font-size="11" fill="#1E40AF">一般化した質問のみ</text>
  </g>
  <line x1="600" y1="140" x2="630" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrpc)"/>

  <!-- Step 4: 知見蓄積 -->
  <g>
    <rect x="635" y="100" width="160" height="80" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="715" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">知見蓄積</text>
    <text x="715" y="145" text-anchor="middle" font-size="11" fill="#0F766E">個人 git に保存</text>
    <text x="715" y="163" text-anchor="middle" font-size="11" fill="#0F766E">プロンプト / スキル</text>
  </g>

  <!-- Loop back arrow -->
  <line x1="715" y1="180" x2="715" y2="220" stroke="#64748B" stroke-width="2"/>
  <line x1="715" y1="220" x2="305" y2="220" stroke="#64748B" stroke-width="2"/>
  <line x1="305" y1="220" x2="305" y2="185" stroke="#64748B" stroke-width="2" marker-end="url(#arrpc)"/>
  <text x="510" y="237" text-anchor="middle" font-size="11" fill="#64748B" font-weight="bold">翌日: 一般化された知見だけを業務に転用</text>

  <!-- Rules footer -->
  <rect x="40" y="252" width="820" height="28" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1" rx="4"/>
  <text x="450" y="271" text-anchor="middle" font-size="11" fill="#7F1D1D" font-weight="bold">NG: 議事録テキスト / 個人名 / 住民情報 / 部内検討資料 / 決裁前起案</text>
</svg>
