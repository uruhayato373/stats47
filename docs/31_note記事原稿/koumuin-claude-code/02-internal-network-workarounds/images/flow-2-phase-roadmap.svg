<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="300" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">組織導入までのロードマップ (3 フェーズ)</text>

  <defs>
    <marker id="arrrm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Phase 1 -->
  <g>
    <rect x="40" y="80" width="240" height="180" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="2" rx="8"/>
    <circle cx="80" cy="115" r="20" fill="#2563EB"/>
    <text x="80" y="121" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">1</text>
    <text x="115" y="121" font-size="15" font-weight="bold" fill="#1E3A8A">私物 PC で習熟</text>

    <text x="60" y="160" font-size="12" fill="#1E293B">対象: 私物 PC + テザリング</text>
    <text x="60" y="180" font-size="12" fill="#1E293B">期間: 6 ヶ月</text>
    <text x="60" y="200" font-size="12" fill="#1E293B">目的: 業務改善ノウハウ獲得</text>
    <text x="60" y="225" font-size="11" fill="#475569" font-style="italic">組織交渉コスト: ゼロ</text>
    <text x="60" y="245" font-size="11" fill="#475569" font-style="italic">所要: 自分 1 人 / 自費</text>
  </g>

  <line x1="280" y1="170" x2="310" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrrm)"/>

  <!-- Phase 2 -->
  <g>
    <rect x="320" y="80" width="240" height="180" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="8"/>
    <circle cx="360" cy="115" r="20" fill="#D97706"/>
    <text x="360" y="121" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">2</text>
    <text x="395" y="121" font-size="15" font-weight="bold" fill="#92400E">業務改善実績の蓄積</text>

    <text x="340" y="160" font-size="12" fill="#1E293B">対象: 議事録 30分→5分 等</text>
    <text x="340" y="180" font-size="12" fill="#1E293B">期間: 3-6 ヶ月</text>
    <text x="340" y="200" font-size="12" fill="#1E293B">目的: 定量効果の証拠化</text>
    <text x="340" y="225" font-size="11" fill="#475569" font-style="italic">公開できる事例を作る</text>
    <text x="340" y="245" font-size="11" fill="#475569" font-style="italic">所要: 自分 + 上司理解</text>
  </g>

  <line x1="560" y1="170" x2="590" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrrm)"/>

  <!-- Phase 3 -->
  <g>
    <rect x="600" y="80" width="260" height="180" fill="#CCFBF1" stroke="#0F766E" stroke-width="2" rx="8"/>
    <circle cx="640" cy="115" r="20" fill="#059669"/>
    <text x="640" y="121" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">3</text>
    <text x="675" y="121" font-size="15" font-weight="bold" fill="#0F766E">庁内導入を相談</text>

    <text x="620" y="160" font-size="12" fill="#1E293B">対象: 情シス + 上司</text>
    <text x="620" y="180" font-size="12" fill="#1E293B">期間: 2-6 ヶ月</text>
    <text x="620" y="200" font-size="12" fill="#1E293B">目的: ドメイン許可 + 規程</text>
    <text x="620" y="225" font-size="11" fill="#475569" font-style="italic">実績ベースで説得</text>
    <text x="620" y="245" font-size="11" fill="#475569" font-style="italic">所要: 情シス / 法務 / 監査</text>
  </g>

  <!-- Bottom note -->
  <text x="450" y="290" text-anchor="middle" font-size="11" fill="#94A3B8">※ Phase 1 をスキップして Phase 3 に飛ばないこと (実績ゼロでは情シスを説得できない)</text>
</svg>
