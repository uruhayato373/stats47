<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="300" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">会社 PC 本格利用までのロードマップ (3 フェーズ)</text>

  <defs>
    <marker id="arrrm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Phase 1 -->
  <g>
    <rect x="40" y="80" width="240" height="180" fill="#E0F2FE" stroke="#0369A1" stroke-width="2" rx="8"/>
    <circle cx="80" cy="115" r="20" fill="#0EA5E9"/>
    <text x="80" y="121" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">1</text>
    <text x="115" y="121" font-size="15" font-weight="bold" fill="#0369A1">私物 PC で実例づくり</text>

    <text x="60" y="158" font-size="12" fill="#1E293B">対象: 私物 PC + テザリング</text>
    <text x="60" y="178" font-size="12" fill="#1E293B">期間: 1-3 ヶ月</text>
    <text x="60" y="198" font-size="12" fill="#1E293B">目的: 業務改善の実例を作る</text>
    <text x="60" y="223" font-size="11" fill="#475569" font-style="italic">位置づけ: 早期着手・繋ぎ</text>
    <text x="60" y="243" font-size="11" fill="#475569" font-style="italic">所要: 自分 1 人 / 自費</text>
  </g>

  <line x1="280" y1="170" x2="310" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrrm)"/>

  <!-- Phase 2 -->
  <g>
    <rect x="320" y="80" width="240" height="180" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="8"/>
    <circle cx="360" cy="115" r="20" fill="#D97706"/>
    <text x="360" y="121" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">2</text>
    <text x="395" y="121" font-size="15" font-weight="bold" fill="#92400E">情シスにプロキシ申請</text>

    <text x="340" y="158" font-size="12" fill="#1E293B">対象: 情シス + 上司</text>
    <text x="340" y="178" font-size="12" fill="#1E293B">期間: 2-3 ヶ月</text>
    <text x="340" y="198" font-size="12" fill="#1E293B">目的: ドメイン許可 + 規程</text>
    <text x="340" y="223" font-size="11" fill="#475569" font-style="italic">Phase 1 の実例を交渉材料に</text>
    <text x="340" y="243" font-size="11" fill="#475569" font-style="italic">セキュリティ評価書を添付</text>
  </g>

  <line x1="560" y1="170" x2="590" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrrm)"/>

  <!-- Phase 3 -->
  <g>
    <rect x="600" y="80" width="260" height="180" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="2.5" rx="8"/>
    <circle cx="640" cy="115" r="20" fill="#1E3A8A"/>
    <text x="640" y="121" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">3</text>
    <text x="675" y="121" font-size="15" font-weight="bold" fill="#1E3A8A">会社 PC で本格利用</text>

    <text x="620" y="158" font-size="12" fill="#1E293B">対象: 会社（庁内）PC</text>
    <text x="620" y="178" font-size="12" fill="#1E293B">期間: 継続運用</text>
    <text x="620" y="198" font-size="12" fill="#1E293B">設定: プロキシ 3 点セット</text>
    <text x="620" y="223" font-size="11" fill="#1E3A8A" font-style="italic">業務データを扱える本格運用</text>
    <text x="620" y="243" font-size="11" fill="#1E3A8A" font-weight="bold" font-style="italic">★ これがゴール</text>
  </g>

  <!-- Bottom note -->
  <text x="450" y="290" text-anchor="middle" font-size="11" fill="#94A3B8">※ ゴールは会社 PC での本格利用。Phase 1 は繋ぎで、最終的に会社 PC（Phase 3）へ移行する</text>
</svg>
