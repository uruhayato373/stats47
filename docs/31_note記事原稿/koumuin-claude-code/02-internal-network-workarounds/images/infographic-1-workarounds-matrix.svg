<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="880" height="380" fill="#FAFAFA"/>
  <text x="440" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">3 つの抜け道 比較マトリクス</text>
  <text x="440" y="56" text-anchor="middle" font-size="12" fill="#64748B">安全性 / コスト / 実装難易度 / 組織衝突度 (5 段階評価)</text>

  <!-- Headers -->
  <rect x="60" y="80" width="220" height="40" fill="#1E293B" rx="4"/>
  <text x="170" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">評価軸</text>
  <rect x="285" y="80" width="190" height="40" fill="#1E3A8A" rx="4"/>
  <text x="380" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">1. 私物 PC + モバイル</text>
  <rect x="480" y="80" width="190" height="40" fill="#92400E" rx="4"/>
  <text x="575" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">2. 庁内 PC + プロキシ</text>
  <rect x="675" y="80" width="155" height="40" fill="#7F1D1D" rx="4"/>
  <text x="752" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">3. VDI 経由</text>

  <!-- Row helper macro: function for star bars -->
  <!-- Row 1: 安全性 -->
  <rect x="60" y="130" width="220" height="50" fill="#F1F5F9" stroke="#CBD5E1" rx="3"/>
  <text x="80" y="160" font-size="13" font-weight="bold" fill="#1E293B">安全性 (高いほど良)</text>
  <!-- 5/5 -->
  <g transform="translate(290,140)">
    <rect x="0" y="14" width="170" height="22" fill="#2563EB" rx="3"/>
    <text x="85" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">★★★★★</text>
  </g>
  <!-- 3/5 -->
  <g transform="translate(485,140)">
    <rect x="0" y="14" width="102" height="22" fill="#F59E0B" rx="3"/>
    <text x="85" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">★★★☆☆</text>
  </g>
  <!-- 2/5 -->
  <g transform="translate(680,140)">
    <rect x="0" y="14" width="60" height="22" fill="#DC2626" rx="3"/>
    <text x="70" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">★★☆☆☆</text>
  </g>

  <!-- Row 2: 実装難易度 (低いほど良) -->
  <rect x="60" y="190" width="220" height="50" fill="#F1F5F9" stroke="#CBD5E1" rx="3"/>
  <text x="80" y="220" font-size="13" font-weight="bold" fill="#1E293B">実装難易度 (低いほど良)</text>
  <g transform="translate(290,200)">
    <rect x="0" y="14" width="170" height="22" fill="#2563EB" rx="3"/>
    <text x="85" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">★★★★★</text>
  </g>
  <g transform="translate(485,200)">
    <rect x="0" y="14" width="60" height="22" fill="#DC2626" rx="3"/>
    <text x="85" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">★★☆☆☆</text>
  </g>
  <g transform="translate(680,200)">
    <rect x="0" y="14" width="84" height="22" fill="#F59E0B" rx="3"/>
    <text x="70" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">★★★☆☆</text>
  </g>

  <!-- Row 3: 月額コスト (低いほど良) -->
  <rect x="60" y="250" width="220" height="50" fill="#F1F5F9" stroke="#CBD5E1" rx="3"/>
  <text x="80" y="280" font-size="13" font-weight="bold" fill="#1E293B">月額コスト (低いほど良)</text>
  <g transform="translate(290,260)">
    <rect x="0" y="14" width="128" height="22" fill="#F59E0B" rx="3"/>
    <text x="85" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">★★★★☆</text>
  </g>
  <g transform="translate(485,260)">
    <rect x="0" y="14" width="170" height="22" fill="#2563EB" rx="3"/>
    <text x="85" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">★★★★★</text>
  </g>
  <g transform="translate(680,260)">
    <rect x="0" y="14" width="32" height="22" fill="#DC2626" rx="3"/>
    <text x="70" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">★☆☆☆☆</text>
  </g>

  <!-- Row 4: 組織衝突度 (低いほど良) -->
  <rect x="60" y="310" width="220" height="50" fill="#F1F5F9" stroke="#CBD5E1" rx="3"/>
  <text x="80" y="340" font-size="13" font-weight="bold" fill="#1E293B">組織衝突度 (低いほど良)</text>
  <g transform="translate(290,320)">
    <rect x="0" y="14" width="170" height="22" fill="#2563EB" rx="3"/>
    <text x="85" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">★★★★★</text>
  </g>
  <g transform="translate(485,320)">
    <rect x="0" y="14" width="60" height="22" fill="#DC2626" rx="3"/>
    <text x="85" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">★★☆☆☆</text>
  </g>
  <g transform="translate(680,320)">
    <rect x="0" y="14" width="32" height="22" fill="#DC2626" rx="3"/>
    <text x="70" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">★☆☆☆☆</text>
  </g>
</svg>
