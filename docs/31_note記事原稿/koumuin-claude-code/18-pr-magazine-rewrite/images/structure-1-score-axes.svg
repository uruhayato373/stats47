<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="420" fill="#FAFAFA"/>
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">役所文体 → 住民文体の 4 変換軸と基準値帯</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#64748B">scoring.yml に定義する good / warning / bad の判定範囲</text>

  <!-- Axis 1: 文長平均 -->
  <g>
    <text x="60" y="105" font-size="13" font-weight="bold" fill="#1E293B">文長平均 (字/文)</text>
    <rect x="60" y="115" width="660" height="28" fill="none" stroke="#CBD5E1" stroke-width="1" rx="3"/>
    <!-- good 0-45 -->
    <rect x="60" y="115" width="220" height="28" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="3"/>
    <text x="170" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F766E">good ≤ 45</text>
    <!-- warning 46-60 -->
    <rect x="280" y="115" width="180" height="28" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="3"/>
    <text x="370" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">warning 46-60</text>
    <!-- bad >60 -->
    <rect x="460" y="115" width="260" height="28" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="3"/>
    <text x="590" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F1D1D">bad &gt; 60</text>
  </g>

  <!-- Axis 2: 漢字含有率 -->
  <g>
    <text x="60" y="180" font-size="13" font-weight="bold" fill="#1E293B">漢字含有率 (%)</text>
    <rect x="60" y="190" width="660" height="28" fill="none" stroke="#CBD5E1" stroke-width="1" rx="3"/>
    <rect x="60" y="190" width="270" height="28" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="3"/>
    <text x="195" y="209" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F766E">good ≤ 38</text>
    <rect x="330" y="190" width="150" height="28" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="3"/>
    <text x="405" y="209" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">warning 39-45</text>
    <rect x="480" y="190" width="240" height="28" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="3"/>
    <text x="600" y="209" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F1D1D">bad &gt; 45</text>
  </g>

  <!-- Axis 3: 専門用語密度 -->
  <g>
    <text x="60" y="255" font-size="13" font-weight="bold" fill="#1E293B">専門用語密度 (%)</text>
    <rect x="60" y="265" width="660" height="28" fill="none" stroke="#CBD5E1" stroke-width="1" rx="3"/>
    <rect x="60" y="265" width="200" height="28" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="3"/>
    <text x="160" y="284" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F766E">good ≤ 7</text>
    <rect x="260" y="265" width="180" height="28" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="3"/>
    <text x="350" y="284" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">warning 8-12</text>
    <rect x="440" y="265" width="280" height="28" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="3"/>
    <text x="580" y="284" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F1D1D">bad &gt; 12</text>
  </g>

  <!-- Axis 4: 受動態率 -->
  <g>
    <text x="60" y="330" font-size="13" font-weight="bold" fill="#1E293B">受動態率 (%)</text>
    <rect x="60" y="340" width="660" height="28" fill="none" stroke="#CBD5E1" stroke-width="1" rx="3"/>
    <rect x="60" y="340" width="220" height="28" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="3"/>
    <text x="170" y="359" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F766E">good ≤ 15</text>
    <rect x="280" y="340" width="180" height="28" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="3"/>
    <text x="370" y="359" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">warning 16-25</text>
    <rect x="460" y="340" width="260" height="28" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="3"/>
    <text x="590" y="359" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F1D1D">bad &gt; 25</text>
  </g>

  <text x="400" y="400" text-anchor="middle" font-size="11" fill="#64748B">→ 4 軸すべて good になるまで Subagent でリライト (custom_dict で言い換え強制)</text>
</svg>
