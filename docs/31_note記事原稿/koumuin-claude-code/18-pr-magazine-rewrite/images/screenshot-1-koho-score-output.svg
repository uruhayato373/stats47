<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif">
  <rect width="760" height="470" rx="10" fill="#1e1e2e"/>
  <rect width="760" height="38" rx="10" fill="#313244"/>
  <rect y="20" width="760" height="18" fill="#313244"/>
  <circle cx="26" cy="19" r="6" fill="#f38ba8"/>
  <circle cx="48" cy="19" r="6" fill="#f9e2af"/>
  <circle cx="70" cy="19" r="6" fill="#a6e3a1"/>
  <text x="380" y="24" text-anchor="middle" font-size="12" fill="#9399b2">ターミナル — Claude Code</text>
  <g font-family="'SFMono-Regular','Menlo','Consolas','Courier New',monospace" font-size="14">
    <text x="24" y="74" fill="#89b4fa">&gt; <tspan fill="#cdd6f4">/koho-score genkou-001</tspan></text>
    <text x="24" y="100" fill="#6c7086"># 広報誌原稿の役所文体スコアを計測しました</text>

    <text x="24" y="132" fill="#bac2de">指標</text>
    <text x="200" y="132" fill="#bac2de">計測値</text>
    <text x="330" y="132" fill="#bac2de">判定</text>
    <text x="430" y="132" fill="#bac2de">該当箇所</text>
    <line x1="24" y1="142" x2="736" y2="142" stroke="#45475a"/>

    <text x="24" y="166" fill="#cdd6f4">専門用語率</text>
    <text x="200" y="166" fill="#cdd6f4">8.4%</text>
    <text x="330" y="166" fill="#f38ba8">要改善</text>
    <text x="430" y="166" fill="#6c7086">第2段「付託」「稟議」ほか</text>

    <text x="24" y="192" fill="#cdd6f4">受動態率</text>
    <text x="200" y="192" fill="#cdd6f4">31%</text>
    <text x="330" y="192" fill="#f38ba8">要改善</text>
    <text x="430" y="192" fill="#6c7086">「実施される」など5箇所</text>

    <text x="24" y="218" fill="#cdd6f4">平均文長</text>
    <text x="200" y="218" fill="#cdd6f4">62字</text>
    <text x="330" y="218" fill="#f9e2af">注意</text>
    <text x="430" y="218" fill="#6c7086">最長文 118字（第3段）</text>

    <text x="24" y="244" fill="#cdd6f4">略語フルスペル</text>
    <text x="200" y="244" fill="#cdd6f4">2/4 欠落</text>
    <text x="330" y="244" fill="#f9e2af">注意</text>
    <text x="430" y="244" fill="#6c7086">「DX」「EBPM」併記なし</text>

    <text x="24" y="270" fill="#cdd6f4">一文一義</text>
    <text x="200" y="270" fill="#cdd6f4">適合</text>
    <text x="330" y="270" fill="#a6e3a1">良好</text>
    <text x="430" y="270" fill="#6c7086">—</text>
    <line x1="24" y1="284" x2="736" y2="284" stroke="#45475a"/>

    <text x="24" y="312" fill="#89b4fa">総合判定: <tspan fill="#f38ba8">C（要リライト）</tspan></text>
    <text x="24" y="338" fill="#89b4fa">最優先改善指標: <tspan fill="#cdd6f4">受動態率（31% → 目標 15% 以下）</tspan></text>
  </g>

  <rect x="0" y="430" width="760" height="40" fill="#181825"/>
  <text x="24" y="455" font-size="13" fill="#bac2de">▲ /koho-score 実行後の出力（原稿は架空、各課名はマスキング）</text>
