<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="280" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">よくあるつまずき 5 項目</text>

  <!-- 1: マスキング -->
  <g>
    <rect x="20" y="70" width="160" height="180" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="100" y="100" text-anchor="middle" font-size="22" font-weight="bold" fill="#7F1D1D">1</text>
    <text x="100" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F1D1D">[氏名]</text>
    <text x="100" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F1D1D">[電話] [口座]</text>
    <text x="100" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">マスキング</text>
    <text x="100" y="195" text-anchor="middle" font-size="10" fill="#475569">PreToolUse Hook</text>
    <text x="100" y="210" text-anchor="middle" font-size="10" fill="#475569">で自動実行</text>
    <text x="100" y="232" text-anchor="middle" font-size="10" fill="#7F1D1D">人力では漏れる</text>
  </g>

  <!-- 2: 敬語過剰 -->
  <g>
    <rect x="200" y="70" width="160" height="180" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="280" y="100" text-anchor="middle" font-size="22" font-weight="bold" fill="#92400E">2</text>
    <text x="280" y="128" text-anchor="middle" font-size="10" fill="#92400E">「させていただきます」</text>
    <text x="280" y="143" text-anchor="middle" font-size="10" fill="#92400E">が過剰になりがち</text>
    <text x="280" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">敬語過剰</text>
    <text x="280" y="195" text-anchor="middle" font-size="10" fill="#475569">プロンプトで</text>
    <text x="280" y="210" text-anchor="middle" font-size="10" fill="#475569">過剰敬語禁止</text>
    <text x="280" y="232" text-anchor="middle" font-size="10" fill="#92400E">1 通 2 回まで</text>
  </g>

  <!-- 3: 約束しすぎ -->
  <g>
    <rect x="380" y="70" width="160" height="180" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="460" y="100" text-anchor="middle" font-size="22" font-weight="bold" fill="#0F766E">3</text>
    <text x="460" y="128" text-anchor="middle" font-size="10" fill="#0F766E">再発防止策を</text>
    <text x="460" y="143" text-anchor="middle" font-size="10" fill="#0F766E">具体策で盛りがち</text>
    <text x="460" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">約束しすぎ</text>
    <text x="460" y="195" text-anchor="middle" font-size="10" fill="#475569">組織として</text>
    <text x="460" y="210" text-anchor="middle" font-size="10" fill="#475569">約束可能な範囲のみ</text>
    <text x="460" y="232" text-anchor="middle" font-size="10" fill="#0F766E">課長確認必須</text>
  </g>

  <!-- 4: 根拠誤り -->
  <g>
    <rect x="560" y="70" width="160" height="180" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="6"/>
    <text x="640" y="100" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E3A8A">4</text>
    <text x="640" y="128" text-anchor="middle" font-size="10" fill="#1E40AF">条文番号を</text>
    <text x="640" y="143" text-anchor="middle" font-size="10" fill="#1E40AF">AI が誤引用</text>
    <text x="640" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">根拠誤り</text>
    <text x="640" y="195" text-anchor="middle" font-size="10" fill="#475569">「要確認: ○○条」</text>
    <text x="640" y="210" text-anchor="middle" font-size="10" fill="#475569">形式で出力強制</text>
    <text x="640" y="232" text-anchor="middle" font-size="10" fill="#1E40AF">例規集で原典確認</text>
  </g>

  <!-- 5: 首長宛除外 -->
  <g>
    <rect x="740" y="70" width="140" height="180" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5" rx="6"/>
    <text x="810" y="100" text-anchor="middle" font-size="22" font-weight="bold" fill="#9D174D">5</text>
    <text x="810" y="128" text-anchor="middle" font-size="10" fill="#9D174D">首長宛は</text>
    <text x="810" y="143" text-anchor="middle" font-size="10" fill="#9D174D">政治判断含む</text>
    <text x="810" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">首長宛除外</text>
    <text x="810" y="195" text-anchor="middle" font-size="10" fill="#475569">AI 補助対象外</text>
    <text x="810" y="210" text-anchor="middle" font-size="10" fill="#475569">直接起案</text>
    <text x="810" y="232" text-anchor="middle" font-size="10" fill="#9D174D">SKILL.md に明記</text>
  </g>
</svg>
