<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="380" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">通告書 → 論点表 → 関係課別 → 振り分けメール</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748B">4 段階の変換構造 (Claude Code が一気通貫で実行)</text>

  <defs>
    <marker id="arrow09s1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Step 1: 通告書 -->
  <g>
    <rect x="40" y="100" width="180" height="180" fill="#F1F5F9" stroke="#475569" stroke-width="2" rx="6"/>
    <text x="130" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">① 通告書テキスト</text>
    <text x="130" y="148" text-anchor="middle" font-size="11" fill="#475569">tsuukoku/yamada.txt</text>
    <text x="130" y="166" text-anchor="middle" font-size="11" fill="#475569">tsuukoku/sato.txt</text>
    <text x="130" y="184" text-anchor="middle" font-size="11" fill="#475569">tsuukoku/suzuki.txt</text>
    <text x="60" y="210" font-size="10" fill="#1E293B">議員名・会派・</text>
    <text x="60" y="225" font-size="10" fill="#1E293B">「○○について伺います」</text>
    <text x="60" y="240" font-size="10" fill="#1E293B">の中に複数小問が埋込</text>
    <text x="60" y="263" font-size="10" fill="#475569" font-style="italic">12 名 × 4 項目 = 48 項目</text>
  </g>

  <line x1="220" y1="190" x2="248" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#arrow09s1)"/>

  <!-- Step 2: 論点抽出 -->
  <g>
    <rect x="250" y="100" width="200" height="180" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="2" rx="6"/>
    <text x="350" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">② 論点表 (5 列)</text>
    <text x="270" y="150" font-size="10" fill="#1E3A8A">小問 # / 質問項目要約</text>
    <text x="270" y="167" font-size="10" fill="#1E3A8A">論点分類 (5 種)</text>
    <text x="270" y="184" font-size="10" fill="#1E3A8A">答弁関係課 (第一/第二)</text>
    <text x="270" y="201" font-size="10" fill="#1E3A8A">過去答弁キーワード</text>
    <text x="270" y="218" font-size="10" fill="#1E3A8A">想定追加質問</text>
    <text x="270" y="243" font-size="10" fill="#475569" font-style="italic">機能名で出力</text>
    <text x="270" y="258" font-size="10" fill="#475569" font-style="italic">(課名は変動可)</text>
  </g>

  <line x1="450" y1="190" x2="478" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#arrow09s1)"/>

  <!-- Step 3: 関係課別グループ化 -->
  <g>
    <rect x="480" y="100" width="180" height="180" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="6"/>
    <text x="570" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">③ 関係課別グループ</text>
    <text x="500" y="150" font-size="11" fill="#92400E">## 防災担当</text>
    <text x="510" y="166" font-size="10" fill="#1E293B">- 1-2 (yamada)</text>
    <text x="510" y="182" font-size="10" fill="#1E293B">- 3-1 (suzuki)</text>
    <text x="500" y="205" font-size="11" fill="#92400E">## 福祉政策担当</text>
    <text x="510" y="221" font-size="10" fill="#1E293B">- 2-1 (yamada)</text>
    <text x="500" y="245" font-size="11" fill="#92400E">## 財政担当</text>
    <text x="510" y="261" font-size="10" fill="#1E293B">- 4-2 (sato) ...</text>
  </g>

  <line x1="660" y1="190" x2="688" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#arrow09s1)"/>

  <!-- Step 4: 振り分けメール -->
  <g>
    <rect x="690" y="100" width="180" height="180" fill="#CCFBF1" stroke="#0F766E" stroke-width="2" rx="6"/>
    <text x="780" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">④ 振り分けメール</text>
    <text x="710" y="150" font-size="10" fill="#0F766E">件名: 【至急】答弁準備依頼</text>
    <text x="710" y="170" font-size="10" fill="#1E293B">- 質問項目</text>
    <text x="710" y="186" font-size="10" fill="#1E293B">- 論点分類</text>
    <text x="710" y="202" font-size="10" fill="#1E293B">- 過去答弁キーワード</text>
    <text x="710" y="218" font-size="10" fill="#1E293B">- 想定追加質問</text>
    <text x="710" y="234" font-size="10" fill="#1E293B">- 締切 / 読み合わせ日</text>
    <text x="710" y="258" font-size="10" fill="#475569" font-style="italic">課ごとに 1 通</text>
  </g>

  <text x="450" y="320" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">機微情報なし (通告書は公開資料) / 議員名・質問内容は捏造禁止</text>
  <text x="450" y="345" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">過去答弁は「キーワード提示のみ」、会議録の引用は人間が検索</text>
</svg>
