<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="440" fill="#FAFAFA"/>
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">議会期間中 3 指標の Before → After</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748B">通告書 1 議員分 / 議会 1 回 (4 日間集中) ベース</text>

  <!-- Indicator 1: 論点整理時間 -->
  <text x="50" y="100" font-size="14" font-weight="bold" fill="#1E293B">① 論点整理時間 (議員 1 名分)</text>

  <text x="50" y="135" font-size="12" fill="#7F1D1D" font-weight="bold">Before</text>
  <rect x="130" y="115" width="540" height="32" fill="#DC2626" stroke="#7F1D1D" stroke-width="1.5" rx="3"/>
  <text x="400" y="136" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">60 分</text>

  <text x="50" y="170" font-size="12" fill="#1E3A8A" font-weight="bold">After</text>
  <rect x="130" y="155" width="90" height="32" fill="#2563EB" stroke="#1E3A8A" stroke-width="1.5" rx="3"/>
  <text x="175" y="176" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">10 分</text>
  <text x="230" y="176" font-size="13" fill="#1E3A8A" font-weight="bold">(6× 短縮)</text>

  <!-- Indicator 2: 関係課への振り分け遅延 -->
  <text x="50" y="220" font-size="14" font-weight="bold" fill="#1E293B">② 関係課への振り分け遅延 (通告受領→送信)</text>

  <text x="50" y="255" font-size="12" fill="#7F1D1D" font-weight="bold">Before</text>
  <rect x="130" y="235" width="320" height="32" fill="#EA580C" stroke="#7C2D12" stroke-width="1.5" rx="3"/>
  <text x="290" y="256" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">平均 4 時間</text>

  <text x="50" y="290" font-size="12" fill="#1E3A8A" font-weight="bold">After</text>
  <rect x="130" y="275" width="80" height="32" fill="#2563EB" stroke="#1E3A8A" stroke-width="1.5" rx="3"/>
  <text x="170" y="296" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">1 時間</text>
  <text x="220" y="296" font-size="13" fill="#1E3A8A" font-weight="bold">(4× 短縮)</text>

  <!-- Indicator 3: 答弁準備時間の確保 -->
  <text x="50" y="340" font-size="14" font-weight="bold" fill="#1E293B">③ 関係課が答弁準備に使える日数</text>

  <text x="50" y="375" font-size="12" fill="#7F1D1D" font-weight="bold">Before</text>
  <rect x="130" y="355" width="100" height="28" fill="#F59E0B" stroke="#78350F" stroke-width="1.5" rx="3"/>
  <text x="180" y="374" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">本会議 2 日前</text>

  <text x="50" y="408" font-size="12" fill="#1E3A8A" font-weight="bold">After</text>
  <rect x="130" y="388" width="200" height="28" fill="#2563EB" stroke="#1E3A8A" stroke-width="1.5" rx="3"/>
  <text x="230" y="406" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">本会議 4 日前</text>
  <text x="340" y="406" font-size="12" fill="#1E3A8A" font-weight="bold">(2× 余裕)</text>

  <line x1="130" y1="425" x2="670" y2="425" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="3,3"/>
</svg>
