<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="400" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">通告書 振り分けフロー: 60 分 → 10 分</text>

  <defs>
    <marker id="arrow09f1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Before -->
  <text x="40" y="85" font-size="15" fill="#7F1D1D" font-weight="bold">従来: 60 分 (議員 12 名 × 4 項目 = 48 項目を目視)</text>

  <g>
    <rect x="40" y="105" width="140" height="60" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="110" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">通告書受領</text>
    <text x="110" y="147" text-anchor="middle" font-size="10" fill="#7F1D1D">5 分</text>
  </g>
  <line x1="180" y1="135" x2="203" y2="135" stroke="#64748B" stroke-width="2" marker-end="url(#arrow09f1)"/>

  <g>
    <rect x="205" y="105" width="140" height="60" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="275" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">小問抽出</text>
    <text x="275" y="147" text-anchor="middle" font-size="10" fill="#7F1D1D">15 分</text>
  </g>
  <line x1="345" y1="135" x2="368" y2="135" stroke="#64748B" stroke-width="2" marker-end="url(#arrow09f1)"/>

  <g>
    <rect x="370" y="105" width="140" height="60" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="440" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">関係課特定</text>
    <text x="440" y="147" text-anchor="middle" font-size="10" fill="#7F1D1D">15 分</text>
  </g>
  <line x1="510" y1="135" x2="533" y2="135" stroke="#64748B" stroke-width="2" marker-end="url(#arrow09f1)"/>

  <g>
    <rect x="535" y="105" width="140" height="60" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="605" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">過去答弁照合</text>
    <text x="605" y="147" text-anchor="middle" font-size="10" fill="#7F1D1D">15 分</text>
  </g>
  <line x1="675" y1="135" x2="698" y2="135" stroke="#64748B" stroke-width="2" marker-end="url(#arrow09f1)"/>

  <g>
    <rect x="700" y="105" width="160" height="60" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="780" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">振り分けメール作成</text>
    <text x="780" y="147" text-anchor="middle" font-size="10" fill="#7F1D1D">10 分</text>
  </g>

  <text x="450" y="200" text-anchor="middle" font-size="14" fill="#7F1D1D" font-weight="bold">合計 約 60 分 / 議会期間中の最大ボトルネック</text>

  <text x="450" y="240" text-anchor="middle" font-size="22" fill="#2563EB" font-weight="bold">↓ 6× faster</text>

  <!-- After -->
  <text x="40" y="280" font-size="15" fill="#0F766E" font-weight="bold">Claude Code: 10 分 (論点抽出・関係課特定・メール案を一括生成)</text>

  <g>
    <rect x="80" y="300" width="150" height="65" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="155" y="323" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">通告書 pdftotext</text>
    <text x="155" y="343" text-anchor="middle" font-size="11" fill="#475569">2 分</text>
  </g>
  <line x1="230" y1="332" x2="258" y2="332" stroke="#64748B" stroke-width="2" marker-end="url(#arrow09f1)"/>

  <g>
    <rect x="260" y="300" width="220" height="65" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="370" y="322" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">/assembly-question-review</text>
    <text x="370" y="340" text-anchor="middle" font-size="11" fill="#0F766E">論点 5 列表 + 関係課別</text>
    <text x="370" y="354" text-anchor="middle" font-size="10" fill="#14B8A6">5 分</text>
  </g>
  <line x1="480" y1="332" x2="508" y2="332" stroke="#64748B" stroke-width="2" marker-end="url(#arrow09f1)"/>

  <g>
    <rect x="510" y="300" width="170" height="65" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5" rx="6"/>
    <text x="595" y="322" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">メール案自動生成</text>
    <text x="595" y="340" text-anchor="middle" font-size="11" fill="#4338CA">課ごとに 1 通</text>
  </g>
  <line x1="680" y1="332" x2="708" y2="332" stroke="#64748B" stroke-width="2" marker-end="url(#arrow09f1)"/>

  <g>
    <rect x="710" y="300" width="170" height="65" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5" rx="6"/>
    <text x="795" y="322" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">人間最終確認</text>
    <text x="795" y="340" text-anchor="middle" font-size="11" fill="#9D174D">3 分 / 送信</text>
  </g>
