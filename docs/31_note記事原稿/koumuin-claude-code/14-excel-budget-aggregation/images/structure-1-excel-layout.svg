<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="420" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">典型的な公務員 Excel の構造 (結合セル + ヘッダ複数行 + 合計行)</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748B">A1 単位表記 / 3 行目列名 / 結合セル「款項目」/ 末尾合計行</text>

  <!-- Spreadsheet grid -->
  <!-- Column headers A-F -->
  <g font-size="11" fill="#475569">
    <rect x="80" y="80" width="40" height="22" fill="#E2E8F0" stroke="#94A3B8"/>
    <text x="100" y="96" text-anchor="middle"></text>
    <rect x="120" y="80" width="80" height="22" fill="#E2E8F0" stroke="#94A3B8"/>
    <text x="160" y="96" text-anchor="middle">A</text>
    <rect x="200" y="80" width="100" height="22" fill="#E2E8F0" stroke="#94A3B8"/>
    <text x="250" y="96" text-anchor="middle">B</text>
    <rect x="300" y="80" width="100" height="22" fill="#E2E8F0" stroke="#94A3B8"/>
    <text x="350" y="96" text-anchor="middle">C</text>
    <rect x="400" y="80" width="160" height="22" fill="#E2E8F0" stroke="#94A3B8"/>
    <text x="480" y="96" text-anchor="middle">D</text>
    <rect x="560" y="80" width="120" height="22" fill="#E2E8F0" stroke="#94A3B8"/>
    <text x="620" y="96" text-anchor="middle">E</text>
    <rect x="680" y="80" width="120" height="22" fill="#E2E8F0" stroke="#94A3B8"/>
    <text x="740" y="96" text-anchor="middle">F</text>
  </g>

  <!-- Row 1: Title -->
  <rect x="80" y="102" width="40" height="28" fill="#E2E8F0" stroke="#94A3B8"/>
  <text x="100" y="121" text-anchor="middle" font-size="11" fill="#475569">1</text>
  <rect x="120" y="102" width="680" height="28" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5"/>
  <text x="130" y="121" font-size="13" font-weight="bold" fill="#92400E">令和8年度 5月補正予算 (総務課)</text>
  <text x="810" y="116" font-size="10" fill="#92400E">← タイトル行</text>
  <text x="810" y="128" font-size="10" fill="#92400E">(skiprows 対象)</text>

  <!-- Row 2: Unit -->
  <rect x="80" y="130" width="40" height="26" fill="#E2E8F0" stroke="#94A3B8"/>
  <text x="100" y="147" text-anchor="middle" font-size="11" fill="#475569">2</text>
  <rect x="120" y="130" width="680" height="26" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5"/>
  <text x="130" y="148" font-size="12" font-weight="bold" fill="#7F1D1D">単位: 千円</text>
  <text x="810" y="148" font-size="10" fill="#7F1D1D">← 単位 (A1 解析)</text>

  <!-- Row 3: Header -->
  <rect x="80" y="156" width="40" height="36" fill="#E2E8F0" stroke="#94A3B8"/>
  <text x="100" y="178" text-anchor="middle" font-size="11" fill="#475569">3</text>
  <rect x="120" y="156" width="80" height="36" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5"/>
  <text x="160" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">款</text>
  <rect x="200" y="156" width="100" height="36" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5"/>
  <text x="250" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">項</text>
  <rect x="300" y="156" width="100" height="36" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5"/>
  <text x="350" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">目</text>
  <rect x="400" y="156" width="160" height="36" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5"/>
  <text x="480" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">事業名</text>
  <rect x="560" y="156" width="120" height="36" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5"/>
  <text x="620" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">当初予算額</text>
  <rect x="680" y="156" width="120" height="36" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5"/>
  <text x="740" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">前年度</text>
  <text x="810" y="178" font-size="10" fill="#1E3A8A">← 列名 (header=2)</text>

  <!-- Rows 4-7: Data with merged A,B,C cells -->
  <!-- Merged 款 A4:A7 -->
  <rect x="120" y="192" width="80" height="112" fill="#FFFFFF" stroke="#94A3B8"/>
  <text x="160" y="252" text-anchor="middle" font-size="11" fill="#1E293B">2 総務費</text>
  <!-- Merged 項 B4:B5 -->
  <rect x="200" y="192" width="100" height="56" fill="#FFFFFF" stroke="#94A3B8"/>
  <text x="250" y="224" text-anchor="middle" font-size="11" fill="#1E293B">1 総務管理費</text>
  <!-- Merged 項 B6:B7 -->
  <rect x="200" y="248" width="100" height="56" fill="#FFFFFF" stroke="#94A3B8"/>
  <text x="250" y="280" text-anchor="middle" font-size="11" fill="#1E293B">2 徴税費</text>

  <!-- 目 cells (one per row) -->
  <rect x="300" y="192" width="100" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
  <text x="350" y="211" text-anchor="middle" font-size="11" fill="#1E293B">1 一般管理</text>
  <rect x="300" y="220" width="100" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
  <text x="350" y="239" text-anchor="middle" font-size="11" fill="#1E293B">2 文書広報</text>
  <rect x="300" y="248" width="100" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
  <text x="350" y="267" text-anchor="middle" font-size="11" fill="#1E293B">1 賦課徴収</text>
  <rect x="300" y="276" width="100" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
  <text x="350" y="295" text-anchor="middle" font-size="11" fill="#1E293B">2 滞納処分</text>

  <!-- Row numbers 4-7 + data D,E,F -->
  <g>
    <rect x="80" y="192" width="40" height="28" fill="#E2E8F0" stroke="#94A3B8"/>
    <text x="100" y="211" text-anchor="middle" font-size="11" fill="#475569">4</text>
    <rect x="400" y="192" width="160" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
    <text x="410" y="211" font-size="11" fill="#1E293B">給与計算</text>
    <rect x="560" y="192" width="120" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
    <text x="670" y="211" text-anchor="end" font-size="11" fill="#1E293B">25,800</text>
    <rect x="680" y="192" width="120" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
    <text x="790" y="211" text-anchor="end" font-size="11" fill="#1E293B">24,500</text>

    <rect x="80" y="220" width="40" height="28" fill="#E2E8F0" stroke="#94A3B8"/>
    <text x="100" y="239" text-anchor="middle" font-size="11" fill="#475569">5</text>
    <rect x="400" y="220" width="160" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
    <text x="410" y="239" font-size="11" fill="#1E293B">広報誌印刷</text>
    <rect x="560" y="220" width="120" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
    <text x="670" y="239" text-anchor="end" font-size="11" fill="#1E293B">8,200</text>
    <rect x="680" y="220" width="120" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
    <text x="790" y="239" text-anchor="end" font-size="11" fill="#1E293B">-</text>

    <rect x="80" y="248" width="40" height="28" fill="#E2E8F0" stroke="#94A3B8"/>
    <text x="100" y="267" text-anchor="middle" font-size="11" fill="#475569">6</text>
    <rect x="400" y="248" width="160" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
    <text x="410" y="267" font-size="11" fill="#1E293B">納税通知書</text>
    <rect x="560" y="248" width="120" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
    <text x="670" y="267" text-anchor="end" font-size="11" fill="#1E293B">4,100</text>
    <rect x="680" y="248" width="120" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
    <text x="790" y="267" text-anchor="end" font-size="11" fill="#1E293B">3,900</text>

    <rect x="80" y="276" width="40" height="28" fill="#E2E8F0" stroke="#94A3B8"/>
    <text x="100" y="295" text-anchor="middle" font-size="11" fill="#475569">7</text>
    <rect x="400" y="276" width="160" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
    <text x="410" y="295" font-size="11" fill="#1E293B">差押業務</text>
    <rect x="560" y="276" width="120" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
    <text x="670" y="295" text-anchor="end" font-size="11" fill="#1E293B">2,300</text>
    <rect x="680" y="276" width="120" height="28" fill="#FFFFFF" stroke="#94A3B8"/>
    <text x="790" y="295" text-anchor="end" font-size="11" fill="#1E293B">2,100</text>
  </g>
  <text x="810" y="232" font-size="10" fill="#475569">← 結合セル</text>
  <text x="810" y="248" font-size="10" fill="#475569">(ffill 必要)</text>

  <!-- Row 8: 合計 -->
  <rect x="80" y="304" width="40" height="28" fill="#E2E8F0" stroke="#94A3B8"/>
  <text x="100" y="323" text-anchor="middle" font-size="11" fill="#475569">8</text>
  <rect x="120" y="304" width="440" height="28" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5"/>
  <text x="130" y="323" font-size="11" font-weight="bold" fill="#9D174D">合計</text>
  <rect x="560" y="304" width="120" height="28" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5"/>
  <text x="670" y="323" text-anchor="end" font-size="11" font-weight="bold" fill="#9D174D">40,400</text>
  <rect x="680" y="304" width="120" height="28" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5"/>
  <text x="790" y="323" text-anchor="end" font-size="11" font-weight="bold" fill="#9D174D">30,500</text>
  <text x="810" y="323" font-size="10" fill="#9D174D">← 合計行 (除外)</text>

  <!-- Annotations on the right -->
  <g>
    <rect x="60" y="350" width="780" height="56" fill="#F1F5F9" stroke="#475569" stroke-width="1" stroke-dasharray="4,3" rx="6"/>
    <text x="80" y="370" font-size="11" font-weight="bold" fill="#1E293B">aggregate.py での処理:</text>
    <text x="80" y="386" font-size="11" fill="#475569">1. read_excel(header=2, skiprows なし) → 2. ffill() で結合セル前方埋め → 3. 「合計|計|総計」を含む行を mask で除外</text>
    <text x="80" y="400" font-size="11" fill="#475569">4. 単位「千円」→ × 1000 で円換算 → 5. 欠損 "-" "***" "※" を 0 に置換 → 6. 課コード列 (ファイル名先頭 2 桁) を追加</text>
  </g>
</svg>
