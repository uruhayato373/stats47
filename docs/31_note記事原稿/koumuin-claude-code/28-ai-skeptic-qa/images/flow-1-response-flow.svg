<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="360" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">渋り発言への応答フロー (5 ステップ)</text>

  <defs>
    <marker id="arr28-1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Step 1: 渋り発言を受ける -->
  <g>
    <rect x="20" y="90" width="150" height="80" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="95" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">渋り発言を受ける</text>
    <text x="95" y="138" text-anchor="middle" font-size="11" fill="#64748B">即時反論しない</text>
    <text x="95" y="155" text-anchor="middle" font-size="10" fill="#475569">一度受け止める</text>
  </g>
  <line x1="170" y1="130" x2="198" y2="130" stroke="#64748B" stroke-width="2" marker-end="url(#arr28-1)"/>

  <!-- Step 2: 動機判定 3 質問 -->
  <g>
    <rect x="200" y="90" width="170" height="80" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="2" rx="6"/>
    <text x="285" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E3A8A">動機を判定する</text>
    <text x="285" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E3A8A">3 質問</text>
    <text x="285" y="150" text-anchor="middle" font-size="10" fill="#475569">「何が一番気になる?」</text>
    <text x="285" y="163" text-anchor="middle" font-size="10" fill="#475569">「最悪何が起きる?」</text>
  </g>
  <line x1="370" y1="130" x2="398" y2="130" stroke="#64748B" stroke-width="2" marker-end="url(#arr28-1)"/>

  <!-- Step 3: 動機別応答テンプレ選択 -->
  <g>
    <rect x="400" y="90" width="170" height="80" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="485" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">応答テンプレ選択</text>
    <text x="485" y="135" text-anchor="middle" font-size="11" fill="#1E293B">責任 / 横並び /</text>
    <text x="485" y="152" text-anchor="middle" font-size="11" fill="#1E293B">世代 / 序列 別</text>
  </g>
  <line x1="570" y1="130" x2="598" y2="130" stroke="#64748B" stroke-width="2" marker-end="url(#arr28-1)"/>

  <!-- Step 4: 実演 or 資料提示 -->
  <g>
    <rect x="600" y="90" width="160" height="80" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="680" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#0F766E">実演 or 資料提示</text>
    <text x="680" y="135" text-anchor="middle" font-size="11" fill="#1E293B">物証 + Hook 提示</text>
    <text x="680" y="152" text-anchor="middle" font-size="10" fill="#475569">議事録 5 分実演</text>
  </g>
  <line x1="760" y1="130" x2="788" y2="130" stroke="#64748B" stroke-width="2" marker-end="url(#arr28-1)"/>

  <!-- Step 5: 再交渉 -->
  <g>
    <rect x="790" y="90" width="100" height="80" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5" rx="6"/>
    <text x="840" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#9D174D">再交渉</text>
    <text x="840" y="138" text-anchor="middle" font-size="11" fill="#1E293B">条件を提示</text>
    <text x="840" y="155" text-anchor="middle" font-size="10" fill="#475569">小さい承認</text>
  </g>

  <!-- 3 質問の詳細枠 -->
  <rect x="160" y="210" width="600" height="100" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="6"/>
  <text x="180" y="232" font-size="12" font-weight="bold" fill="#1E3A8A">動機判定 3 質問の例</text>

  <text x="180" y="255" font-size="11" fill="#1E293B">Q1: 「もし導入したら、一番気になることは何ですか?」→ <tspan fill="#9D174D" font-weight="bold">序列 / 責任</tspan></text>
  <text x="180" y="275" font-size="11" fill="#1E293B">Q2: 「他自治体の事例があれば検討余地はありますか?」→ <tspan fill="#1E3A8A" font-weight="bold">横並び</tspan></text>
  <text x="180" y="295" font-size="11" fill="#1E293B">Q3: 「全員で使うのとベテランだけ違いますか?」→ <tspan fill="#92400E" font-weight="bold">世代格差</tspan></text>

  <text x="450" y="340" text-anchor="middle" font-size="11" fill="#94A3B8">※ 動機を取り違えると、いくら反論しても刺さらない。判定が最重要</text>
</svg>
