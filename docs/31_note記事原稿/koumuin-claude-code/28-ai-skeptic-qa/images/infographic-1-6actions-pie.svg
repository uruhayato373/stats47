<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="480" fill="#FAFAFA"/>
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">渋り上席を味方に変える 6 アクション (有効度)</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#64748B">体感値 / 全体に占める寄与の比率 (合計 100%)</text>

  <!-- Pie chart at left -->
  <g transform="translate(260,260)">
    <!-- 6 sectors. percentages: 動機判定 25, 物証 20, 責任 18, 国事例 15, 実演 12, 粘り 10 -->
    <!-- Start at -90 (top), go clockwise -->
    <!-- 25% = 90deg -->
    <!-- helper precomputed coords for r=130 -->

    <!-- Sector 1: 動機判定 25% (0-90deg from top) end at right side -->
    <path d="M 0,0 L 0,-130 A 130,130 0 0 1 130,0 Z" fill="#2563EB" stroke="#FFFFFF" stroke-width="2"/>

    <!-- Sector 2: 物証+Hook 20% (90-162deg) -->
    <!-- end angle = 162 from top. x=sin(162°)*130=40.2, y=-cos(162°)*130=123.7 -->
    <path d="M 0,0 L 130,0 A 130,130 0 0 1 40.2,123.7 Z" fill="#059669" stroke="#FFFFFF" stroke-width="2"/>

    <!-- Sector 3: 責任 3 段階 18% (162-226.8deg) -->
    <!-- end angle 226.8: sin=-0.728, cos=-0.686 → x=-94.6, y=89.1 -->
    <path d="M 0,0 L 40.2,123.7 A 130,130 0 0 1 -94.6,89.1 Z" fill="#DC2626" stroke="#FFFFFF" stroke-width="2"/>

    <!-- Sector 4: 国事例引用 15% (226.8-280.8deg) -->
    <!-- end angle 280.8: sin=-0.982, cos=0.187 → x=-127.7, y=-24.3 -->
    <path d="M 0,0 L -94.6,89.1 A 130,130 0 0 1 -127.7,-24.3 Z" fill="#4338CA" stroke="#FFFFFF" stroke-width="2"/>

    <!-- Sector 5: 実演 12% (280.8-324deg) -->
    <!-- end angle 324: sin=-0.588, cos=0.809 → x=-76.4, y=-105.2 -->
    <path d="M 0,0 L -127.7,-24.3 A 130,130 0 0 1 -76.4,-105.2 Z" fill="#F59E0B" stroke="#FFFFFF" stroke-width="2"/>

    <!-- Sector 6: 粘り続ける 10% (324-360deg) back to top -->
    <path d="M 0,0 L -76.4,-105.2 A 130,130 0 0 1 0,-130 Z" fill="#9D174D" stroke="#FFFFFF" stroke-width="2"/>

    <!-- Center labels -->
    <text x="60" y="-65" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">25%</text>
    <text x="85" y="50" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">20%</text>
    <text x="-25" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">18%</text>
    <text x="-77" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">15%</text>
    <text x="-78" y="-43" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">12%</text>
    <text x="-30" y="-95" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">10%</text>
  </g>

  <!-- Legend at right -->
  <g transform="translate(490,140)">
    <rect x="0" y="0" width="18" height="18" fill="#2563EB"/>
    <text x="28" y="14" font-size="13" font-weight="bold" fill="#1E293B">動機判定 (25%)</text>
    <text x="28" y="32" font-size="10" fill="#64748B">3 質問で動機を当てる</text>

    <rect x="0" y="48" width="18" height="18" fill="#059669"/>
    <text x="28" y="62" font-size="13" font-weight="bold" fill="#1E293B">物証 + Hook 提示 (20%)</text>
    <text x="28" y="80" font-size="10" fill="#64748B">議事録 5 分の現物</text>

    <rect x="0" y="96" width="18" height="18" fill="#DC2626"/>
    <text x="28" y="110" font-size="13" font-weight="bold" fill="#1E293B">責任 3 段階明示 (18%)</text>
    <text x="28" y="128" font-size="10" fill="#64748B">提案者 / 課 / 部の責任分解</text>

    <rect x="0" y="144" width="18" height="18" fill="#4338CA"/>
    <text x="28" y="158" font-size="13" font-weight="bold" fill="#1E293B">国 / 先行自治体引用 (15%)</text>
    <text x="28" y="176" font-size="10" fill="#64748B">デジ庁通知 / 県内導入実績</text>

    <rect x="0" y="192" width="18" height="18" fill="#F59E0B"/>
    <text x="28" y="206" font-size="13" font-weight="bold" fill="#1E293B">実演 (12%)</text>
    <text x="28" y="224" font-size="10" fill="#64748B">その場で 30 秒デモ</text>

    <rect x="0" y="240" width="18" height="18" fill="#9D174D"/>
    <text x="28" y="254" font-size="13" font-weight="bold" fill="#1E293B">粘り続ける (10%)</text>
    <text x="28" y="272" font-size="10" fill="#64748B">3 回まで再交渉 / 期間設定</text>
  </g>

  <text x="400" y="455" text-anchor="middle" font-size="11" fill="#94A3B8">※ 「動機判定 + 物証提示」だけで全体の 45% を占める。最初の 2 つに集中投資する</text>
</svg>
