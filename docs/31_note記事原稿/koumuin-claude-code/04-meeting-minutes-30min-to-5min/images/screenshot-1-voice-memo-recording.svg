<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif">
  <rect width="760" height="420" rx="10" fill="#f1f5f9"/>
  <!-- iPhone frame -->
  <rect x="270" y="20" width="220" height="320" rx="32" fill="#1e293b"/>
  <rect x="280" y="30" width="200" height="300" rx="24" fill="#0f172a"/>
