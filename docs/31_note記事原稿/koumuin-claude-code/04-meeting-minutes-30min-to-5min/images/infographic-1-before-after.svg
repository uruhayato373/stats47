<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="420" fill="#FAFAFA"/>
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">議事録作成時間: Before → After</text>
  <text x="400" y="62" text-anchor="middle" font-size="12" fill="#64748B">1 時間の会議の場合 / 録音時間は除外</text>

  <!-- Before label -->
  <text x="60" y="125" font-size="16" fill="#7F1D1D" font-weight="bold">Before</text>
  <text x="60" y="145" font-size="11" fill="#94A3B8">手動運用</text>

  <!-- Before bars: 1px = 1min, x base 140 -->
  <rect x="140" y="100" width="300" height="56" fill="#DC2626" stroke="#7F1D1D" stroke-width="1.5" rx="3"/>
  <text x="290" y="128" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="bold">録音聞き直し</text>
  <text x="290" y="146" text-anchor="middle" font-size="13" fill="#FEE2E2">30 分</text>

  <rect x="440" y="100" width="200" height="56" fill="#EA580C" stroke="#7C2D12" stroke-width="1.5" rx="3"/>
  <text x="540" y="128" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="bold">文字起こし</text>
  <text x="540" y="146" text-anchor="middle" font-size="13" fill="#FED7AA">20 分</text>

  <rect x="640" y="100" width="100" height="56" fill="#F59E0B" stroke="#78350F" stroke-width="1.5" rx="3"/>
  <text x="690" y="128" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">整形</text>
  <text x="690" y="146" text-anchor="middle" font-size="12" fill="#FEF3C7">10 分</text>

  <text x="755" y="135" font-size="20" fill="#7F1D1D" font-weight="bold">60 分</text>

  <!-- Arrow + caption -->
  <text x="400" y="220" text-anchor="middle" font-size="26" fill="#2563EB" font-weight="bold">↓ 6× faster</text>

  <!-- After label -->
  <text x="60" y="285" font-size="16" fill="#1E3A8A" font-weight="bold">After</text>
  <text x="60" y="305" font-size="11" fill="#94A3B8">Whisper + Claude Code</text>

  <!-- After bars: 1px = 1min, x base 140 -->
  <rect x="140" y="260" width="50" height="56" fill="#2563EB" stroke="#1E3A8A" stroke-width="1.5" rx="3"/>
  <text x="165" y="288" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">Whisper</text>
  <text x="165" y="306" text-anchor="middle" font-size="11" fill="#DBEAFE">5 分</text>

  <rect x="190" y="260" width="20" height="56" fill="#0891B2" stroke="#164E63" stroke-width="1.5" rx="3"/>
  <rect x="210" y="260" width="30" height="56" fill="#059669" stroke="#064E3B" stroke-width="1.5" rx="3"/>

  <!-- Callouts for short bars -->
  <line x1="200" y1="316" x2="200" y2="336" stroke="#475569" stroke-width="1"/>
  <text x="200" y="350" text-anchor="middle" font-size="11" fill="#0891B2" font-weight="bold">Claude 2 分</text>

  <line x1="225" y1="316" x2="225" y2="356" stroke="#475569" stroke-width="1"/>
  <text x="225" y="370" text-anchor="middle" font-size="11" fill="#059669" font-weight="bold">人間チェック 3 分</text>

  <text x="260" y="295" font-size="20" fill="#1E3A8A" font-weight="bold">10 分</text>

  <!-- Same scale guideline -->
  <line x1="140" y1="395" x2="740" y2="395" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="400" y="410" text-anchor="middle" font-size="11" fill="#94A3B8">スケール: 1 px = 1 分 (Before / After 共通)</text>
</svg>
