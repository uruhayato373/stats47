<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="380" fill="#FAFAFA"/>
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">format-minutes スキルの構造</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#64748B">CLAUDE.md + .claude/skills/format-minutes/ + templates/ の参照関係</text>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Project root box -->
  <rect x="60" y="80" width="680" height="270" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4" rx="8"/>
  <text x="80" y="105" font-size="12" fill="#64748B" font-weight="bold">~/work/meetings/2026-05-18-study-group/  (プロジェクトルート)</text>

  <!-- CLAUDE.md -->
  <g>
    <rect x="100" y="130" width="200" height="80" fill="#FEF3C7" stroke="#B45309" stroke-width="2" rx="6"/>
    <text x="200" y="155" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E293B">CLAUDE.md</text>
    <text x="200" y="175" text-anchor="middle" font-size="11" fill="#92400E">プロジェクト固定ルール</text>
    <text x="200" y="192" text-anchor="middle" font-size="10" fill="#78350F">文体・構造・PII 取扱い</text>
  </g>

  <!-- transcript.json / meta.yaml -->
  <g>
    <rect x="500" y="130" width="200" height="80" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5" rx="6"/>
    <text x="600" y="153" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">入力ファイル</text>
    <text x="600" y="173" text-anchor="middle" font-size="11" fill="#4338CA">transcript.json</text>
    <text x="600" y="190" text-anchor="middle" font-size="11" fill="#4338CA">meta.yaml</text>
  </g>

  <!-- .claude/skills/format-minutes/ -->
  <g>
    <rect x="100" y="240" width="600" height="90" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="120" y="262" font-size="13" fill="#1E293B" font-weight="bold">.claude/skills/format-minutes/</text>

    <!-- SKILL.md -->
    <rect x="140" y="278" width="240" height="44" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="4"/>
    <text x="260" y="296" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">SKILL.md</text>
    <text x="260" y="312" text-anchor="middle" font-size="10" fill="#0F766E">実行手順 / frontmatter</text>

    <!-- templates/minutes.md -->
    <rect x="400" y="278" width="280" height="44" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5" rx="4"/>
    <text x="540" y="296" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">templates/minutes.md</text>
    <text x="540" y="312" text-anchor="middle" font-size="10" fill="#9D174D">出力フォーマットの雛形</text>
  </g>

  <!-- Arrows -->
  <!-- CLAUDE.md → SKILL.md (constraint) -->
  <line x1="200" y1="210" x2="240" y2="275" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow2)"/>
  <text x="170" y="245" font-size="10" fill="#64748B">参照</text>

  <!-- 入力 → SKILL.md (read) -->
  <line x1="600" y1="210" x2="300" y2="275" stroke="#4338CA" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="500" y="240" font-size="10" fill="#4338CA">読み込み</text>

  <!-- SKILL.md → templates (uses) -->
  <line x1="380" y1="300" x2="395" y2="300" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Output indicator -->
  <text x="400" y="365" text-anchor="middle" font-size="11" fill="#059669" font-weight="bold">→ drafts/YYYY-MM-DD-&lt;slug&gt;.md を出力 (1500-2500 字)</text>
</svg>
