<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 752 571" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif"><rect width="752" height="571" fill="#ffffff"/><rect x="0" y="0" width="72" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="26.0" font-size="15" font-weight="700" fill="#ffffff">#</text><rect x="72" y="0" width="340" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="26.0" font-size="15" font-weight="700" fill="#ffffff">症状</text><rect x="412" y="0" width="340" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="26.0" font-size="15" font-weight="700" fill="#ffffff">対策</text><rect x="0" y="43" width="72" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="80.5" font-size="15" font-weight="400" fill="#1e293b">1</text><rect x="72" y="43" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="80.5" font-size="15" font-weight="400" fill="#1e293b">Whisper の音声認識精度が低い</text><rect x="412" y="43" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="69.0" font-size="15" font-weight="400" fill="#1e293b">マイク位置改善 (話者中央・距離 30cm 以内)</text><text x="426" y="92.0" font-size="15" font-weight="400" fill="#1e293b">、雑音少ない環境</text><rect x="0" y="109" width="72" height="89" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="158.0" font-size="15" font-weight="400" fill="#1e293b">2</text><rect x="72" y="109" width="340" height="89" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="158.0" font-size="15" font-weight="400" fill="#1e293b">専門用語の誤変換が多い</text><rect x="412" y="109" width="340" height="89" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="135.0" font-size="15" font-weight="400" fill="#1e293b">Whisper API の prompt パラメータに用語集</text><text x="426" y="158.0" font-size="15" font-weight="400" fill="#1e293b">を渡す (prompt="本市、要綱、要領、起案、</text><text x="426" y="181.0" font-size="15" font-weight="400" fill="#1e293b">決裁...")</text><rect x="0" y="198" width="72" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="235.5" font-size="15" font-weight="400" fill="#1e293b">3</text><rect x="72" y="198" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="235.5" font-size="15" font-weight="400" fill="#1e293b">Claude が個人名をフィルタしてくれない</text><rect x="412" y="198" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="224.0" font-size="15" font-weight="400" fill="#1e293b">CLAUDE.md に「実名検出時は [PII] と置換し</text><text x="426" y="247.0" font-size="15" font-weight="400" fill="#1e293b">人間に通知」を明記</text><rect x="0" y="264" width="72" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="301.5" font-size="15" font-weight="400" fill="#1e293b">4</text><rect x="72" y="264" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="301.5" font-size="15" font-weight="400" fill="#1e293b">要約が浅すぎる</text><rect x="412" y="264" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="290.0" font-size="15" font-weight="400" fill="#1e293b">「議題ごとに論点を 3 個以上残す」「結論は </text><text x="426" y="313.0" font-size="15" font-weight="400" fill="#1e293b">1 文で明示」と数値で縛る</text><rect x="0" y="330" width="72" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="367.5" font-size="15" font-weight="400" fill="#1e293b">5</text><rect x="72" y="330" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="367.5" font-size="15" font-weight="400" fill="#1e293b">公文書文体にならない</text><rect x="412" y="330" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="356.0" font-size="15" font-weight="400" fill="#1e293b">「である調 100%」「敬語禁止」「箇条書きベ</text><text x="426" y="379.0" font-size="15" font-weight="400" fill="#1e293b">ース」と CLAUDE.md に明記</text><rect x="0" y="396" width="72" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="422.0" font-size="15" font-weight="400" fill="#1e293b">6</text><rect x="72" y="396" width="340" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="422.0" font-size="15" font-weight="400" fill="#1e293b">mp3 が 25MB 超で API エラー</text><rect x="412" y="396" width="340" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="422.0" font-size="15" font-weight="400" fill="#1e293b">ffmpeg で分割 (上記コマンド参照)</text><rect x="0" y="439" width="72" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="476.5" font-size="15" font-weight="400" fill="#1e293b">7</text><rect x="72" y="439" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="465.0" font-size="15" font-weight="400" fill="#1e293b">transcript.json が長すぎてコンテキスト超</text><text x="86" y="488.0" font-size="15" font-weight="400" fill="#1e293b">過</text><rect x="412" y="439" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="476.5" font-size="15" font-weight="400" fill="#1e293b">1 時間ずつ分割整形 → 最後に統合</text><rect x="0" y="505" width="72" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="542.5" font-size="15" font-weight="400" fill="#1e293b">8</text><rect x="72" y="505" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="542.5" font-size="15" font-weight="400" fill="#1e293b">発言者推定が当てにならない</text><rect x="412" y="505" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="531.0" font-size="15" font-weight="400" fill="#1e293b">Whisper の話者分離 (diarization) は未対</text><text x="426" y="554.0" font-size="15" font-weight="400" fill="#1e293b">応。人間が後付け</text><rect x="0.5" y="0.5" width="751" height="570" fill="none" stroke="#cbd5e1" stroke-width="1.5"/></svg>