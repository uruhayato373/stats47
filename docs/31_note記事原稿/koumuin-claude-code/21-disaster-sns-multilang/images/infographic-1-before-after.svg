<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="420" fill="#FAFAFA"/>
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">災害時多言語発信: Before → After</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748B">横軸 = 経過時間 (分) / 縦軸 = 配信言語数</text>

  <!-- Axes -->
  <line x1="100" y1="350" x2="720" y2="350" stroke="#475569" stroke-width="1.5"/>
  <line x1="100" y1="100" x2="100" y2="350" stroke="#475569" stroke-width="1.5"/>

  <!-- X axis labels (0,5,10,15,20,25,30) -->
  <g font-size="10" fill="#64748B" text-anchor="middle">
    <text x="100" y="370">0</text>
    <text x="200" y="370">5</text>
    <text x="300" y="370">10</text>
    <text x="400" y="370">15</text>
    <text x="500" y="370">20</text>
    <text x="600" y="370">25</text>
    <text x="700" y="370">30</text>
    <text x="410" y="395" font-size="11" fill="#475569">経過時間 (分)</text>
  </g>

  <!-- Y axis labels (0,1,...,7) -->
  <g font-size="10" fill="#64748B" text-anchor="end">
    <text x="92" y="354">0</text>
    <text x="92" y="324">1</text>
    <text x="92" y="294">2</text>
    <text x="92" y="264">3</text>
    <text x="92" y="234">4</text>
    <text x="92" y="204">5</text>
    <text x="92" y="174">6</text>
    <text x="92" y="144">7</text>
    <text x="60" y="220" font-size="11" fill="#475569" transform="rotate(-90 60 220)">言語数</text>
  </g>

  <!-- Gridlines -->
  <g stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="3,3">
    <line x1="100" y1="320" x2="720" y2="320"/>
    <line x1="100" y1="290" x2="720" y2="290"/>
    <line x1="100" y1="260" x2="720" y2="260"/>
    <line x1="100" y1="230" x2="720" y2="230"/>
    <line x1="100" y1="200" x2="720" y2="200"/>
    <line x1="100" y1="170" x2="720" y2="170"/>
    <line x1="100" y1="140" x2="720" y2="140"/>
  </g>

  <!-- 従来 Before: 0-30 min reach 1 lang at 30 min -->
  <polyline points="100,350 700,350 700,320" fill="none" stroke="#DC2626" stroke-width="2.5"/>
  <circle cx="700" cy="320" r="5" fill="#DC2626"/>
  <text x="710" y="316" font-size="12" fill="#7F1D1D" font-weight="bold">従来: 英語 1 言語 / 30 分</text>

  <!-- Claude After: jumps to 7 at 2 min -->
  <polyline points="100,350 140,350 140,140 720,140" fill="none" stroke="#2563EB" stroke-width="2.5"/>
  <circle cx="140" cy="140" r="5" fill="#2563EB"/>
  <text x="155" y="135" font-size="12" fill="#1E3A8A" font-weight="bold">Claude: 7 言語 / 2 分</text>

  <!-- Legend boxes -->
  <rect x="120" y="105" width="14" height="14" fill="#DC2626" rx="2"/>
  <text x="140" y="117" font-size="11" fill="#1E293B">従来運用 (DeepL 手動)</text>
  <rect x="270" y="105" width="14" height="14" fill="#2563EB" rx="2"/>
  <text x="290" y="117" font-size="11" fill="#1E293B">Claude Code 運用</text>

  <text x="400" y="412" text-anchor="middle" font-size="11" fill="#94A3B8">深夜宿直 1 名想定 / 在留外国人向け到達率向上効果は本図外</text>
</svg>
