<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="320" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">災害時多言語 SNS パイプライン (従来 30 分 → Claude 2 分)</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Step 1: 災害発生 -->
  <g>
    <rect x="20" y="110" width="110" height="60" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="75" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">災害発生</text>
    <text x="75" y="155" text-anchor="middle" font-size="11" fill="#7F1D1D">警報発令</text>
  </g>
  <line x1="130" y1="140" x2="158" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: 日本語原稿 -->
  <g>
    <rect x="160" y="110" width="110" height="60" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="215" y="133" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">日本語原稿</text>
    <text x="215" y="153" text-anchor="middle" font-size="11" fill="#64748B">本部決裁</text>
  </g>
  <line x1="270" y1="140" x2="298" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: /disaster-translate -->
  <g>
    <rect x="300" y="110" width="140" height="60" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="370" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Claude Code</text>
    <text x="370" y="147" text-anchor="middle" font-size="11" fill="#0F766E">/disaster-translate</text>
    <text x="370" y="161" text-anchor="middle" font-size="10" fill="#14B8A6">2 分</text>
  </g>
  <line x1="440" y1="140" x2="468" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: 6 言語並列出力 -->
  <g>
    <rect x="470" y="110" width="140" height="60" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="6"/>
    <text x="540" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">6 言語 + やさしい日本語</text>
    <text x="540" y="148" text-anchor="middle" font-size="11" fill="#1E40AF">en/zh-Hans/zh-Hant</text>
    <text x="540" y="162" text-anchor="middle" font-size="11" fill="#1E40AF">ko/vi/pt-BR/ja-easy</text>
  </g>
  <line x1="610" y1="140" x2="638" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: 3 点チェック -->
  <g>
    <rect x="640" y="110" width="110" height="60" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="695" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">3 点チェック</text>
    <text x="695" y="148" text-anchor="middle" font-size="10" fill="#92400E">数字/固有名詞/推量</text>
    <text x="695" y="162" text-anchor="middle" font-size="10" fill="#92400E">60 秒</text>
  </g>
  <line x1="750" y1="140" x2="778" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 6: SNS 配信 -->
  <g>
    <rect x="780" y="110" width="100" height="60" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5" rx="6"/>
    <text x="830" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">SNS 配信</text>
    <text x="830" y="155" text-anchor="middle" font-size="10" fill="#4338CA">公式アプリ手動</text>
  </g>

  <!-- 従来 vs Claude 比較バー -->
  <text x="60" y="220" font-size="13" fill="#7F1D1D" font-weight="bold">従来運用</text>
  <rect x="160" y="205" width="540" height="22" fill="#DC2626" stroke="#7F1D1D" stroke-width="1.5" rx="3"/>
  <text x="430" y="221" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">英語 1 言語のみ・30 分</text>
  <text x="715" y="222" font-size="14" fill="#7F1D1D" font-weight="bold">30 分</text>

  <text x="60" y="260" font-size="13" fill="#0F766E" font-weight="bold">Claude 運用</text>
  <rect x="160" y="245" width="36" height="22" fill="#059669" stroke="#064E3B" stroke-width="1.5" rx="3"/>
  <text x="178" y="261" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="bold">2 分</text>
  <text x="210" y="262" font-size="12" fill="#0F766E" font-weight="bold">7 言語が同時生成</text>

  <text x="450" y="300" text-anchor="middle" font-size="11" fill="#94A3B8">スケール: 1 px = 1 分 (両棒共通)</text>
</svg>
