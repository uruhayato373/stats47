<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="380" fill="#FAFAFA"/>
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">時間配分 (主催者 : 参加者 = 1 : 1)</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#64748B">30 分の中で「手を動かす時間」を必ず半分に確保する</text>

  <!-- Pie 1: ideal (1:1) -->
  <g transform="translate(220,220)">
    <!-- 主催者 15 分 (50%) right half -->
    <path d="M 0,0 L 0,-110 A 110,110 0 0 1 0,110 Z" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="2"/>
    <!-- 参加者 15 分 (50%) left half -->
    <path d="M 0,0 L 0,110 A 110,110 0 0 1 0,-110 Z" fill="#CCFBF1" stroke="#0F766E" stroke-width="2"/>

    <!-- Sub-slices: 5+5+5 in right -->
    <line x1="0" y1="0" x2="95" y2="-55" stroke="#1E3A8A" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="95" y2="55" stroke="#1E3A8A" stroke-width="1.5"/>

    <text x="55" y="-58" text-anchor="middle" font-size="11" fill="#1E3A8A" font-weight="bold">導入 5</text>
    <text x="78" y="3" text-anchor="middle" font-size="11" fill="#1E3A8A" font-weight="bold">デモ 5</text>
    <text x="55" y="65" text-anchor="middle" font-size="11" fill="#1E3A8A" font-weight="bold">質疑 5</text>
    <text x="-55" y="3" text-anchor="middle" font-size="13" fill="#0F766E" font-weight="bold">手動かし 15</text>

    <text x="0" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">理想型 (1 : 1)</text>
    <text x="0" y="166" text-anchor="middle" font-size="11" fill="#059669">やってみた率 70%+</text>
  </g>

  <!-- Pie 2: 一般 (8:2) -->
  <g transform="translate(580,220)">
    <!-- 主催者 24 分 (80%) → 0deg start, 80% of full = 288deg -->
    <!-- Start at top, sweep 288 deg clockwise -->
    <!-- end angle = -90 + 288 = 198 deg from horizontal. x=cos(198)*110, y=sin(198)*110 -->
    <!-- cos(198°)=-0.951, sin(198°)=-0.309 → x=-104.6, y=-34 -->
    <path d="M 0,0 L 0,-110 A 110,110 0 1 1 -104.6,-34 Z" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
    <!-- 参加者 6 分 (20%) remaining -->
    <path d="M 0,0 L -104.6,-34 A 110,110 0 0 1 0,-110 Z" fill="#F1F5F9" stroke="#475569" stroke-width="2"/>

    <text x="35" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#7F1D1D">主催者 24 分</text>
    <text x="35" y="40" text-anchor="middle" font-size="11" fill="#7F1D1D">(80%)</text>
    <text x="-60" y="-65" text-anchor="middle" font-size="11" fill="#475569" font-weight="bold">質疑 6 分</text>

    <text x="0" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">一般的な研修 (8 : 2)</text>
    <text x="0" y="166" text-anchor="middle" font-size="11" fill="#DC2626">やってみた率 10% 以下</text>
  </g>

  <!-- Legend -->
  <g transform="translate(80,310)">
    <rect x="0" y="0" width="14" height="14" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1"/>
    <text x="22" y="12" font-size="11" fill="#1E293B">主催者話す時間 (導入 / デモ / 質疑)</text>
    <rect x="270" y="0" width="14" height="14" fill="#CCFBF1" stroke="#0F766E" stroke-width="1"/>
    <text x="292" y="12" font-size="11" fill="#1E293B">参加者が手を動かす時間</text>
    <rect x="510" y="0" width="14" height="14" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
    <text x="532" y="12" font-size="11" fill="#1E293B">過剰な座学 (やってみた率が落ちる)</text>
  </g>

  <text x="400" y="355" text-anchor="middle" font-size="11" fill="#64748B" font-style="italic">主催者は「話したい量」を半分に削る勇気が必要。残りは参加者の体験に渡す</text>
</svg>
