    <text x="567" y="138" text-anchor="middle" font-size="10" fill="#7F1D1D">単位記法 / 30 分</text>
  </g>
  <line x1="635" y1="127" x2="658" y2="127" stroke="#64748B" stroke-width="2" marker-end="url(#arrow07f1)"/>

  <g>
    <rect x="660" y="100" width="115" height="55" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="717" y="123" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">上席 OK</text>
    <text x="717" y="141" text-anchor="middle" font-size="11" fill="#92400E">提出</text>
  </g>

  <text x="450" y="190" text-anchor="middle" font-size="14" fill="#7F1D1D" font-weight="bold">合計 修正 90 分 / 午後の予定が崩壊</text>

  <text x="450" y="225" text-anchor="middle" font-size="22" fill="#2563EB" font-weight="bold">↓ 18× faster</text>

  <!-- After -->
  <text x="40" y="265" font-size="15" fill="#0F766E" font-weight="bold">Claude Code: 一発校正 (修正 5 分)</text>

  <g>
    <rect x="80" y="285" width="160" height="65" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
