    <text x="160" y="328" text-anchor="middle" font-size="11" fill="#475569">20 分</text>
  </g>
  <line x1="240" y1="317" x2="268" y2="317" stroke="#64748B" stroke-width="2" marker-end="url(#arrow07f1)"/>

  <g>
    <rect x="270" y="285" width="200" height="65" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="370" y="307" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">/official-doc-review</text>
