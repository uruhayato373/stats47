    <text x="580" y="308" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">修正</text>
    <text x="580" y="328" text-anchor="middle" font-size="11" fill="#1E3A8A">5 分</text>
  </g>
  <line x1="660" y1="317" x2="688" y2="317" stroke="#64748B" stroke-width="2" marker-end="url(#arrow07f1)"/>

  <g>
    <rect x="690" y="285" width="160" height="65" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="770" y="308" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">上席 OK</text>
    <text x="770" y="328" text-anchor="middle" font-size="11" fill="#92400E">差し戻しゼロ</text>
