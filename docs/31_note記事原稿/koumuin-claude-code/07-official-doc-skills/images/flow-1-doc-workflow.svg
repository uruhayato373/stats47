<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="380" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">公文書作成フロー: 従来 90 分 vs Claude Code 5 分</text>

  <defs>
    <marker id="arrow07f1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Before -->
  <text x="40" y="85" font-size="15" fill="#7F1D1D" font-weight="bold">従来: 上席差し戻し 3 回 (修正合計 90 分)</text>

  <g>
    <rect x="40" y="100" width="115" height="55" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="97" y="123" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">起案</text>
    <text x="97" y="141" text-anchor="middle" font-size="11" fill="#7F1D1D">20 分</text>
  </g>
  <line x1="155" y1="127" x2="178" y2="127" stroke="#64748B" stroke-width="2" marker-end="url(#arrow07f1)"/>

  <g>
    <rect x="180" y="100" width="135" height="55" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="247" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">上席差し戻し 1 回目</text>
    <text x="247" y="138" text-anchor="middle" font-size="10" fill="#7F1D1D">送り仮名 / 修正 30 分</text>
  </g>
  <line x1="315" y1="127" x2="338" y2="127" stroke="#64748B" stroke-width="2" marker-end="url(#arrow07f1)"/>

  <g>
    <rect x="340" y="100" width="135" height="55" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="407" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">差し戻し 2 回目</text>
    <text x="407" y="138" text-anchor="middle" font-size="10" fill="#7F1D1D">接続詞階層 / 30 分</text>
  </g>
  <line x1="475" y1="127" x2="498" y2="127" stroke="#64748B" stroke-width="2" marker-end="url(#arrow07f1)"/>

  <g>
    <rect x="500" y="100" width="135" height="55" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
