<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="380" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">settings.json の hooks: 5 イベント × 書き換え / ブロック可否</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748B">UserPromptSubmit / PreToolUse / PostToolUse / Stop / Notification の発火タイミング</text>

  <!-- Timeline -->
  <line x1="60" y1="120" x2="840" y2="120" stroke="#475569" stroke-width="2"/>
  <text x="60" y="108" font-size="11" fill="#475569">起動</text>
  <text x="840" y="108" text-anchor="end" font-size="11" fill="#475569">終了</text>

  <!-- 5 event markers on timeline -->
  <!-- 1. UserPromptSubmit -->
  <circle cx="160" cy="120" r="8" fill="#2563EB" stroke="#1E3A8A" stroke-width="2"/>
  <text x="160" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">UserPromptSubmit</text>

  <!-- 2. PreToolUse -->
  <circle cx="320" cy="120" r="8" fill="#F59E0B" stroke="#92400E" stroke-width="2"/>
  <text x="320" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">PreToolUse</text>

  <!-- 3. PostToolUse -->
  <circle cx="480" cy="120" r="8" fill="#059669" stroke="#0F766E" stroke-width="2"/>
  <text x="480" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#0F766E">PostToolUse</text>

  <!-- 4. Notification -->
  <circle cx="640" cy="120" r="8" fill="#9D174D" stroke="#831843" stroke-width="2"/>
  <text x="640" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#9D174D">Notification</text>

  <!-- 5. Stop -->
  <circle cx="780" cy="120" r="8" fill="#4338CA" stroke="#312E81" stroke-width="2"/>
  <text x="780" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#312E81">Stop</text>

  <!-- Matrix table -->
  <g>
    <!-- Header -->
    <rect x="60" y="180" width="220" height="32" fill="#F1F5F9" stroke="#475569" stroke-width="1"/>
    <rect x="280" y="180" width="180" height="32" fill="#F1F5F9" stroke="#475569" stroke-width="1"/>
    <rect x="460" y="180" width="130" height="32" fill="#F1F5F9" stroke="#475569" stroke-width="1"/>
    <rect x="590" y="180" width="130" height="32" fill="#F1F5F9" stroke="#475569" stroke-width="1"/>
    <rect x="720" y="180" width="120" height="32" fill="#F1F5F9" stroke="#475569" stroke-width="1"/>
    <text x="170" y="201" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">イベント</text>
    <text x="370" y="201" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">発火条件</text>
    <text x="525" y="201" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">書き換え</text>
    <text x="655" y="201" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">ブロック</text>
    <text x="780" y="201" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">用途例</text>

    <!-- Row 1 UserPromptSubmit -->
    <rect x="60" y="212" width="220" height="30" fill="#DBEAFE" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="280" y="212" width="180" height="30" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="460" y="212" width="130" height="30" fill="#CCFBF1" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="590" y="212" width="130" height="30" fill="#CCFBF1" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="720" y="212" width="120" height="30" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.5"/>
    <text x="70" y="232" font-size="11" fill="#1E3A8A" font-weight="bold">UserPromptSubmit</text>
    <text x="290" y="232" font-size="11" fill="#475569">プロンプト送信ボタン</text>
    <text x="525" y="232" text-anchor="middle" font-size="14" font-weight="bold" fill="#059669">○</text>
    <text x="655" y="232" text-anchor="middle" font-size="14" font-weight="bold" fill="#059669">○</text>
    <text x="730" y="232" font-size="10" fill="#475569">PII マスク</text>

    <!-- Row 2 PreToolUse -->
    <rect x="60" y="242" width="220" height="30" fill="#FEF3C7" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="280" y="242" width="180" height="30" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="460" y="242" width="130" height="30" fill="#FEE2E2" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="590" y="242" width="130" height="30" fill="#CCFBF1" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="720" y="242" width="120" height="30" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.5"/>
    <text x="70" y="262" font-size="11" fill="#92400E" font-weight="bold">PreToolUse</text>
    <text x="290" y="262" font-size="11" fill="#475569">ツール実行直前</text>
    <text x="525" y="262" text-anchor="middle" font-size="14" font-weight="bold" fill="#DC2626">×</text>
    <text x="655" y="262" text-anchor="middle" font-size="14" font-weight="bold" fill="#059669">○</text>
    <text x="730" y="262" font-size="10" fill="#475569">危険コマンド阻止</text>

    <!-- Row 3 PostToolUse -->
    <rect x="60" y="272" width="220" height="30" fill="#CCFBF1" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="280" y="272" width="180" height="30" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="460" y="272" width="130" height="30" fill="#FEE2E2" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="590" y="272" width="130" height="30" fill="#FEE2E2" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="720" y="272" width="120" height="30" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.5"/>
    <text x="70" y="292" font-size="11" fill="#0F766E" font-weight="bold">PostToolUse</text>
    <text x="290" y="292" font-size="11" fill="#475569">ツール実行直後</text>
    <text x="525" y="292" text-anchor="middle" font-size="14" font-weight="bold" fill="#DC2626">×</text>
    <text x="655" y="292" text-anchor="middle" font-size="14" font-weight="bold" fill="#DC2626">×</text>
    <text x="730" y="292" font-size="10" fill="#475569">監査ログ</text>

    <!-- Row 4 Notification -->
    <rect x="60" y="302" width="220" height="30" fill="#FCE7F3" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="280" y="302" width="180" height="30" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="460" y="302" width="130" height="30" fill="#FEE2E2" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="590" y="302" width="130" height="30" fill="#FEE2E2" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="720" y="302" width="120" height="30" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.5"/>
    <text x="70" y="322" font-size="11" fill="#9D174D" font-weight="bold">Notification</text>
    <text x="290" y="322" font-size="11" fill="#475569">確認ダイアログ表示時</text>
    <text x="525" y="322" text-anchor="middle" font-size="14" font-weight="bold" fill="#DC2626">×</text>
    <text x="655" y="322" text-anchor="middle" font-size="14" font-weight="bold" fill="#DC2626">×</text>
    <text x="730" y="322" font-size="10" fill="#475569">Slack 通知</text>

    <!-- Row 5 Stop -->
    <rect x="60" y="332" width="220" height="30" fill="#E0E7FF" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="280" y="332" width="180" height="30" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="460" y="332" width="130" height="30" fill="#FEE2E2" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="590" y="332" width="130" height="30" fill="#FEE2E2" stroke="#94A3B8" stroke-width="0.5"/>
    <rect x="720" y="332" width="120" height="30" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.5"/>
    <text x="70" y="352" font-size="11" fill="#312E81" font-weight="bold">Stop</text>
    <text x="290" y="352" font-size="11" fill="#475569">セッション終了時</text>
    <text x="525" y="352" text-anchor="middle" font-size="14" font-weight="bold" fill="#DC2626">×</text>
    <text x="655" y="352" text-anchor="middle" font-size="14" font-weight="bold" fill="#DC2626">×</text>
    <text x="730" y="352" font-size="10" fill="#475569">セッション集計</text>
  </g>

  <text x="450" y="376" text-anchor="middle" font-size="10" fill="#94A3B8">○=可 / ×=不可。送信前の自動マスキング・自動ブロックは UserPromptSubmit のみ</text>
</svg>
