<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif">
  <rect width="760" height="470" rx="10" fill="#1e1e2e"/>
  <rect width="760" height="38" rx="10" fill="#313244"/>
  <rect y="20" width="760" height="18" fill="#313244"/>
  <circle cx="26" cy="19" r="6" fill="#f38ba8"/>
  <circle cx="48" cy="19" r="6" fill="#f9e2af"/>
  <circle cx="70" cy="19" r="6" fill="#a6e3a1"/>
  <text x="380" y="24" text-anchor="middle" font-size="12" fill="#9399b2">Claude Code — 自動マスキング Hook</text>
  <g font-family="'SFMono-Regular','Menlo','Consolas','Courier New',monospace" font-size="14">
    <text x="24" y="72" fill="#6c7086"># 左ペイン: Claude に渡るコンテキスト（マスキング後）</text>
    <text x="24" y="100" fill="#89b4fa">&gt; <tspan fill="#cdd6f4">田中太郎さんの電話 03-1234-5678 を整理して</tspan></text>
    <text x="24" y="128" fill="#6c7086"># Hook が context を書き換えてから Claude に送信</text>
    <text x="24" y="156" fill="#cdd6f4">[MASKED_NAME] さんの電話 [MASKED_TEL] を</text>
    <text x="24" y="180" fill="#cdd6f4">整理しました。連絡先を表に転記済みです。</text>
    <line x1="24" y1="208" x2="736" y2="208" stroke="#45475a" stroke-width="1"/>
    <text x="24" y="236" fill="#6c7086"># 右ペイン: マスキングログ JSONL（tail -f）</text>
    <text x="24" y="262" fill="#89b4fa">$ <tspan fill="#cdd6f4">tail -f .claude/logs/masking/2026-05-18.jsonl</tspan></text>
    <text x="24" y="290" fill="#bac2de">{"ts":"2026-05-18T09:12:04Z",</text>
    <text x="44" y="312" fill="#bac2de">"hits_count":2,"types":["NAME","TEL"],</text>
    <text x="44" y="334" fill="#bac2de">"cwd":"/Users/user/projects/koumuin-demo",</text>
    <text x="44" y="356" fill="#bac2de">"host":"koumuin-mac"}</text>
    <text x="24" y="384" fill="#a6e3a1">✓ 個人情報 2 件をマスキングして記録</text>
  </g>
  <rect x="0" y="412" width="760" height="40" fill="#181825"/>
  <text x="24" y="437" font-size="13" fill="#bac2de">▲ 氏名・電話が Claude に渡る前に伏字化され、ログに件数が残る</text>
</svg>
