<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="380" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">Subagents 構成: 3 役で想定再質問を洗い出す</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#64748B">メイン Claude が 3 役を並列起動 → 視点ごとの再質問を統合</text>

  <defs>
    <marker id="arrsa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Main Claude -->
  <g>
    <rect x="340" y="80" width="220" height="80" fill="#FEF3C7" stroke="#B45309" stroke-width="2" rx="6"/>
    <text x="450" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E293B">メイン Claude Code</text>
    <text x="450" y="128" text-anchor="middle" font-size="11" fill="#92400E">/anticipate-rebuttal 実行</text>
    <text x="450" y="145" text-anchor="middle" font-size="10" fill="#78350F">ドラフト答弁を 3 役に並列展開</text>
  </g>

  <!-- Arrows to 3 subagents -->
  <line x1="400" y1="160" x2="180" y2="220" stroke="#64748B" stroke-width="2" marker-end="url(#arrsa)"/>
  <line x1="450" y1="160" x2="450" y2="218" stroke="#64748B" stroke-width="2" marker-end="url(#arrsa)"/>
  <line x1="500" y1="160" x2="720" y2="220" stroke="#64748B" stroke-width="2" marker-end="url(#arrsa)"/>

  <!-- Subagent 1: opposition-member -->
  <g>
    <rect x="60" y="225" width="220" height="100" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="170" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">opposition-member</text>
    <text x="170" y="268" text-anchor="middle" font-size="11" fill="#7F1D1D">野党議員役</text>
    <text x="80" y="290" font-size="10" fill="#991B1B">・数値の根拠を問う</text>
    <text x="80" y="305" font-size="10" fill="#991B1B">・過去発言との矛盾追及</text>
    <text x="80" y="320" font-size="10" fill="#991B1B">・デメリット指摘</text>
  </g>

  <!-- Subagent 2: ruling-member -->
  <g>
    <rect x="340" y="225" width="220" height="100" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="6"/>
    <text x="450" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">ruling-member</text>
    <text x="450" y="268" text-anchor="middle" font-size="11" fill="#1E3A8A">与党議員役</text>
    <text x="360" y="290" font-size="10" fill="#1E40AF">・推進への背中押し</text>
    <text x="360" y="305" font-size="10" fill="#1E40AF">・実現時期の確認</text>
    <text x="360" y="320" font-size="10" fill="#1E40AF">・上乗せ施策の要請</text>
  </g>

  <!-- Subagent 3: citizen-observer -->
  <g>
    <rect x="620" y="225" width="220" height="100" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="730" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">citizen-observer</text>
    <text x="730" y="268" text-anchor="middle" font-size="11" fill="#0F766E">市民傍聴者役</text>
    <text x="640" y="290" font-size="10" fill="#065F46">・専門用語の分かりにくさ</text>
    <text x="640" y="305" font-size="10" fill="#065F46">・生活への影響</text>
    <text x="640" y="320" font-size="10" fill="#065F46">・素朴な疑問</text>
  </g>

  <!-- Footer -->
  <text x="450" y="360" text-anchor="middle" font-size="11" fill="#94A3B8">各役が再質問 3 個ずつ → メインが統合 → 計 9 問の想定問答リスト</text>
</svg>
