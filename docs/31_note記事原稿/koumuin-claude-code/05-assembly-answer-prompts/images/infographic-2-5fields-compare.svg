<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 410" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="410" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">5 分野別 答弁構造の違い</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#64748B">論点の中心軸が分野ごとに異なる → プロンプトも分野別に最適化</text>

  <!-- 5 cards -->
  <!-- 教育 -->
  <g>
    <rect x="40" y="90" width="160" height="280" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="2" rx="6"/>
    <rect x="40" y="90" width="160" height="40" fill="#1E3A8A" rx="6"/>
    <text x="120" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">教育</text>
    <text x="120" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E3A8A">中心軸: 児童・生徒</text>

    <text x="60" y="195" font-size="11" fill="#1E293B">論点構造:</text>
    <text x="60" y="215" font-size="10" fill="#1E40AF">・児童の権利</text>
    <text x="60" y="232" font-size="10" fill="#1E40AF">・保護者対応</text>
    <text x="60" y="249" font-size="10" fill="#1E40AF">・教員負担</text>

    <text x="60" y="285" font-size="11" fill="#1E293B">頻出論点:</text>
    <text x="60" y="305" font-size="10" fill="#1E40AF">・いじめ対応</text>
    <text x="60" y="322" font-size="10" fill="#1E40AF">・GIGA スクール</text>

    <text x="60" y="355" font-size="11" font-weight="bold" fill="#1E3A8A">プロンプト 2 本</text>
  </g>

  <!-- 福祉 -->
  <g>
    <rect x="210" y="90" width="160" height="280" fill="#FCE7F3" stroke="#9D174D" stroke-width="2" rx="6"/>
    <rect x="210" y="90" width="160" height="40" fill="#9D174D" rx="6"/>
    <text x="290" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">福祉</text>
    <text x="290" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#9D174D">中心軸: サービス受給者</text>

    <text x="230" y="195" font-size="11" fill="#1E293B">論点構造:</text>
    <text x="230" y="215" font-size="10" fill="#BE185D">・対象者の認定</text>
    <text x="230" y="232" font-size="10" fill="#BE185D">・サービス水準</text>
    <text x="230" y="249" font-size="10" fill="#BE185D">・財政負担</text>

    <text x="230" y="285" font-size="11" fill="#1E293B">頻出論点:</text>
    <text x="230" y="305" font-size="10" fill="#BE185D">・高齢者支援</text>
    <text x="230" y="322" font-size="10" fill="#BE185D">・障害者施策</text>

    <text x="230" y="355" font-size="11" font-weight="bold" fill="#9D174D">プロンプト 2 本</text>
  </g>

  <!-- 防災 -->
  <g>
    <rect x="380" y="90" width="160" height="280" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="2" rx="6"/>
    <rect x="380" y="90" width="160" height="40" fill="#7F1D1D" rx="6"/>
    <text x="460" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">防災・危機管理</text>
    <text x="460" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#7F1D1D">中心軸: 時系列対応</text>

    <text x="400" y="195" font-size="11" fill="#1E293B">論点構造:</text>
    <text x="400" y="215" font-size="10" fill="#991B1B">・発災前 (備え)</text>
    <text x="400" y="232" font-size="10" fill="#991B1B">・発災時 (初動)</text>
    <text x="400" y="249" font-size="10" fill="#991B1B">・発災後 (復旧)</text>

    <text x="400" y="285" font-size="11" fill="#1E293B">頻出論点:</text>
    <text x="400" y="305" font-size="10" fill="#991B1B">・地震対応</text>
    <text x="400" y="322" font-size="10" fill="#991B1B">・避難所運営</text>

    <text x="400" y="355" font-size="11" font-weight="bold" fill="#7F1D1D">プロンプト 2 本</text>
  </g>

  <!-- 産業振興 -->
  <g>
    <rect x="550" y="90" width="160" height="280" fill="#CCFBF1" stroke="#0F766E" stroke-width="2" rx="6"/>
    <rect x="550" y="90" width="160" height="40" fill="#0F766E" rx="6"/>
    <text x="630" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">産業振興</text>
    <text x="630" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#0F766E">中心軸: KPI / 指標</text>

    <text x="570" y="195" font-size="11" fill="#1E293B">論点構造:</text>
    <text x="570" y="215" font-size="10" fill="#065F46">・支援対象数</text>
    <text x="570" y="232" font-size="10" fill="#065F46">・効果測定</text>
    <text x="570" y="249" font-size="10" fill="#065F46">・成果報告</text>

    <text x="570" y="285" font-size="11" fill="#1E293B">頻出論点:</text>
    <text x="570" y="305" font-size="10" fill="#065F46">・中小企業支援</text>
    <text x="570" y="322" font-size="10" fill="#065F46">・観光振興</text>

    <text x="570" y="355" font-size="11" font-weight="bold" fill="#0F766E">プロンプト 2 本</text>
  </g>

  <!-- 財政 -->
  <g>
    <rect x="720" y="90" width="160" height="280" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="6"/>
    <rect x="720" y="90" width="160" height="40" fill="#92400E" rx="6"/>
    <text x="800" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">財政運営</text>
    <text x="800" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">中心軸: 数値・予算</text>

    <text x="740" y="195" font-size="11" fill="#1E293B">論点構造:</text>
    <text x="740" y="215" font-size="10" fill="#B45309">・歳入見込</text>
    <text x="740" y="232" font-size="10" fill="#B45309">・歳出抑制</text>
    <text x="740" y="249" font-size="10" fill="#B45309">・基金残高</text>

    <text x="740" y="285" font-size="11" fill="#1E293B">頻出論点:</text>
    <text x="740" y="305" font-size="10" fill="#B45309">・税制 / 補助金</text>
    <text x="740" y="322" font-size="10" fill="#B45309">・基金繰入</text>

    <text x="740" y="355" font-size="11" font-weight="bold" fill="#92400E">プロンプト 2 本</text>
  </g>

  <!-- Footer -->
  <text x="450" y="395" text-anchor="middle" font-size="11" fill="#94A3B8">有料セクション: 5 分野 × 2 本 = 10 本の専用プロンプトを提供</text>
</svg>
