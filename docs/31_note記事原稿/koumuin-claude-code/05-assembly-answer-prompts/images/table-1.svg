<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 695 640" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif"><rect width="695" height="640" fill="#ffffff"/><rect x="0" y="0" width="72" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="26.0" font-size="15" font-weight="700" fill="#ffffff">#</text><rect x="72" y="0" width="283" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="26.0" font-size="15" font-weight="700" fill="#ffffff">症状</text><rect x="355" y="0" width="340" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="369" y="26.0" font-size="15" font-weight="700" fill="#ffffff">対策</text><rect x="0" y="43" width="72" height="89" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="92.0" font-size="15" font-weight="400" fill="#1e293b">1</text><rect x="72" y="43" width="283" height="89" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="92.0" font-size="15" font-weight="400" fill="#1e293b">AI が「である調」を勝手に混ぜる</text><rect x="355" y="43" width="340" height="89" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="369" y="69.0" font-size="15" font-weight="400" fill="#1e293b">CLAUDE.md に「ですます調 100%、である調</text><text x="369" y="92.0" font-size="15" font-weight="400" fill="#1e293b">禁止」を明記し、/style-check で機械的に</text><text x="369" y="115.0" font-size="15" font-weight="400" fill="#1e293b">チェック</text><rect x="0" y="132" width="72" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="169.5" font-size="15" font-weight="400" fill="#1e293b">2</text><rect x="72" y="132" width="283" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="169.5" font-size="15" font-weight="400" fill="#1e293b">過度に断定的な表現が出る</text><rect x="355" y="132" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="369" y="158.0" font-size="15" font-weight="400" fill="#1e293b">「検討姿勢にとどめる」「目途として」を毎</text><text x="369" y="181.0" font-size="15" font-weight="400" fill="#1e293b">回指示</text><rect x="0" y="198" width="72" height="89" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="247.0" font-size="15" font-weight="400" fill="#1e293b">3</text><rect x="72" y="198" width="283" height="89" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="247.0" font-size="15" font-weight="400" fill="#1e293b">字数オーバーが頻発</text><rect x="355" y="198" width="340" height="89" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="369" y="224.0" font-size="15" font-weight="400" fill="#1e293b">「目標字数 ±10% 以内」と数値で縛る + プロ</text><text x="369" y="247.0" font-size="15" font-weight="400" fill="#1e293b">ンプトに「字数オーバーした場合は冒頭から</text><text x="369" y="270.0" font-size="15" font-weight="400" fill="#1e293b">削る」を追加</text><rect x="0" y="287" width="72" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="324.5" font-size="15" font-weight="400" fill="#1e293b">4</text><rect x="72" y="287" width="283" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="324.5" font-size="15" font-weight="400" fill="#1e293b">議員名や固有部署名を AI が推定生成</text><rect x="355" y="287" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="369" y="313.0" font-size="15" font-weight="400" fill="#1e293b">「固有名詞は『◯◯』で置換」を CLAUDE.md に</text><text x="369" y="336.0" font-size="15" font-weight="400" fill="#1e293b">明記</text><rect x="0" y="353" width="72" height="89" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="402.0" font-size="15" font-weight="400" fill="#1e293b">5</text><rect x="72" y="353" width="283" height="89" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="402.0" font-size="15" font-weight="400" fill="#1e293b">過去答弁との矛盾チェックができない</text><rect x="355" y="353" width="340" height="89" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="369" y="379.0" font-size="15" font-weight="400" fill="#1e293b">過去答弁を reference/past-answers/ に置</text><text x="369" y="402.0" font-size="15" font-weight="400" fill="#1e293b">いて参照させる + Subagents で「過去答弁チ</text><text x="369" y="425.0" font-size="15" font-weight="400" fill="#1e293b">ェック役」を作る</text><rect x="0" y="442" width="72" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="479.5" font-size="15" font-weight="400" fill="#1e293b">6</text><rect x="72" y="442" width="283" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="479.5" font-size="15" font-weight="400" fill="#1e293b">法令条文の引用が古い</text><rect x="355" y="442" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="369" y="468.0" font-size="15" font-weight="400" fill="#1e293b">reference/related-laws.md を四半期に 1 </text><text x="369" y="491.0" font-size="15" font-weight="400" fill="#1e293b">回更新 + 改正履歴を併記</text><rect x="0" y="508" width="72" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="545.5" font-size="15" font-weight="400" fill="#1e293b">7</text><rect x="72" y="508" width="283" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="545.5" font-size="15" font-weight="400" fill="#1e293b">与党/野党のバランスが取れない</text><rect x="355" y="508" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="369" y="534.0" font-size="15" font-weight="400" fill="#1e293b">プロンプトに「質問者会派」を必ず明示し、</text><text x="369" y="557.0" font-size="15" font-weight="400" fill="#1e293b">配慮ポイントを指示</text><rect x="0" y="574" width="72" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="611.5" font-size="15" font-weight="400" fill="#1e293b">8</text><rect x="72" y="574" width="283" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="611.5" font-size="15" font-weight="400" fill="#1e293b">首長の過去発言と矛盾</text><rect x="355" y="574" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="369" y="600.0" font-size="15" font-weight="400" fill="#1e293b">reference/mayor-statements.md に首長の</text><text x="369" y="623.0" font-size="15" font-weight="400" fill="#1e293b">所信表明・選挙公約を置く</text><rect x="0.5" y="0.5" width="694" height="639" fill="none" stroke="#cbd5e1" stroke-width="1.5"/></svg>