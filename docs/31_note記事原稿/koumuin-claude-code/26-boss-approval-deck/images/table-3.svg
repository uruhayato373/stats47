<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 779.1 350" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif"><rect width="779.1" height="350" fill="#ffffff"/><rect x="0" y="0" width="223" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="26.0" font-size="15" font-weight="700" fill="#ffffff">却下理由</text><rect x="223" y="0" width="216.1" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="237" y="26.0" font-size="15" font-weight="700" fill="#ffffff">表面的な対処</text><rect x="439.1" y="0" width="340" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="453.1" y="26.0" font-size="15" font-weight="700" fill="#ffffff">本当の対処</text><rect x="0" y="43" width="223" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="80.5" font-size="15" font-weight="400" fill="#1e293b">「個人情報が心配」</text><rect x="223" y="43" width="216.1" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="237" y="80.5" font-size="15" font-weight="400" fill="#1e293b">deny ルールを追加で見せる</text><rect x="439.1" y="43" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="453.1" y="69.0" font-size="15" font-weight="400" fill="#1e293b">個情担当への事前根回しをやり直す + Hook ブ</text><text x="453.1" y="92.0" font-size="15" font-weight="400" fill="#1e293b">ロック実演</text><rect x="0" y="109" width="223" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="146.5" font-size="15" font-weight="400" fill="#1e293b">「他自治体事例がない」</text><rect x="223" y="109" width="216.1" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="237" y="146.5" font-size="15" font-weight="400" fill="#1e293b">国の事例を出す</text><rect x="439.1" y="109" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="453.1" y="135.0" font-size="15" font-weight="400" fill="#1e293b">「試行で事例を作る」+ 講演登壇予定を見せ</text><text x="453.1" y="158.0" font-size="15" font-weight="400" fill="#1e293b">る</text><rect x="0" y="175" width="223" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="212.5" font-size="15" font-weight="400" fill="#1e293b">「費用負担が決まらない」</text><rect x="223" y="175" width="216.1" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="237" y="212.5" font-size="15" font-weight="400" fill="#1e293b">個人立替にする</text><rect x="439.1" y="175" width="340" height="66" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="453.1" y="201.0" font-size="15" font-weight="400" fill="#1e293b">試行段階は個人立替、本格導入で予算化を提</text><text x="453.1" y="224.0" font-size="15" font-weight="400" fill="#1e293b">案</text><rect x="0" y="241" width="223" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="278.5" font-size="15" font-weight="400" fill="#1e293b">「上席がそもそも興味なし」</text><rect x="223" y="241" width="216.1" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="237" y="278.5" font-size="15" font-weight="400" fill="#1e293b">説明会を開く</text><rect x="439.1" y="241" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="453.1" y="267.0" font-size="15" font-weight="400" fill="#1e293b">上席の困りごとを 1 つ Claude Code で解いて</text><text x="453.1" y="290.0" font-size="15" font-weight="400" fill="#1e293b">見せる</text><rect x="0" y="307" width="223" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="333.0" font-size="15" font-weight="400" fill="#1e293b">「LGWAN 制約に抵触」</text><rect x="223" y="307" width="216.1" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="237" y="333.0" font-size="15" font-weight="400" fill="#1e293b">抵触しないと反論</text><rect x="439.1" y="307" width="340" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="453.1" y="333.0" font-size="15" font-weight="400" fill="#1e293b">インターネット系業務に限定して再申請</text><rect x="0.5" y="0.5" width="778.1" height="349" fill="none" stroke="#cbd5e1" stroke-width="