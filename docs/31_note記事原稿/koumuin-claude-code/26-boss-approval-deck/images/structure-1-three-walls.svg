<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="340" fill="#FAFAFA"/>
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">自治体導入の 3 つの壁と突破アクション</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#64748B">提案者が事前に準備しておけば、ほぼ突破できる</text>

  <defs>
    <marker id="arr26-2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Header row -->
  <rect x="40" y="80" width="220" height="36" fill="#1E293B" rx="4"/>
  <text x="150" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">壁</text>
  <rect x="270" y="80" width="220" height="36" fill="#1E293B" rx="4"/>
  <text x="380" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">中身</text>
  <rect x="500" y="80" width="260" height="36" fill="#0F766E" rx="4"/>
  <text x="630" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">提案者側アクション</text>

  <!-- Wall 1: 前例なし -->
  <rect x="40" y="125" width="220" height="60" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5" rx="4"/>
  <text x="150" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#7F1D1D">前例なし</text>
  <text x="150" y="170" text-anchor="middle" font-size="11" fill="#7F1D1D">「他自治体で導入実績は?」</text>

  <rect x="270" y="125" width="220" height="60" fill="#FEF3C7" stroke="#92400E" stroke-width="1" rx="4"/>
  <text x="380" y="150" text-anchor="middle" font-size="11" fill="#1E293B">本格導入のハードルが高い</text>
  <text x="380" y="170" text-anchor="middle" font-size="11" fill="#1E293B">→ 通常稟議が通らない</text>

  <line x1="490" y1="155" x2="508" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#arr26-2)"/>

  <rect x="500" y="125" width="260" height="60" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="4"/>
  <text x="630" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#0F766E">「試行」扱いで小さく始める</text>
  <text x="630" y="170" text-anchor="middle" font-size="11" fill="#475569">3 ヶ月限定 / 1 人 / 月 ¥3000</text>

  <!-- Wall 2: 個情整合 -->
  <rect x="40" y="195" width="220" height="60" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5" rx="4"/>
  <text x="150" y="220" text-anchor="middle" font-size="14" font-weight="bold" fill="#7F1D1D">個情整合</text>
  <text x="150" y="240" text-anchor="middle" font-size="11" fill="#7F1D1D">「PII が外部送信されないか?」</text>

  <rect x="270" y="195" width="220" height="60" fill="#FEF3C7" stroke="#92400E" stroke-width="1" rx="4"/>
  <text x="380" y="220" text-anchor="middle" font-size="11" fill="#1E293B">個情保護条例との整合性</text>
  <text x="380" y="240" text-anchor="middle" font-size="11" fill="#1E293B">監査でログを示せるか</text>

  <line x1="490" y1="225" x2="508" y2="225" stroke="#475569" stroke-width="1.5" marker-end="url(#arr26-2)"/>

  <rect x="500" y="195" width="260" height="60" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="4"/>
  <text x="630" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#0F766E">deny ルール + hooks 監査ログ</text>
  <text x="630" y="240" text-anchor="middle" font-size="11" fill="#475569">settings.json で送信先固定</text>

  <!-- Wall 3: 費用負担 -->
  <rect x="40" y="265" width="220" height="60" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5" rx="4"/>
  <text x="150" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="#7F1D1D">費用負担</text>
  <text x="150" y="310" text-anchor="middle" font-size="11" fill="#7F1D1D">「予算費目にない」</text>

  <rect x="270" y="265" width="220" height="60" fill="#FEF3C7" stroke="#92400E" stroke-width="1" rx="4"/>
  <text x="380" y="290" text-anchor="middle" font-size="11" fill="#1E293B">公費契約には議会承認が必要</text>
  <text x="380" y="310" text-anchor="middle" font-size="11" fill="#1E293B">→ 時間がかかる</text>

  <line x1="490" y1="295" x2="508" y2="295" stroke="#475569" stroke-width="1.5" marker-end="url(#arr26-2)"/>

  <rect x="500" y="265" width="260" height="60" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="4"/>
  <text x="630" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#0F766E">個人決裁範囲で自費試行</text>
  <text x="630" y="310" text-anchor="middle" font-size="11" fill="#475569">効果証明後に公費化を提案</text>
</svg>
