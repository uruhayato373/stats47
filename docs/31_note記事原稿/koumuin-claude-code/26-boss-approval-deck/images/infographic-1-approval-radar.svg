<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="450" fill="#FAFAFA"/>
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">承認確率を上げる 5 要素 (寄与度レーダー)</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#64748B">体感値 / 5 段階 / 中心 0 → 外周 5</text>

  <!-- Radar grid -->
  <g transform="translate(400,250)">
    <!-- Pentagon grid lines (5 levels) -->
    <polygon points="0,-160 152,-49 94,128 -94,128 -152,-49" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
    <polygon points="0,-128 122,-40 75,103 -75,103 -122,-40" fill="none" stroke="#E2E8F0" stroke-width="0.8"/>
    <polygon points="0,-96 91,-30 56,77 -56,77 -91,-30" fill="none" stroke="#E2E8F0" stroke-width="0.8"/>
    <polygon points="0,-64 61,-20 38,51 -38,51 -61,-20" fill="none" stroke="#E2E8F0" stroke-width="0.8"/>
    <polygon points="0,-32 30,-10 19,26 -19,26 -30,-10" fill="none" stroke="#E2E8F0" stroke-width="0.8"/>

    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="-160" stroke="#94A3B8" stroke-width="1"/>
    <line x1="0" y1="0" x2="152" y2="-49" stroke="#94A3B8" stroke-width="1"/>
    <line x1="0" y1="0" x2="94" y2="128" stroke="#94A3B8" stroke-width="1"/>
    <line x1="0" y1="0" x2="-94" y2="128" stroke="#94A3B8" stroke-width="1"/>
    <line x1="0" y1="0" x2="-152" y2="-49" stroke="#94A3B8" stroke-width="1"/>

    <!-- Data polygon: 5要素 (2段構え=5, deny=4, ROI=4, 3段稟議=3, 事前根回し=5) -->
    <!-- 5 * (160/5) = 160, 4 * 32 = 128, 3 * 32 = 96 -->
    <!-- top=0,-160 (5), TR=121,-39 (4), BR=56,77 (3), BL=-94,128 (5), TL=-152,-49 (5) -->
    <polygon points="0,-160 121,-39 56,77 -94,128 -152,-49"
             fill="#2563EB" fill-opacity="0.25" stroke="#1E3A8A" stroke-width="2"/>

    <!-- Data dots -->
    <circle cx="0" cy="-160" r="4" fill="#1E3A8A"/>
    <circle cx="121" cy="-39" r="4" fill="#1E3A8A"/>
    <circle cx="56" cy="77" r="4" fill="#1E3A8A"/>
    <circle cx="-94" cy="128" r="4" fill="#1E3A8A"/>
    <circle cx="-152" cy="-49" r="4" fill="#1E3A8A"/>
  </g>

  <!-- Labels -->
  <text x="400" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">2 段構え資料</text>
  <text x="400" y="90" text-anchor="middle" font-size="11" fill="#1E3A8A">★ ★ ★ ★ ★</text>

  <text x="575" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">deny ルール実物</text>
  <text x="575" y="216" text-anchor="middle" font-size="11" fill="#1E3A8A">★ ★ ★ ★</text>

  <text x="495" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">3 段階稟議</text>
  <text x="495" y="416" text-anchor="middle" font-size="11" fill="#1E3A8A">★ ★ ★</text>

  <text x="295" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">事前根回し</text>
  <text x="295" y="416" text-anchor="middle" font-size="11" fill="#1E3A8A">★ ★ ★ ★ ★</text>

  <text x="225" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">金額換算 ROI</text>
  <text x="225" y="216" text-anchor="middle" font-size="11" fill="#1E3A8A">★ ★ ★ ★</text>

  <text x="400" y="445" text-anchor="middle" font-size="11" fill="#94A3B8">※ 体感値ベース。組織風土で順序は変動するが、5 要素すべてを揃えると承認確率が大きく上がる</text>
</svg>
