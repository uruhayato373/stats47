<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="440" fill="#FAFAFA"/>
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">Claude Code 導入 前後 3 指標</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748B">起案 1 件ベースの効果 / 自己査読時間は増えるが総時間は大幅減</text>

  <!-- Indicator 1: 差し戻し回数 -->
  <text x="50" y="100" font-size="14" font-weight="bold" fill="#1E293B">① 月あたり差し戻し回数</text>

  <text x="50" y="135" font-size="12" fill="#7F1D1D" font-weight="bold">Before</text>
  <rect x="130" y="115" width="320" height="32" fill="#DC2626" stroke="#7F1D1D" stroke-width="1.5" rx="3"/>
  <text x="290" y="136" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">8 件 / 月</text>

  <text x="50" y="170" font-size="12" fill="#1E3A8A" font-weight="bold">After</text>
  <rect x="130" y="155" width="80" height="32" fill="#2563EB" stroke="#1E3A8A" stroke-width="1.5" rx="3"/>
  <text x="170" y="176" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">2 件</text>
  <text x="220" y="176" font-size="13" fill="#1E3A8A" font-weight="bold">(75% 削減)</text>

  <!-- Indicator 2: 決裁完了までの日数 -->
  <text x="50" y="220" font-size="14" font-weight="bold" fill="#1E293B">② 決裁完了までの平均日数</text>

  <text x="50" y="255" font-size="12" fill="#7F1D1D" font-weight="bold">Before</text>
  <rect x="130" y="235" width="420" height="32" fill="#EA580C" stroke="#7C2D12" stroke-width="1.5" rx="3"/>
  <text x="340" y="256" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">14 日</text>

  <text x="50" y="290" font-size="12" fill="#1E3A8A" font-weight="bold">After</text>
  <rect x="130" y="275" width="150" height="32" fill="#2563EB" stroke="#1E3A8A" stroke-width="1.5" rx="3"/>
  <text x="205" y="296" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">5 日</text>
  <text x="290" y="296" font-size="13" fill="#1E3A8A" font-weight="bold">(2.8× 短縮)</text>

  <!-- Indicator 3: 自己査読時間 -->
  <text x="50" y="340" font-size="14" font-weight="bold" fill="#1E293B">③ 提出前の自己査読時間 (1 件)</text>

  <text x="50" y="375" font-size="12" fill="#7F1D1D" font-weight="bold">Before</text>
  <rect x="130" y="355" width="50" height="28" fill="#F59E0B" stroke="#78350F" stroke-width="1.5" rx="3"/>
  <text x="190" y="373" font-size="12" fill="#92400E" font-weight="bold">5 分</text>

  <text x="50" y="408" font-size="12" fill="#1E3A8A" font-weight="bold">After</text>
  <rect x="130" y="388" width="150" height="28" fill="#2563EB" stroke="#1E3A8A" stroke-width="1.5" rx="3"/>
  <text x="205" y="406" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">15 分</text>
  <text x="290" y="406" font-size="12" fill="#475569">(増えるが総時間は大幅減)</text>

  <!-- スケール注釈 -->
  <line x1="130" y1="425" x2="670" y2="425" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="400" y="438" text-anchor="middle" font-size="10" fill="#94A3B8">スケール: 各指標で独立 (棒長は相対比較用)</text>
</svg>
