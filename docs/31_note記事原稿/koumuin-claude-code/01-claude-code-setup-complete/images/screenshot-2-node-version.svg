<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 298" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif">
  <rect width="760" height="298" rx="10" fill="#1e1e2e"/>
  <rect width="760" height="38" rx="10" fill="#313244"/>
  <rect y="20" width="760" height="18" fill="#313244"/>
  <circle cx="26" cy="19" r="6" fill="#f38ba8"/>
  <circle cx="48" cy="19" r="6" fill="#f9e2af"/>
  <circle cx="70" cy="19" r="6" fill="#a6e3a1"/>
  <text x="380" y="24" text-anchor="middle" font-size="12" fill="#9399b2">ターミナル</text>
  <g font-family="'SFMono-Regular','Menlo','Consolas','Courier New',monospace" font-size="15">
    <text x="24" y="78" fill="#6c7086"># Homebrew で node@20 をインストールした後</text>
    <text x="24" y="106" fill="#89b4fa">$ <tspan fill="#cdd6f4">node -v</tspan></text>
    <text x="24" y="134" fill="#a6e3a1">v20.11.0</text>
    <text x="24" y="162" fill="#89b4fa">$ <tspan fill="#cdd6f4">npm -v</tspan></text>
    <text x="24" y="190" fill="#a6e3a1">10.2.4</text>
    <text x="24" y="218" fill="#89b4fa">$ <tspan fill="#cdd6f4">which node</tspan></text>
    <text x="24" y="246" fill="#bac2de">/opt/homebrew/bin/node</text>
  </g>
  <rect x="0" y="258" width="760" height="40" fill="#181825"/>
  <text x="24" y="283" font-size="13" fill="#bac2de">▲ node -v で v20 系が表示されれば前提クリア</text>
</svg>
