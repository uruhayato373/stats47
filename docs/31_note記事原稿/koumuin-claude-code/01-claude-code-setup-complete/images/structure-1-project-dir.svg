<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="340" fill="#FAFAFA"/>
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">プロジェクトディレクトリ構成</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#64748B">~/work/claude-test/ 配下の構成 (claude /init 直後)</text>

  <!-- Project root box -->
  <rect x="60" y="80" width="680" height="230" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4" rx="8"/>
  <text x="80" y="105" font-size="12" fill="#64748B" font-weight="bold">~/work/claude-test/  (プロジェクトルート)</text>

  <!-- CLAUDE.md -->
  <g>
    <rect x="100" y="130" width="200" height="60" fill="#FEF3C7" stroke="#B45309" stroke-width="2" rx="6"/>
    <text x="200" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">CLAUDE.md</text>
    <text x="200" y="175" text-anchor="middle" font-size="11" fill="#92400E">プロジェクト指示書 (中核)</text>
  </g>

  <!-- .claude/ -->
  <g>
    <rect x="320" y="130" width="180" height="60" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="410" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">.claude/</text>
    <text x="410" y="175" text-anchor="middle" font-size="11" fill="#0F766E">skills / settings.json</text>
  </g>

  <!-- transcripts/ -->
  <g>
    <rect x="520" y="130" width="180" height="60" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5" rx="6"/>
    <text x="610" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">transcripts/</text>
    <text x="610" y="175" text-anchor="middle" font-size="11" fill="#4338CA">Whisper 出力 .json</text>
  </g>

  <!-- drafts/ -->
  <g>
    <rect x="100" y="220" width="200" height="60" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5" rx="6"/>
    <text x="200" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">drafts/</text>
    <text x="200" y="265" text-anchor="middle" font-size="11" fill="#9D174D">整形後の議事録 .md</text>
  </g>

  <!-- reference/ -->
  <g>
    <rect x="320" y="220" width="180" height="60" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="6"/>
    <text x="410" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">reference/</text>
    <text x="410" y="265" text-anchor="middle" font-size="11" fill="#1E40AF">文体ルール / 用語集</text>
  </g>

  <!-- .gitignore -->
  <g>
    <rect x="520" y="220" width="180" height="60" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="610" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">.gitignore</text>
    <text x="610" y="265" text-anchor="middle" font-size="11" fill="#64748B">.env / 個人情報除外</text>
  </g>

  <!-- Footer note -->
  <text x="400" y="305" text-anchor="middle" font-size="11" fill="#94A3B8">CLAUDE.md を中心に skills / templates / reference が連携する設計</text>
</svg>
