<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="380" fill="#FAFAFA"/>
  <text x="400" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">推奨ルート vs 庁内ルート: 所要時間・コスト比較</text>
  <text x="400" y="60" text-anchor="middle" font-size="12" fill="#64748B">「使い始めるまで」の現実的なコスト</text>

  <!-- 推奨ルート (私物 PC) -->
  <g>
    <rect x="60" y="90" width="320" height="240" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="2" rx="8"/>
    <text x="220" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E3A8A">推奨: 私物 PC + モバイル WiFi</text>

    <text x="80" y="160" font-size="13" fill="#1E293B" font-weight="bold">所要時間</text>
    <rect x="80" y="170" width="280" height="32" fill="#2563EB" stroke="#1E3A8A" stroke-width="1.5" rx="4"/>
    <text x="220" y="191" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">30 分</text>

    <text x="80" y="230" font-size="13" fill="#1E293B" font-weight="bold">月額コスト</text>
    <rect x="80" y="240" width="220" height="32" fill="#2563EB" stroke="#1E3A8A" stroke-width="1.5" rx="4"/>
    <text x="190" y="261" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">¥3,000-5,000</text>

    <text x="80" y="298" font-size="11" fill="#1E40AF">即日開始可 / 稟議不要 / 自由度最大</text>
    <text x="80" y="315" font-size="11" fill="#1E40AF">庁内データは扱わない前提</text>
  </g>

  <!-- 庁内ルート -->
  <g>
    <rect x="420" y="90" width="320" height="240" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="2" rx="8"/>
    <text x="580" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#7F1D1D">庁内 PC + プロキシ正攻法</text>

    <text x="440" y="160" font-size="13" fill="#1E293B" font-weight="bold">所要時間</text>
    <rect x="440" y="170" width="280" height="32" fill="#DC2626" stroke="#7F1D1D" stroke-width="1.5" rx="4"/>
    <text x="580" y="191" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">2-3 ヶ月 (稟議含む)</text>

    <text x="440" y="230" font-size="13" fill="#1E293B" font-weight="bold">追加コスト</text>
    <rect x="440" y="240" width="280" height="32" fill="#DC2626" stroke="#7F1D1D" stroke-width="1.5" rx="4"/>
    <text x="580" y="261" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">承認待ち + 評価書作成</text>

    <text x="440" y="298" font-size="11" fill="#7F1D1D">情シス交渉 / セキュリティ評価書 / 監査ログ</text>
    <text x="440" y="315" font-size="11" fill="#7F1D1D">運用が脆く突然止まるリスクあり</text>
  </g>

  <!-- 矢印 -->
  <text x="400" y="358" text-anchor="middle" font-size="13" fill="#475569" font-weight="bold">→ 最初の半年は私物環境での習熟を推奨</text>
</svg>
