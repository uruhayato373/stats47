<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="280" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">監査ログ自動化フロー (hooks → audit.tsv → 月次提出)</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#64748B">情シス向けに「監査ログ取れます」と言える運用</text>

  <defs>
    <marker id="arrowha" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Step 1: User prompt -->
  <g>
    <rect x="30" y="105" width="130" height="70" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="95" y="132" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">プロンプト送信</text>
    <text x="95" y="152" text-anchor="middle" font-size="11" fill="#64748B">claude CLI</text>
    <text x="95" y="167" text-anchor="middle" font-size="10" fill="#94A3B8">職員が業務質問</text>
  </g>
  <line x1="160" y1="140" x2="195" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrowha)"/>

  <!-- Step 2: PreToolUse hook -->
  <g>
    <rect x="200" y="105" width="160" height="70" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="280" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">PreToolUse hook</text>
    <text x="280" y="148" text-anchor="middle" font-size="11" fill="#92400E">settings.json</text>
    <text x="280" y="163" text-anchor="middle" font-size="10" fill="#B45309">matcher: ".*" で全捕捉</text>
  </g>
  <line x1="360" y1="140" x2="395" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrowha)"/>

  <!-- Step 3: shell command -->
  <g>
    <rect x="400" y="105" width="160" height="70" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="480" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">echo &gt;&gt; audit.tsv</text>
    <text x="480" y="143" text-anchor="middle" font-size="10" fill="#0F766E">date / tool / project</text>
    <text x="480" y="160" text-anchor="middle" font-size="10" fill="#14B8A6">追記 (append-only)</text>
  </g>
  <line x1="560" y1="140" x2="595" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrowha)"/>

  <!-- Step 4: audit.tsv -->
  <g>
    <rect x="600" y="105" width="160" height="70" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5" rx="6"/>
    <text x="680" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">~/.claude/logs/</text>
    <text x="680" y="146" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338CA">audit.tsv</text>
    <text x="680" y="163" text-anchor="middle" font-size="10" fill="#6366F1">ローカル保存 (6 ヶ月)</text>
  </g>
  <line x1="760" y1="140" x2="795" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrowha)"/>

  <!-- Step 5: monthly report -->
  <g>
    <rect x="800" y="105" width="80" height="70" fill="#FCE7F3" stroke="#9D174D" stroke-width="2" rx="6"/>
    <text x="840" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">月次</text>
    <text x="840" y="148" text-anchor="middle" font-size="11" fill="#9D174D">情シス</text>
    <text x="840" y="163" text-anchor="middle" font-size="11" fill="#9D174D">提出</text>
  </g>

  <!-- Footer code sample -->
  <rect x="60" y="210" width="780" height="50" fill="#1E293B" stroke="#0F172A" stroke-width="1" rx="4"/>
  <text x="80" y="232" font-size="11" fill="#94A3B8" font-family="monospace">$ tail -2 ~/.claude/logs/audit.tsv</text>
  <text x="80" y="250" font-size="11" fill="#DBEAFE" font-family="monospace">2026-05-18T10:24:01Z  Read   /Users/koumuin/work/meetings</text>
</svg>
