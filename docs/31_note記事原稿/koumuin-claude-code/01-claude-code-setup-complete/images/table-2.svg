<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1054.2 456" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif"><rect width="1054.2" height="456" fill="#ffffff"/><rect x="0" y="0" width="72" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="26.0" font-size="15" font-weight="700" fill="#ffffff">#</text><rect x="72" y="0" width="340" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="26.0" font-size="15" font-weight="700" fill="#ffffff">症状</text><rect x="412" y="0" width="302.20000000000005" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="26.0" font-size="15" font-weight="700" fill="#ffffff">原因</text><rect x="714.2" y="0" width="340" height="43" fill="#1e293b" stroke="#e2e8f0" stroke-width="1"/><text x="728.2" y="26.0" font-size="15" font-weight="700" fill="#ffffff">解決</text><rect x="0" y="43" width="72" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="69.0" font-size="15" font-weight="400" fill="#1e293b">1</text><rect x="72" y="43" width="340" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="69.0" font-size="15" font-weight="400" fill="#1e293b">node -v が v14.x や v16.x</text><rect x="412" y="43" width="302.20000000000005" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="69.0" font-size="15" font-weight="400" fill="#1e293b">OS 標準 Node が古い</text><rect x="714.2" y="43" width="340" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="728.2" y="69.0" font-size="15" font-weight="400" fill="#1e293b">nvm install 20 で v20 を別途入れる</text><rect x="0" y="86" width="72" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="123.5" font-size="15" font-weight="400" fill="#1e293b">2</text><rect x="72" y="86" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="112.0" font-size="15" font-weight="400" fill="#1e293b">npm install -g で EACCES: permission den</text><text x="86" y="135.0" font-size="15" font-weight="400" fill="#1e293b">ied</text><rect x="412" y="86" width="302.20000000000005" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="123.5" font-size="15" font-weight="400" fill="#1e293b">グローバル prefix が /usr/local</text><rect x="714.2" y="86" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="728.2" y="123.5" font-size="15" font-weight="400" fill="#1e293b">npm config set prefix ~/.npm-global</text><rect x="0" y="152" width="72" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="178.0" font-size="15" font-weight="400" fill="#1e293b">3</text><rect x="72" y="152" width="340" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="178.0" font-size="15" font-weight="400" fill="#1e293b">claude コマンドが見つからない</text><rect x="412" y="152" width="302.20000000000005" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="178.0" font-size="15" font-weight="400" fill="#1e293b">PATH に ~/.npm-global/bin がない</text><rect x="714.2" y="152" width="340" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="728.2" y="178.0" font-size="15" font-weight="400" fill="#1e293b">export PATH=~/.npm-global/bin:$PATH</text><rect x="0" y="195" width="72" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="232.5" font-size="15" font-weight="400" fill="#1e293b">4</text><rect x="72" y="195" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="232.5" font-size="15" font-weight="400" fill="#1e293b">WSL 内で日本語が文字化け</text><rect x="412" y="195" width="302.20000000000005" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="232.5" font-size="15" font-weight="400" fill="#1e293b">ロケール未設定</text><rect x="714.2" y="195" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="728.2" y="221.0" font-size="15" font-weight="400" fill="#1e293b">sudo locale-gen ja_JP.UTF-8 &amp;&amp; export L</text><text x="728.2" y="244.0" font-size="15" font-weight="400" fill="#1e293b">ANG=ja_JP.UTF-8</text><rect x="0" y="261" width="72" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="287.0" font-size="15" font-weight="400" fill="#1e293b">5</text><rect x="72" y="261" width="340" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="287.0" font-size="15" font-weight="400" fill="#1e293b">API キーが認識されない</text><rect x="412" y="261" width="302.20000000000005" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="287.0" font-size="15" font-weight="400" fill="#1e293b">.zshrc 再読み込みし忘れ</text><rect x="714.2" y="261" width="340" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="728.2" y="287.0" font-size="15" font-weight="400" fill="#1e293b">source ~/.zshrc or ターミナル再起動</text><rect x="0" y="304" width="72" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="330.0" font-size="15" font-weight="400" fill="#1e293b">6</text><rect x="72" y="304" width="340" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="330.0" font-size="15" font-weight="400" fill="#1e293b">プロキシ環境で git clone が SSL エラー</text><rect x="412" y="304" width="302.20000000000005" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="330.0" font-size="15" font-weight="400" fill="#1e293b">CA 証明書未登録</text><rect x="714.2" y="304" width="340" height="43" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="728.2" y="330.0" font-size="15" font-weight="400" fill="#1e293b">4-2 を参照</text><rect x="0" y="347" width="72" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="373.0" font-size="15" font-weight="400" fill="#1e293b">7</text><rect x="72" y="347" width="340" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="373.0" font-size="15" font-weight="400" fill="#1e293b">npm install が E407 で止まる</text><rect x="412" y="347" width="302.20000000000005" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="373.0" font-size="15" font-weight="400" fill="#1e293b">プロキシ認証情報の URL エンコード抜け</text><rect x="714.2" y="347" width="340" height="43" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="728.2" y="373.0" font-size="15" font-weight="400" fill="#1e293b">@ を %40 等に変換</text><rect x="0" y="390" width="72" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="14" y="427.5" font-size="15" font-weight="400" fill="#1e293b">8</text><rect x="72" y="390" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="86" y="416.0" font-size="15" font-weight="400" fill="#1e293b">Claude Code 起動後 Authentication faile</text><text x="86" y="439.0" font-size="15" font-weight="400" fill="#1e293b">d</text><rect x="412" y="390" width="302.20000000000005" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="426" y="427.5" font-size="15" font-weight="400" fill="#1e293b">API キー先頭末尾の空白混入</text><rect x="714.2" y="390" width="340" height="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/><text x="728.2" y="427.5" font-size="15" font-weight="400" fill="#1e293b">echo $ANTHROPIC_API_KEY</text><rect x="0.5" y="0.5" width="1053.2" height="455" fill="none" stroke="#cbd5e1" stroke-width="1.5"/></svg>