<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 408" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif">
  <rect width="760" height="408" rx="10" fill="#1e1e2e"/>
  <rect width="760" height="34" rx="10" fill="#323233"/>
  <rect y="18" width="760" height="16" fill="#323233"/>
  <text x="380" y="22" text-anchor="middle" font-size="11" fill="#cccccc">claude-test — Visual Studio Code</text>
  <!-- activity bar -->
  <rect x="0" y="34" width="48" height="306" fill="#333333"/>
  <!-- file tree -->
  <rect x="48" y="34" width="190" height="306" fill="#252526"/>
  <text x="62" y="58" font-size="11" fill="#bbbbbb">エクスプローラー</text>
  <text x="62" y="84" font-size="12" fill="#cccccc">CLAUDE-TEST</text>
  <text x="78" y="106" font-size="12" fill="#cccccc">drafts/</text>
  <text x="78" y="126" font-size="12" fill="#cccccc">transcripts/</text>
  <text x="78" y="146" font-size="12" fill="#cccccc">CLAUDE.md</text>
  <!-- editor area -->
  <rect x="238" y="34" width="522" height="226" fill="#1e1e1e"/>
  <text x="256" y="64" font-size="12" fill="#6a9955"># 議事録整形プロジェクト</text>
  <text x="256" y="92" font-size="12" fill="#9cdcfe">CLAUDE.md を /init で自動生成した状態</text>
  <!-- integrated terminal -->
  <rect x="238" y="260" width="522" height="80" fill="#181818"/>
  <g font-family="'SFMono-Regular','Menlo','Consolas','Courier New',monospace" font-size="13">
    <text x="252" y="284" fill="#89b4fa">user@HOME-PC:~/work/claude-test$ <tspan fill="#cdd6f4">claude</tspan></text>
    <text x="252" y="308" fill="#cdd6f4">Claude Code へようこそ。指示を入力してください。</text>
    <text x="252" y="330" fill="#89b4fa">&gt; <tspan fill="#6c7086">_</tspan></text>
  </g>
  <!-- status bar -->
  <rect x="0" y="340" width="760" height="24" fill="#16825d"/>
  <circle cx="22" cy="352" r="4" fill="#a6e3a1"/>
  <text x="34" y="356" font-size="11" fill="#ffffff">WSL: Ubuntu-22.04</text>
  <!-- caption strip -->
  <rect x="0" y="364" width="760" height="44" fill="#181825"/>
  <text x="24" y="391" font-size="13" fill="#bac2de">▲ VS Code が WSL に接続し、統合ターミナルで Claude Code が起動</text>
</svg>
