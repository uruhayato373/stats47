<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="420" fill="#FAFAFA"/>
  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">ログ容量推移 5 年比較: 何もしない / zip / zip+GPG</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#64748B">保管 5 年を前提とした 3 ケースのディスク使用量とリスク</text>

  <!-- Y axis -->
  <line x1="120" y1="100" x2="120" y2="340" stroke="#475569" stroke-width="1.5"/>
  <line x1="120" y1="340" x2="820" y2="340" stroke="#475569" stroke-width="1.5"/>

  <!-- Y axis labels (0, 3GB, 6GB, 9GB, 12GB) -->
  <text x="108" y="344" text-anchor="end" font-size="11" fill="#475569">0</text>
  <line x1="115" y1="280" x2="120" y2="280" stroke="#475569" stroke-width="1"/>
  <text x="108" y="284" text-anchor="end" font-size="11" fill="#475569">3 GB</text>
  <line x1="115" y1="220" x2="120" y2="220" stroke="#475569" stroke-width="1"/>
  <text x="108" y="224" text-anchor="end" font-size="11" fill="#475569">6 GB</text>
  <line x1="115" y1="160" x2="120" y2="160" stroke="#475569" stroke-width="1"/>
  <text x="108" y="164" text-anchor="end" font-size="11" fill="#475569">9 GB</text>
  <line x1="115" y1="100" x2="120" y2="100" stroke="#475569" stroke-width="1"/>
  <text x="108" y="104" text-anchor="end" font-size="11" fill="#475569">12 GB</text>
  <line x1="120" y1="100" x2="820" y2="100" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Scale: 240px = 12GB → 1GB = 20px, baseline y=340 -->
  <!-- Bar 1: 12GB → height=240, y=100 -->
  <rect x="200" y="100" width="120" height="240" fill="#DC2626" stroke="#7F1D1D" stroke-width="1.5" rx="3"/>
  <text x="260" y="220" text-anchor="middle" font-size="22" font-weight="bold" fill="#FFFFFF">12 GB</text>
  <text x="260" y="245" text-anchor="middle" font-size="12" fill="#FEE2E2">5 年累計</text>

  <text x="260" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">何もしない</text>
  <text x="260" y="378" text-anchor="middle" font-size="10" fill="#64748B">JSONL 生のまま蓄積</text>
  <text x="260" y="392" text-anchor="middle" font-size="10" fill="#7F1D1D">読込遅延・改ざんリスク</text>
  <text x="260" y="406" text-anchor="middle" font-size="10" fill="#7F1D1D">監査時に grep 困難</text>

  <!-- Bar 2: 2GB → height=40, y=300 -->
  <rect x="400" y="300" width="120" height="40" fill="#F59E0B" stroke="#92400E" stroke-width="1.5" rx="3"/>
  <text x="460" y="324" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">2 GB</text>

  <text x="460" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">月次 zip のみ</text>
  <text x="460" y="378" text-anchor="middle" font-size="10" fill="#64748B">90 日経過 → zip アーカイブ</text>
  <text x="460" y="392" text-anchor="middle" font-size="10" fill="#92400E">改ざんリスク残る</text>
  <text x="460" y="406" text-anchor="middle" font-size="10" fill="#92400E">復号鍵管理なし</text>

  <!-- Bar 3: 1.8GB → height=36, y=304 -->
  <rect x="600" y="304" width="120" height="36" fill="#059669" stroke="#0F766E" stroke-width="1.5" rx="3"/>
  <text x="660" y="326" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">1.8 GB</text>

  <text x="660" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">zip + GPG 暗号化</text>
  <text x="660" y="378" text-anchor="middle" font-size="10" fill="#64748B">復号鍵は監査担当者保管</text>
  <text x="660" y="392" text-anchor="middle" font-size="10" fill="#059669">二重承認で改ざん防止</text>
  <text x="660" y="406" text-anchor="middle" font-size="10" fill="#059669">推奨 ★</text>
</svg>
