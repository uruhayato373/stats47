<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="320" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">/ordinance-review 実行フロー</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748B">ファイル読込 → 矛盾 4 観点 → 文体 8 観点 → 上位法照合 → 他自治体比較 → 出力</text>

  <defs>
    <marker id="arrow06f2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <g>
    <rect x="30" y="110" width="130" height="80" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="95" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">1. ファイル読込</text>
    <text x="95" y="156" text-anchor="middle" font-size="11" fill="#475569">current/ revision/</text>
    <text x="95" y="172" text-anchor="middle" font-size="11" fill="#475569">reference/ peers/</text>
  </g>
  <line x1="160" y1="150" x2="183" y2="150" stroke="#64748B" stroke-width="2" marker-end="url(#arrow06f2)"/>

  <!-- Step 2: 矛盾検出 -->
  <g>
    <rect x="185" y="110" width="140" height="80" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="255" y="132" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">2. 矛盾検出</text>
    <text x="255" y="152" text-anchor="middle" font-size="10" fill="#7F1D1D">定義ずれ / 引用切れ</text>
    <text x="255" y="167" text-anchor="middle" font-size="10" fill="#7F1D1D">項ずれ / 上位法不整合</text>
    <text x="255" y="182" text-anchor="middle" font-size="10" fill="#475569">(4 観点)</text>
  </g>
  <line x1="325" y1="150" x2="348" y2="150" stroke="#64748B" stroke-width="2" marker-end="url(#arrow06f2)"/>

  <!-- Step 3: 文体統一 -->
  <g>
    <rect x="350" y="110" width="140" height="80" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="420" y="132" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">3. 文体統一</text>
    <text x="420" y="152" text-anchor="middle" font-size="10" fill="#92400E">送り仮名 / 漢字使用</text>
    <text x="420" y="167" text-anchor="middle" font-size="10" fill="#92400E">及び・並びに 階層</text>
    <text x="420" y="182" text-anchor="middle" font-size="10" fill="#475569">(8 観点)</text>
  </g>
  <line x1="490" y1="150" x2="513" y2="150" stroke="#64748B" stroke-width="2" marker-end="url(#arrow06f2)"/>

  <!-- Step 4: 上位法照合 -->
  <g>
    <rect x="515" y="110" width="140" height="80" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="6"/>
    <text x="585" y="132" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">4. 上位法照合</text>
    <text x="585" y="152" text-anchor="middle" font-size="10" fill="#1E3A8A">引用条文番号</text>
    <text x="585" y="167" text-anchor="middle" font-size="10" fill="#1E3A8A">最新版整合</text>
    <text x="585" y="182" text-anchor="middle" font-size="10" fill="#475569">(reference/)</text>
  </g>
  <line x1="655" y1="150" x2="678" y2="150" stroke="#64748B" stroke-width="2" marker-end="url(#arrow06f2)"/>

  <!-- Step 5: peers 比較 -->
  <g>
    <rect x="680" y="110" width="140" height="80" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5" rx="6"/>
    <text x="750" y="132" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">5. 他自治体比較</text>
    <text x="750" y="152" text-anchor="middle" font-size="10" fill="#4338CA">類似条例との差異</text>
    <text x="750" y="167" text-anchor="middle" font-size="10" fill="#4338CA">検討事項抽出</text>
    <text x="750" y="182" text-anchor="middle" font-size="10" fill="#475569">(任意・peers/)</text>
  </g>

  <!-- 出力 -->
  <g>
    <rect x="280" y="235" width="340" height="60" fill="#CCFBF1" stroke="#0F766E" stroke-width="2.5" rx="6"/>
    <text x="450" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#065F46">6. output/review-result.md 書き出し</text>
    <text x="450" y="278" text-anchor="middle" font-size="11" fill="#0F766E">4 表構成 (矛盾 / 文体 / 上位法 / 他自治体) — 起案文に貼付可</text>
  </g>

  <!-- 矢印: 全 step → output -->
  <line x1="750" y1="190" x2="750" y2="215" stroke="#64748B" stroke-width="1.5"/>
  <line x1="750" y1="215" x2="620" y2="215" stroke="#64748B" stroke-width="1.5"/>
  <line x1="620" y1="215" x2="620" y2="230" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow06f2)"/>
</svg>
