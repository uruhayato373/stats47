<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="380" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">条例レビュー 4 ディレクトリ構成と入力ファイル</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748B">~/work/ordinance-2026-05/ 配下 — Claude Code が @dir/ で一括参照</text>

  <defs>
    <marker id="arrow06s1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Project root -->
  <rect x="40" y="80" width="820" height="240" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4" rx="8"/>
  <text x="60" y="103" font-size="12" fill="#64748B" font-weight="bold">~/work/ordinance-2026-05/  (作業ルート)</text>

  <!-- current/ -->
  <g>
    <rect x="70" y="125" width="180" height="100" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="6"/>
    <text x="160" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">current/</text>
    <text x="160" y="170" text-anchor="middle" font-size="11" fill="#1E3A8A">現行条例</text>
    <text x="160" y="190" text-anchor="middle" font-size="10" fill="#1E40AF">ordinance.txt</text>
    <text x="160" y="208" text-anchor="middle" font-size="10" fill="#475569">(例規集 / pdftotext)</text>
  </g>

  <!-- revision/ -->
  <g>
    <rect x="270" y="125" width="180" height="100" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5" rx="6"/>
    <text x="360" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">revision/</text>
    <text x="360" y="170" text-anchor="middle" font-size="11" fill="#7F1D1D">改正案 (起案中)</text>
    <text x="360" y="190" text-anchor="middle" font-size="10" fill="#7F1D1D">ordinance.txt</text>
    <text x="360" y="208" text-anchor="middle" font-size="10" fill="#475569">(溶け込み or 改め文)</text>
  </g>

  <!-- reference/ -->
  <g>
    <rect x="470" y="125" width="180" height="100" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="560" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">reference/</text>
    <text x="560" y="170" text-anchor="middle" font-size="11" fill="#92400E">上位法・政令・省令</text>
    <text x="560" y="190" text-anchor="middle" font-size="10" fill="#92400E">local-autonomy-law.xml</text>
    <text x="560" y="208" text-anchor="middle" font-size="10" fill="#475569">(e-Gov 法令検索 API)</text>
  </g>

  <!-- peers/ -->
  <g>
    <rect x="670" y="125" width="180" height="100" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.5" rx="6"/>
    <text x="760" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">peers/</text>
    <text x="760" y="170" text-anchor="middle" font-size="11" fill="#4338CA">他自治体類似条例</text>
    <text x="760" y="190" text-anchor="middle" font-size="10" fill="#4338CA">yokohama.txt 等</text>
    <text x="760" y="208" text-anchor="middle" font-size="10" fill="#475569">(参考・任意)</text>
  </g>

  <!-- output/ -->
  <g>
    <rect x="270" y="245" width="380" height="60" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="460" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E293B">output/</text>
    <text x="460" y="290" text-anchor="middle" font-size="11" fill="#0F766E">レビュー結果 (review-result.md) を Claude Code が書き出し</text>
  </g>

  <!-- Arrows: 4 inputs → output -->
  <line x1="160" y1="225" x2="290" y2="245" stroke="#64748B" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow06s1)"/>
  <line x1="360" y1="225" x2="400" y2="245" stroke="#64748B" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow06s1)"/>
  <line x1="560" y1="225" x2="510" y2="245" stroke="#64748B" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow06s1)"/>
  <line x1="760" y1="225" x2="620" y2="245" stroke="#64748B" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow06s1)"/>

  <text x="450" y="350" text-anchor="middle" font-size="12" fill="#475569" font-style="italic">Claude Code が @current/ @revision/ @reference/ @peers/ で一括参照</text>
</svg>
