<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="1280" height="670">
<style>
  text { font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif; }
</style>

<!-- Background -->
<rect width="1280" height="670" fill="#fafafa"/>
<rect x="0" y="0" width="1280" height="14" fill="#b45309"/>

<!-- Series brand -->
<text x="80" y="98" font-size="22" font-weight="500" fill="#475569">公務員 × Claude Code</text>
<line x1="80" y1="118" x2="200" y2="118" stroke="#b45309" stroke-width="3" stroke-linecap="round"/>
<text x="80" y="158" font-size="14" font-weight="500" fill="#94a3b8" letter-spacing="2">JICHITAI × AI SERIES</text>

<!-- Number badge (left) -->
<circle cx="110" cy="290" r="90" fill="#fef3c7"/>
<circle cx="110" cy="290" r="82" fill="none" stroke="#b45309" stroke-width="2"/>
<text x="110" y="318" text-anchor="middle" font-size="84" font-weight="900" fill="#b45309">29</text>

<!-- Category chip (under badge) -->
<rect x="40" y="394" width="140" height="32" rx="16" fill="#b45309"/>
<text x="110" y="415" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="1">CAREER</text>
<text x="250" y="336" font-size="44" font-weight="bold" fill="#1e293b">公務員が副業せずに Claude Code スキルで評価</text>
<text x="250" y="394" font-size="44" font-weight="bold" fill="#1e293b">される 5 つの場</text>

<!-- Paid/Free badge -->
<rect x="1060" y="78" width="160" height="40" rx="20" fill="#dcfce7"/>
<text x="1140" y="104" text-anchor="middle" font-size="16" font-weight="700" fill="#16a34a">無料公開</text>

<!-- Footer -->
<line x1="80" y1="600" x2="1200" y2="600" stroke="#e2e8f0" stroke-width="1"/>
<text x="80" y="635" font-size="16" font-weight="600" fill="#64748b">公務員のための実務 AI 活用</text>
<text x="1200" y="635" text-anchor="end" font-size="16" font-weight="500" fill="#94a3b8">stats47.jp</text>
</svg>
