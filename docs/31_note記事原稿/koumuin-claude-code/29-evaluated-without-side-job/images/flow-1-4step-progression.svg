<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="380" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">課内勉強会 → 人事課研修プログラム化への 4 ステップ</text>

  <defs>
    <marker id="arr29-1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Step 1: 課内勉強会 -->
  <g>
    <rect x="40" y="80" width="190" height="200" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="2" rx="6"/>
    <circle cx="75" cy="110" r="18" fill="#2563EB"/>
    <text x="75" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">1</text>
    <text x="110" y="116" font-size="14" font-weight="bold" fill="#1E3A8A">課内勉強会</text>

    <text x="60" y="148" font-size="11" fill="#1E293B" font-weight="bold">期間: 3-6 ヶ月</text>
    <line x1="55" y1="158" x2="215" y2="158" stroke="#1E3A8A" stroke-width="0.3"/>
    <text x="60" y="180" font-size="10" fill="#475569">必要実績</text>
    <text x="60" y="196" font-size="10" fill="#1E293B">・月 1 開催 × 4 回</text>
    <text x="60" y="212" font-size="10" fill="#1E293B">・参加率 70%+</text>
    <text x="60" y="228" font-size="10" fill="#1E293B">・やってみた率 30%+</text>
    <text x="60" y="252" font-size="10" fill="#475569" font-weight="bold">次段階の判定条件</text>
    <text x="60" y="268" font-size="10" fill="#0F766E">他課から「呼んでほしい」</text>
  </g>
  <line x1="230" y1="180" x2="258" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arr29-1)"/>

  <!-- Step 2: 他課出張 -->
  <g>
    <rect x="260" y="80" width="190" height="200" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="6"/>
    <circle cx="295" cy="110" r="18" fill="#D97706"/>
    <text x="295" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">2</text>
    <text x="330" y="116" font-size="14" font-weight="bold" fill="#92400E">他課出張</text>

    <text x="280" y="148" font-size="11" fill="#1E293B" font-weight="bold">期間: 6 ヶ月-1 年</text>
    <line x1="275" y1="158" x2="435" y2="158" stroke="#92400E" stroke-width="0.3"/>
    <text x="280" y="180" font-size="10" fill="#475569">必要実績</text>
    <text x="280" y="196" font-size="10" fill="#1E293B">・他課 3 つ以上で実施</text>
    <text x="280" y="212" font-size="10" fill="#1E293B">・課長クラスの紹介あり</text>
    <text x="280" y="228" font-size="10" fill="#1E293B">・成果事例 1 件以上</text>
    <text x="280" y="252" font-size="10" fill="#475569" font-weight="bold">次段階の判定条件</text>
    <text x="280" y="268" font-size="10" fill="#0F766E">部長 / 人事課が認知</text>
  </g>
  <line x1="450" y1="180" x2="478" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arr29-1)"/>

  <!-- Step 3: 全庁研修 -->
  <g>
    <rect x="480" y="80" width="190" height="200" fill="#CCFBF1" stroke="#0F766E" stroke-width="2" rx="6"/>
    <circle cx="515" cy="110" r="18" fill="#059669"/>
    <text x="515" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">3</text>
    <text x="550" y="116" font-size="14" font-weight="bold" fill="#0F766E">全庁研修</text>

    <text x="500" y="148" font-size="11" fill="#1E293B" font-weight="bold">期間: 1 年-1.5 年</text>
    <line x1="495" y1="158" x2="655" y2="158" stroke="#0F766E" stroke-width="0.3"/>
    <text x="500" y="180" font-size="10" fill="#475569">必要実績</text>
    <text x="500" y="196" font-size="10" fill="#1E293B">・人事課オファー</text>
    <text x="500" y="212" font-size="10" fill="#1E293B">・参加者 50 名 + アンケ 80%</text>
    <text x="500" y="228" font-size="10" fill="#1E293B">・他自治体問い合わせ</text>
    <text x="500" y="252" font-size="10" fill="#475569" font-weight="bold">次段階の判定条件</text>
    <text x="500" y="268" font-size="10" fill="#0F766E">単発 → 定例化の提案</text>
  </g>
  <line x1="670" y1="180" x2="698" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arr29-1)"/>

  <!-- Step 4: 人事課研修プログラム化 -->
  <g>
    <rect x="700" y="80" width="190" height="200" fill="#FCE7F3" stroke="#9D174D" stroke-width="2" rx="6"/>
    <circle cx="735" cy="110" r="18" fill="#9D174D"/>
    <text x="735" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">4</text>
    <text x="770" y="116" font-size="13" font-weight="bold" fill="#9D174D">プログラム化</text>

    <text x="720" y="148" font-size="11" fill="#1E293B" font-weight="bold">期間: 2-3 年で完成</text>
    <line x1="715" y1="158" x2="875" y2="158" stroke="#9D174D" stroke-width="0.3"/>
    <text x="720" y="180" font-size="10" fill="#475569">獲得物</text>
    <text x="720" y="196" font-size="10" fill="#1E293B">・年次研修カリキュラム</text>
    <text x="720" y="212" font-size="10" fill="#1E293B">・人事評価で「庁内講師」</text>
    <text x="720" y="228" font-size="10" fill="#1E293B">・他自治体への登壇依頼</text>
    <text x="720" y="252" font-size="10" fill="#9D174D" font-weight="bold">→ 国派遣 / 退職後</text>
    <text x="720" y="268" font-size="10" fill="#9D174D" font-weight="bold">　キャリア接続</text>
  </g>

  <text x="450" y="320" text-anchor="middle" font-size="12" fill="#1E3A8A" font-weight="bold">★ 各段階で「次の段階の人に呼ばれる」が判定条件。自薦ではなく他薦が成立して初めて進む</text>
  <text x="450" y="345" text-anchor="middle" font-size="11" fill="#64748B">スキップ厳禁: ステップ 1 を飛ばして全庁研修に行くと「実績の裏付けがない」と評価されない</text>
  <text x="450" y="365" text-anchor="middle" font-size="11" fill="#94A3B8">合計 2-3 年で「人事課研修プログラムの講師」という庁内アセットに到達できる</text>
</svg>
