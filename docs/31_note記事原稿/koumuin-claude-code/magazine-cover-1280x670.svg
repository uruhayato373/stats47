<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="1280" height="670">
<style>
  text { font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif; }
</style>

<!-- Background -->
<rect width="1280" height="670" fill="#0f172a"/>

<!-- Top accent bar: 8 category colors -->
<rect x="0"    y="0" width="160" height="14" fill="#2563eb"/>
<rect x="160"  y="0" width="160" height="14" fill="#059669"/>
<rect x="320"  y="0" width="160" height="14" fill="#dc2626"/>
<rect x="480"  y="0" width="160" height="14" fill="#7c3aed"/>
<rect x="640"  y="0" width="160" height="14" fill="#ea580c"/>
<rect x="800"  y="0" width="160" height="14" fill="#0891b2"/>
<rect x="960"  y="0" width="160" height="14" fill="#4f46e5"/>
<rect x="1120" y="0" width="160" height="14" fill="#b45309"/>

<!-- Subtle grid -->
<g opacity="0.05" stroke="#ffffff" stroke-width="1">
  <line x1="0" y1="180" x2="1280" y2="180"/>
  <line x1="0" y1="450" x2="1280" y2="450"/>
</g>

<!-- Eyebrow -->
<text x="80" y="92" font-size="17" font-weight="600" fill="#94a3b8" letter-spacing="3">JICHITAI × AI — 自治体職員のための実務 AI 活用</text>
<line x1="80" y1="108" x2="240" y2="108" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>

<!-- 全31本 pill -->
<rect x="1024" y="68" width="176" height="44" rx="22" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
<text x="1112" y="96" text-anchor="middle" font-size="17" font-weight="700" fill="#38bdf8">全 31 本シリーズ</text>

<!-- Main title -->
<text x="640" y="258" text-anchor="middle" font-size="76" font-weight="900" fill="#f8fafc">公務員 × Claude Code</text>
<text x="640" y="356" text-anchor="middle" font-size="76" font-weight="900" fill="#38bdf8">実務活用ガイド</text>

<!-- Scope line -->
<text x="640" y="424" text-anchor="middle" font-size="21" font-weight="500" fill="#cbd5e1">環境構築・議事録・議会答弁・セキュリティ・データ活用・組織導入まで</text>

<!-- Category chips -->
<g font-size="14" font-weight="700" fill="#ffffff">
  <rect x="71"   y="476" width="130" height="38" rx="19" fill="#2563eb"/>
  <text x="136"  y="500" text-anchor="middle">環境構築</text>
  <rect x="215"  y="476" width="130" height="38" rx="19" fill="#059669"/>
  <text x="280"  y="500" text-anchor="middle">文書作成</text>
  <rect x="359"  y="476" width="130" height="38" rx="19" fill="#dc2626"/>
  <text x="424"  y="500" text-anchor="middle">セキュリティ</text>
  <rect x="503"  y="476" width="130" height="38" rx="19" fill="#7c3aed"/>
  <text x="568"  y="500" text-anchor="middle">データ活用</text>
  <rect x="647"  y="476" width="130" height="38" rx="19" fill="#ea580c"/>
  <text x="712"  y="500" text-anchor="middle">広報</text>
  <rect x="791"  y="476" width="130" height="38" rx="19" fill="#0891b2"/>
  <text x="856"  y="500" text-anchor="middle">自動化</text>
  <rect x="935"  y="476" width="130" height="38" rx="19" fill="#4f46e5"/>
  <text x="1000" y="500" text-anchor="middle">組織導入</text>
  <rect x="1079" y="476" width="130" height="38" rx="19" fill="#b45309"/>
  <text x="1144" y="500" text-anchor="middle">キャリア</text>
</g>

<!-- Footer -->
<line x1="80" y1="600" x2="1200" y2="600" stroke="#1e293b" stroke-width="1"/>
<text x="80" y="634" font-size="16" font-weight="500" fill="#94a3b8">元自治体職員 × 統計サイト stats47.jp 運営者による実務ガイド</text>
<text x="1200" y="634" text-anchor="end" font-size="16" font-weight="600" fill="#38bdf8">stats47.jp</text>
</svg>
