<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="420" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">個人情報送信を防ぐ 3 層ガード構造</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748B">PreToolUse hook + permissions deny + Memory 方針 — 各層が違う事故を防ぐ</text>

  <defs>
    <marker id="arrow10s1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- 起案者 -->
  <g>
    <rect x="40" y="100" width="140" height="60" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="110" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">公務員</text>
    <text x="110" y="145" text-anchor="middle" font-size="11" fill="#475569">Claude Code 利用</text>
  </g>
  <line x1="180" y1="130" x2="218" y2="130" stroke="#64748B" stroke-width="2" marker-end="url(#arrow10s1)"/>

  <!-- Layer 1: hook -->
  <g>
    <rect x="220" y="90" width="200" height="240" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="2.5" rx="8"/>
    <text x="320" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="#7F1D1D">Layer 1: 技術ブロック</text>
    <text x="320" y="135" text-anchor="middle" font-size="11" fill="#7F1D1D">PreToolUse hook</text>

    <line x1="240" y1="148" x2="400" y2="148" stroke="#7F1D1D" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="240" y="170" font-size="11" font-weight="bold" fill="#1E293B">pre-tool-use-pii-check.sh</text>
    <text x="240" y="190" font-size="10" fill="#475569">正規表現で 9 種検出:</text>
    <text x="240" y="208" font-size="10" fill="#1E293B">- 電話番号</text>
    <text x="240" y="222" font-size="10" fill="#1E293B">- マイナンバー (12 桁)</text>
    <text x="240" y="236" font-size="10" fill="#1E293B">- 郵便番号</text>
    <text x="240" y="250" font-size="10" fill="#1E293B">- 氏名 + 様</text>
    <text x="240" y="264" font-size="10" fill="#1E293B">- 生保 / 障害認定</text>
    <text x="240" y="278" font-size="10" fill="#1E293B">- 税情報</text>

    <text x="240" y="302" font-size="10" fill="#7F1D1D" font-weight="bold">検出 → exit 1 で Read 中断</text>
    <text x="240" y="318" font-size="10" fill="#475569" font-style="italic">防ぐ事故: 内容ベース漏洩</text>
  </g>
  <line x1="420" y1="210" x2="448" y2="210" stroke="#64748B" stroke-width="2" marker-end="url(#arrow10s1)"/>

  <!-- Layer 2: permissions -->
  <g>
    <rect x="450" y="90" width="200" height="240" fill="#FEF3C7" stroke="#92400E" stroke-width="2.5" rx="8"/>
    <text x="550" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400E">Layer 2: フォルダ隔離</text>
    <text x="550" y="135" text-anchor="middle" font-size="11" fill="#92400E">permissions.deny</text>

    <line x1="470" y1="148" x2="630" y2="148" stroke="#92400E" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="470" y="170" font-size="11" font-weight="bold" fill="#1E293B">settings.json deny:</text>
    <text x="470" y="190" font-size="10" fill="#475569">フォルダ・ファイル名で禁止</text>
    <text x="470" y="208" font-size="10" fill="#1E293B">- ./personal-data/**</text>
    <text x="470" y="222" font-size="10" fill="#1E293B">- ~/Documents/住民*</text>
    <text x="470" y="236" font-size="10" fill="#1E293B">- ~/Documents/税*</text>
    <text x="470" y="250" font-size="10" fill="#1E293B">- **/*個人情報*</text>
    <text x="470" y="264" font-size="10" fill="#1E293B">- /Volumes/secret/**</text>
    <text x="470" y="278" font-size="10" fill="#1E293B">- Bash(curl *住民*)</text>

    <text x="470" y="302" font-size="10" fill="#92400E" font-weight="bold">deny は allow より優先</text>
    <text x="470" y="318" font-size="10" fill="#475569" font-style="italic">防ぐ事故: パス指定ミス</text>
  </g>
  <line x1="650" y1="210" x2="678" y2="210" stroke="#64748B" stroke-width="2" marker-end="url(#arrow10s1)"/>

  <!-- Layer 3: Memory -->
  <g>
    <rect x="680" y="90" width="200" height="240" fill="#CCFBF1" stroke="#0F766E" stroke-width="2.5" rx="8"/>
    <text x="780" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="#0F766E">Layer 3: 行動規範</text>
    <text x="780" y="135" text-anchor="middle" font-size="11" fill="#0F766E">CLAUDE.md (Memory)</text>

    <line x1="700" y1="148" x2="860" y2="148" stroke="#0F766E" stroke-width="0.5" stroke-dasharray="2,2"/>

    <text x="700" y="170" font-size="11" font-weight="bold" fill="#1E293B">機微情報の扱い方針:</text>
    <text x="700" y="190" font-size="10" fill="#475569">AI に自発的に確認させる</text>
    <text x="700" y="208" font-size="10" fill="#1E293B">- Read 前に確認質問</text>
    <text x="700" y="222" font-size="10" fill="#1E293B">- ファイル名警告</text>
    <text x="700" y="236" font-size="10" fill="#1E293B">- マスキング提案</text>
    <text x="700" y="250" font-size="10" fill="#1E293B">- 最終判断は人間</text>
    <text x="700" y="264" font-size="10" fill="#1E293B">- AI 利用を起案に注記</text>

    <text x="700" y="295" font-size="10" fill="#0F766E" font-weight="bold">単体では弱い (補完層)</text>
    <text x="700" y="311" font-size="10" fill="#475569" font-style="italic">防ぐ事故: hook すり抜け</text>
  </g>

  <!-- 注釈 -->
  <text x="450" y="370" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="bold">3 層揃えると「うっかり投げて懲戒」のリスクを技術的に大幅軽減</text>
  <text x="450" y="392" text-anchor="middle" font-size="11" fill="#64748B">完全防御ではない → 「個人情報含有ファイルは AI 作業フォルダに入れない」運用を併用</text>
</svg>
