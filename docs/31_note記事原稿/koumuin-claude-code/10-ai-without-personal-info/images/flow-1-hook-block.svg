<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="900" height="360" fill="#FAFAFA"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">PreToolUse hook が個人情報を検出してブロックするフロー</text>

  <defs>
    <marker id="arrow10f1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arrow10b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- Step 1: Claude Read -->
  <g>
    <rect x="30" y="110" width="140" height="70" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="100" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Claude Code</text>
    <text x="100" y="155" text-anchor="middle" font-size="11" fill="#475569">Read tool 実行</text>
    <text x="100" y="171" text-anchor="middle" font-size="10" fill="#475569">test-pii/dummy.txt</text>
  </g>
  <line x1="170" y1="145" x2="198" y2="145" stroke="#64748B" stroke-width="2" marker-end="url(#arrow10f1)"/>

  <!-- Step 2: hook 起動 -->
  <g>
    <rect x="200" y="110" width="160" height="70" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="6"/>
    <text x="280" y="132" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">PreToolUse hook</text>
    <text x="280" y="151" text-anchor="middle" font-size="11" fill="#1E3A8A">pii-check.sh 起動</text>
    <text x="280" y="167" text-anchor="middle" font-size="10" fill="#475569">stdin: JSON payload</text>
  </g>
  <line x1="360" y1="145" x2="388" y2="145" stroke="#64748B" stroke-width="2" marker-end="url(#arrow10f1)"/>

  <!-- Step 3: 正規表現検査 -->
  <g>
    <rect x="390" y="110" width="170" height="70" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="6"/>
    <text x="475" y="132" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">grep -E PATTERNS</text>
    <text x="475" y="151" text-anchor="middle" font-size="10" fill="#92400E">9 種正規表現で検査</text>
    <text x="475" y="167" text-anchor="middle" font-size="10" fill="#92400E">(電話/マイナ/氏名+様 等)</text>
  </g>
  <line x1="560" y1="145" x2="588" y2="145" stroke="#64748B" stroke-width="2" marker-end="url(#arrow10f1)"/>

  <!-- Step 4: 判定分岐 -->
  <g>
    <polygon points="630,110 720,145 630,180 540,145" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5"/>
    <text x="630" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">検出?</text>
  </g>

  <!-- Yes path: blocked -->
  <line x1="720" y1="145" x2="748" y2="145" stroke="#DC2626" stroke-width="2" marker-end="url(#arrow10b)"/>
  <text x="725" y="138" font-size="10" fill="#DC2626" font-weight="bold">YES</text>

  <g>
    <rect x="750" y="110" width="130" height="70" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="2" rx="6"/>
    <text x="815" y="132" text-anchor="middle" font-size="13" font-weight="bold" fill="#7F1D1D">exit 1</text>
    <text x="815" y="150" text-anchor="middle" font-size="11" fill="#7F1D1D">BLOCKED</text>
    <text x="815" y="167" text-anchor="middle" font-size="10" fill="#7F1D1D">stderr に警告出力</text>
  </g>

  <!-- No path: pass -->
  <line x1="630" y1="180" x2="630" y2="240" stroke="#059669" stroke-width="2" marker-end="url(#arrow10f1)"/>
  <text x="645" y="215" font-size="10" fill="#059669" font-weight="bold">NO</text>

  <g>
    <rect x="565" y="240" width="130" height="55" fill="#CCFBF1" stroke="#0F766E" stroke-width="2" rx="6"/>
    <text x="630" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#0F766E">exit 0</text>
    <text x="630" y="280" text-anchor="middle" font-size="10" fill="#0F766E">Read 続行 → AI 送信</text>
  </g>

  <!-- 警告出力詳細 -->
  <g>
    <rect x="200" y="240" width="320" height="80" fill="#FFFFFF" stroke="#7F1D1D" stroke-width="1.5" stroke-dasharray="4,3" rx="6"/>
    <text x="360" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="#7F1D1D">stderr 出力例</text>
    <text x="215" y="280" font-size="10" fill="#1E293B" font-family="monospace">BLOCKED: 個人情報パターンを検出</text>
    <text x="215" y="295" font-size="10" fill="#1E293B" font-family="monospace">ファイル: test-pii/dummy.txt</text>
    <text x="215" y="310" font-size="10" fill="#1E293B" font-family="monospace">- [0-9]{3}-[0-9]{4}-[0-9]{4}</text>
  </g>
  <line x1="815" y1="180" x2="520" y2="265" stroke="#DC2626" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow10b)"/>
</svg>
