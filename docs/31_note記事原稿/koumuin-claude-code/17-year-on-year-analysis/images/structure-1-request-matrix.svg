<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif">
  <rect width="800" height="400" fill="#FAFAFA"/>
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">決算分析の依頼源 × 要求軸マトリクス</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#64748B">同じ「款別歳出推移」でも依頼源で期間・集計軸が違う</text>

  <!-- Column headers (要求軸) -->
  <g>
    <rect x="220" y="90" width="120" height="36" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="4"/>
    <text x="280" y="113" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E3A8A">款別</text>
  </g>
  <g>
    <rect x="345" y="90" width="120" height="36" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="4"/>
    <text x="405" y="113" text-anchor="middle" font-size="12" font-weight="bold" fill="#0F766E">事業別</text>
  </g>
  <g>
    <rect x="470" y="90" width="120" height="36" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="4"/>
    <text x="530" y="113" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">目的別</text>
  </g>
  <g>
    <rect x="595" y="90" width="120" height="36" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5" rx="4"/>
    <text x="655" y="113" text-anchor="middle" font-size="12" font-weight="bold" fill="#9D174D">性質別</text>
  </g>

  <!-- Row 1: 議会事務局 -->
  <g>
    <rect x="60" y="140" width="150" height="60" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="135" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">議会事務局</text>
    <text x="135" y="184" text-anchor="middle" font-size="10" fill="#64748B">9 月議会前繁忙</text>
  </g>
  <rect x="220" y="140" width="120" height="60" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="4"/>
  <text x="280" y="165" text-anchor="middle" font-size="11" fill="#1E3A8A">3 年分</text>
  <text x="280" y="184" text-anchor="middle" font-size="10" fill="#1E40AF">不用額ベスト 10</text>

  <rect x="345" y="140" width="120" height="60" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="4"/>
  <text x="405" y="165" text-anchor="middle" font-size="11" fill="#0F766E">大幅増減のみ</text>
  <text x="405" y="184" text-anchor="middle" font-size="10" fill="#0F766E">±20% 超</text>

  <rect x="470" y="140" width="120" height="60" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="530" y="172" text-anchor="middle" font-size="10" fill="#94A3B8">−</text>

  <rect x="595" y="140" width="120" height="60" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="655" y="172" text-anchor="middle" font-size="10" fill="#94A3B8">−</text>

  <!-- Row 2: 財政課 -->
  <g>
    <rect x="60" y="210" width="150" height="60" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="135" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">財政課</text>
    <text x="135" y="254" text-anchor="middle" font-size="10" fill="#64748B">10 年推移分析</text>
  </g>
  <rect x="220" y="210" width="120" height="60" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="4"/>
  <text x="280" y="235" text-anchor="middle" font-size="11" fill="#1E3A8A">10 年分</text>
  <text x="280" y="254" text-anchor="middle" font-size="10" fill="#1E40AF">構成比推移</text>

  <rect x="345" y="210" width="120" height="60" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="405" y="242" text-anchor="middle" font-size="10" fill="#94A3B8">−</text>

  <rect x="470" y="210" width="120" height="60" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5" rx="4"/>
  <text x="530" y="235" text-anchor="middle" font-size="11" fill="#92400E">住民向け</text>
  <text x="530" y="254" text-anchor="middle" font-size="10" fill="#92400E">広報誌活用</text>

  <rect x="595" y="210" width="120" height="60" fill="#FCE7F3" stroke="#9D174D" stroke-width="1.5" rx="4"/>
  <text x="655" y="235" text-anchor="middle" font-size="11" fill="#9D174D">義務的経費</text>
  <text x="655" y="254" text-anchor="middle" font-size="10" fill="#9D174D">人件費/公債費</text>

  <!-- Row 3: 各事業課 -->
  <g>
    <rect x="60" y="280" width="150" height="60" fill="#F1F5F9" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="135" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">各事業課</text>
    <text x="135" y="324" text-anchor="middle" font-size="10" fill="#64748B">5 年推移分析</text>
  </g>
  <rect x="220" y="280" width="120" height="60" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="280" y="312" text-anchor="middle" font-size="10" fill="#94A3B8">−</text>

  <rect x="345" y="280" width="120" height="60" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5" rx="4"/>
  <text x="405" y="305" text-anchor="middle" font-size="11" fill="#0F766E">5 年分</text>
  <text x="405" y="324" text-anchor="middle" font-size="10" fill="#0F766E">自課事業のみ</text>

  <rect x="470" y="280" width="120" height="60" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="530" y="312" text-anchor="middle" font-size="10" fill="#94A3B8">−</text>

  <rect x="595" y="280" width="120" height="60" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="655" y="312" text-anchor="middle" font-size="10" fill="#94A3B8">−</text>

  <!-- Bottom note -->
  <text x="400" y="375" text-anchor="middle" font-size="11" fill="#64748B">→ queries.sql に 5 切り口を固定化し、依頼源別にプロンプトを切り替える</text>
</svg>
