<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670">
<style>
  text { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
</style>
<rect width="1280" height="670" fill="#ffffff"/>

<!-- Decorative background elements -->
<circle cx="1080" cy="120" r="200" fill="#eff6ff" opacity="0.35"/>
<circle cx="200" cy="580" r="160" fill="#eef2ff" opacity="0.3"/>
<circle cx="640" cy="400" r="300" fill="#f8fafc" opacity="0.4"/>

<!-- stats47 watermark -->
<text x="1250" y="35" text-anchor="end" font-size="18" fill="#cbd5e1">stats47</text>

<!-- Lead text -->
<text x="640" y="110" text-anchor="middle" font-size="32" fill="#64748b">大都市を持たない北関東3県が財政上位の理由</text>

<!-- Main catch: big numbers -->
<text x="640" y="250" text-anchor="middle" font-size="140" font-weight="900" fill="#1e40af">8・11・12位</text>

<!-- Era label -->
<text x="640" y="305" text-anchor="middle" font-size="38" font-weight="bold" fill="#1e293b">北関東3県が「財政優等生」</text>

<!-- Subtitle -->
<text x="640" y="355" text-anchor="middle" font-size="24" fill="#94a3b8">── 財政力指数で茨城・栃木・群馬が全国トップ12 ──</text>

<!-- Mini bar chart: fiscal strength index for 3 prefectures + national avg -->
<!-- Scale: 0.4 = 0px, 0.7 = 360px (1px per 0.000833) -->
<!-- Baseline x=380 -->

<!-- 茨城 0.621 (8位) -->
<text x="360" y="430" text-anchor="end" font-size="18" fill="#475569">8位 茨城県</text>
<rect x="380" y="412" width="265" height="24" fill="#1e40af" rx="4" opacity="0.85"/>
<text x="655" y="431" font-size="18" font-weight="bold" fill="#1e40af">0.621</text>

<!-- 栃木 0.610 (11位) -->
<text x="360" y="462" text-anchor="end" font-size="18" fill="#475569">11位 栃木県</text>
<rect x="380" y="444" width="252" height="24" fill="#2563eb" rx="4" opacity="0.85"/>
<text x="642" y="463" font-size="18" font-weight="bold" fill="#2563eb">0.610</text>

<!-- 群馬 0.599 (12位) -->
<text x="360" y="494" text-anchor="end" font-size="18" fill="#475569">12位 群馬県</text>
<rect x="380" y="476" width="239" height="24" fill="#3b82f6" rx="4" opacity="0.85"/>
<text x="629" y="495" font-size="18" font-weight="bold" fill="#3b82f6">0.599</text>

<!-- 全国平均 0.494 -->
<text x="360" y="526" text-anchor="end" font-size="17" fill="#94a3b8">全国平均</text>
<rect x="380" y="510" width="113" height="20" fill="#cbd5e1" rx="4" opacity="0.8"/>
<text x="503" y="526" font-size="17" font-weight="bold" fill="#94a3b8">0.494</text>

<!-- Separator -->
<line x1="400" y1="575" x2="880" y2="575" stroke="#e2e8f0" stroke-width="1"/>

<!-- Footer -->
<text x="640" y="610" text-anchor="middle" font-size="18" fill="#475569">製造業の集積と堅実な財政運営が支える「自力で稼ぐ」構造</text>
<text x="640" y="645" text-anchor="middle" font-size="15" fill="#cbd5e1">地方財政状況調査（2022年度）── stats47.jp</text>
</svg>
