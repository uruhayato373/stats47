<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670">
<style>
  text { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
</style>
<rect width="1280" height="670" fill="#ffffff"/>

<!-- Decorative background elements -->
<circle cx="1080" cy="120" r="200" fill="#eff6ff" opacity="0.3"/>
<circle cx="200" cy="580" r="160" fill="#fef3c7" opacity="0.25"/>
<circle cx="640" cy="400" r="300" fill="#f8fafc" opacity="0.4"/>

<!-- stats47 watermark -->
<text x="1250" y="35" text-anchor="end" font-size="18" fill="#cbd5e1">stats47</text>

<!-- Lead text -->
<text x="640" y="110" text-anchor="middle" font-size="32" fill="#64748b">教育費に歳出の</text>

<!-- Main catch: big number -->
<text x="640" y="250" text-anchor="middle" font-size="130" font-weight="900" fill="#2563eb">22.0%</text>

<!-- Era label -->
<text x="640" y="300" text-anchor="middle" font-size="40" font-weight="bold" fill="#1e293b">滋賀県が全国1位</text>

<!-- Subtitle -->
<text x="640" y="355" text-anchor="middle" font-size="26" fill="#94a3b8">── 都道府県の歳出構造に表れる優先順位 ──</text>

<!-- Mini bar chart: top and bottom prefectures (教育費割合) -->
<!-- Scale: 12% = 0px, 22% = 400px => 1% = 40px -->
<!-- 1位 滋賀 22.0% -->
<text x="340" y="430" text-anchor="end" font-size="18" fill="#475569">1位 滋賀県</text>
<rect x="360" y="412" width="400" height="28" fill="#2563eb" rx="4" opacity="0.8"/>
<text x="770" y="432" font-size="18" font-weight="bold" fill="#2563eb">22.0%</text>

<!-- 47位 東京 12.2% -->
<text x="340" y="478" text-anchor="end" font-size="18" fill="#475569">47位 東京都</text>
<rect x="360" y="460" width="8" height="28" fill="#dc2626" rx="4" opacity="0.8"/>
<text x="378" y="480" font-size="18" font-weight="bold" fill="#dc2626">12.2%</text>

<!-- Gap annotation -->
<line x1="770" y1="408" x2="770" y2="494" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
<text x="790" y="456" font-size="16" fill="#475569" font-weight="bold">差 9.8pt</text>

<!-- Separator -->
<line x1="400" y1="565" x2="880" y2="565" stroke="#e2e8f0" stroke-width="1"/>

<!-- Footer -->
<text x="640" y="600" text-anchor="middle" font-size="18" fill="#94a3b8">教育・商工・農林水産 ── 3指標で浮かぶ県の性格</text>
<text x="640" y="640" text-anchor="middle" font-size="16" fill="#cbd5e1">地方財政状況調査（2022年度）── stats47.jp</text>
</svg>
