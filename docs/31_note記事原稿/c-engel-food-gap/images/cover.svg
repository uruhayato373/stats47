<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670">
<style>
  text { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
</style>
<rect width="1280" height="670" fill="#ffffff"/>

<!-- Decorative background elements -->
<circle cx="1080" cy="120" r="200" fill="#fef2f2" opacity="0.3"/>
<circle cx="200" cy="580" r="160" fill="#eff6ff" opacity="0.25"/>
<circle cx="640" cy="400" r="300" fill="#f8fafc" opacity="0.4"/>

<!-- stats47 watermark -->
<text x="1250" y="35" text-anchor="end" font-size="18" fill="#cbd5e1">stats47</text>

<!-- Lead text -->
<text x="640" y="110" text-anchor="middle" font-size="32" fill="#64748b">家計に占める食費の割合が</text>

<!-- Main catch: big number -->
<text x="640" y="250" text-anchor="middle" font-size="130" font-weight="900" fill="#dc2626">28.6%</text>

<!-- Era label -->
<text x="640" y="300" text-anchor="middle" font-size="40" font-weight="bold" fill="#1e293b">食費28.6%時代</text>

<!-- Subtitle -->
<text x="640" y="355" text-anchor="middle" font-size="26" fill="#94a3b8">── エンゲル係数から見る都道府県の食の格差 ──</text>

<!-- Mini bar chart: top and bottom prefectures -->
<!-- Left side: 兵庫 (highest) -->
<text x="340" y="430" text-anchor="end" font-size="18" fill="#475569">1位 兵庫県</text>
<rect x="360" y="412" width="382" height="28" fill="#dc2626" rx="4" opacity="0.8"/>
<text x="752" y="432" font-size="18" font-weight="bold" fill="#dc2626">31.8%</text>

<!-- National average line position: 27.8% -->
<!-- Scale: 25% = 0px, 32% = 420px => 1% = 60px -->
<!-- 27.8% => (27.8-25)*60 = 168 => x = 360+168 = 528 -->

<!-- Right side: 栃木 (lowest) -->
<text x="340" y="478" text-anchor="end" font-size="18" fill="#475569">47位 栃木県</text>
<rect x="360" y="460" width="12" height="28" fill="#3b82f6" rx="4" opacity="0.8"/>
<!-- 25.2% => (25.2-25)*60 = 12 -->
<text x="382" y="480" font-size="18" font-weight="bold" fill="#3b82f6">25.2%</text>

<!-- Gap annotation -->
<line x1="750" y1="408" x2="750" y2="494" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
<text x="770" y="456" font-size="16" fill="#475569" font-weight="bold">差 6.6pt</text>

<!-- Average line -->
<line x1="528" y1="404" x2="528" y2="498" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="528" y="518" text-anchor="middle" font-size="13" fill="#94a3b8">全国平均 27.8%</text>

<!-- Separator -->
<line x1="400" y1="565" x2="880" y2="565" stroke="#e2e8f0" stroke-width="1"/>

<!-- Footer -->
<text x="640" y="600" text-anchor="middle" font-size="18" fill="#94a3b8">44年ぶりの高水準 ── 食料品価格の高騰で地域間格差が拡大</text>
<text x="640" y="640" text-anchor="middle" font-size="16" fill="#cbd5e1">家計調査（2024年）── stats47.jp</text>
</svg>