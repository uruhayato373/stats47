<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670">
<style>
  text { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
</style>
<rect width="1280" height="670" fill="#ffffff"/>

<!-- Decorative background elements -->
<circle cx="1080" cy="120" r="200" fill="#fef2f2" opacity="0.35"/>
<circle cx="200" cy="580" r="160" fill="#ffedd5" opacity="0.3"/>
<circle cx="640" cy="400" r="300" fill="#f8fafc" opacity="0.4"/>

<!-- stats47 watermark -->
<text x="1250" y="35" text-anchor="end" font-size="18" fill="#cbd5e1">stats47</text>

<!-- Lead text -->
<text x="640" y="110" text-anchor="middle" font-size="32" fill="#64748b">日本一「暑い」県の最高気温は</text>

<!-- Main catch: big number -->
<text x="640" y="250" text-anchor="middle" font-size="130" font-weight="900" fill="#dc2626">36.2℃</text>

<!-- Era label -->
<text x="640" y="300" text-anchor="middle" font-size="40" font-weight="bold" fill="#1e293b">1位は沖縄ではなく熊本県</text>

<!-- Subtitle -->
<text x="640" y="355" text-anchor="middle" font-size="26" fill="#94a3b8">── 最高気温・平均気温・日照時間で見る暑さの正体 ──</text>

<!-- Mini bar chart: top and bottom (最高気温) -->
<!-- Scale: 28℃ = 0px, 37℃ = 450px => 1℃ = 50px -->
<!-- 1位 熊本 36.2 => (36.2-28)*50 = 410 -->
<text x="340" y="430" text-anchor="end" font-size="18" fill="#475569">1位 熊本県</text>
<rect x="360" y="412" width="410" height="28" fill="#dc2626" rx="4" opacity="0.8"/>
<text x="780" y="432" font-size="18" font-weight="bold" fill="#dc2626">36.2℃</text>

<!-- 47位 北海道 28.4 => (28.4-28)*50 = 20 -->
<text x="340" y="478" text-anchor="end" font-size="18" fill="#475569">47位 北海道</text>
<rect x="360" y="460" width="20" height="28" fill="#3b82f6" rx="4" opacity="0.8"/>
<text x="390" y="480" font-size="18" font-weight="bold" fill="#3b82f6">28.4℃</text>

<!-- Gap annotation -->
<line x1="780" y1="408" x2="780" y2="494" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
<text x="800" y="456" font-size="16" fill="#475569" font-weight="bold">差 7.8℃</text>

<!-- Separator -->
<line x1="400" y1="565" x2="880" y2="565" stroke="#e2e8f0" stroke-width="1"/>

<!-- Footer -->
<text x="640" y="600" text-anchor="middle" font-size="18" fill="#94a3b8">フェーン現象と盆地効果 ── 内陸が海辺より暑くなる仕組み</text>
<text x="640" y="640" text-anchor="middle" font-size="16" fill="#cbd5e1">気象統計情報（2024年）── stats47.jp</text>
</svg>
