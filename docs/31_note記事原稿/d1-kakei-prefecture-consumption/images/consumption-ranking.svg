  <text x="260" y="274" text-anchor="end" font-size="13" fill="#2563eb">397万円</text>

  <!-- Bottom 5 bars -->
  <!-- 47. 沖縄 308万 -->
  <rect x="290" y="92" width="250" height="36" rx="4" fill="#fef2f2"/>
  <circle cx="312" cy="110" r="12" fill="#dc2626"/>
  <text x="312" y="114" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">47</text>
  <text x="332" y="114" font-size="12" font-weight="bold" fill="#1f2937">沖縄県</text>
  <text x="530" y="114" text-anchor="end" font-size="13" font-weight="bold" fill="#dc2626">308万円</text>

  <!-- 46. 愛媛 308万 -->
  <rect x="290" y="132" width="250" height="36" rx="4" fill="#ffffff"/>
  <circle cx="312" cy="150" r="12" fill="#dc2626"/>
  <text x="312" y="154" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">46</text>
  <text x="332" y="154" font-size="12" font-weight="bold" fill="#1f2937">愛媛県</text>
  <text x="530" y="154" text-anchor="end" font-size="13" font-weight="bold" fill="#dc2626">308万円</text>

  <!-- 45. 青森 313万 -->
  <rect x="290" y="172" width="250" height="36" rx="4" fill="#fef2f2"/>
  <circle cx="312" cy="190" r="12" fill="#dc2626"/>
  <text x="312" y="194" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">45</text>
  <text x="332" y="194" font-size="12" font-weight="bold" fill="#1f2937">青森県</text>
  <text x="530" y="194" text-anchor="end" font-size="13" font-weight="bold" fill="#dc2626">313万円</text>

  <!-- 44. 和歌山 319万 -->
  <rect x="290" y="212" width="250" height="36" rx="4" fill="#ffffff"/>
  <circle cx="312" cy="230" r="12" fill="#f87171"/>
  <text x="312" y="234" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">44</text>
  <text x="332" y="234" font-size="12" fill="#1f2937">和歌山県</text>
  <text x="530" y="234" text-anchor="end" font-size="13" fill="#dc2626">319万円</text>

  <!-- 43. 宮崎 323万 -->
  <rect x="290" y="252" width="250" height="36" rx="4" fill="#fef2f2"/>
  <circle cx="312" cy="270" r="12" fill="#f87171"/>
  <text x="312" y="274" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">43</text>
  <text x="332" y="274" font-size="12" fill="#1f2937">宮崎県</text>
  <text x="530" y="274" text-anchor="end" font-size="13" fill="#dc2626">323万円</text>

  <!-- Difference callout -->
  <rect x="160" y="304" width="240" height="40" rx="8" fill="#1f2937"/>
  <text x="280" y="329" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">1位と47位の差: 年間121万円</text>

  <text x="280" y="370" text-anchor="middle" font-size="9" fill="#9ca3af">家計調査（総務省）2024年</text>
</svg>