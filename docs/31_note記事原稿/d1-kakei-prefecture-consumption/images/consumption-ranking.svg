<svg width="560" height="380" viewBox="0 0 560 380" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif">
  <rect width="560" height="380" fill="#f9fafb" rx="6"/>
  <text x="280" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f2937">年間消費支出の都道府県ランキング</text>
  <text x="280" y="42" text-anchor="middle" font-size="11" fill="#6b7280">二人以上の世帯（2024年）</text>

  <!-- Top 5 header -->
  <rect x="20" y="56" width="250" height="28" rx="6" fill="#2563eb"/>
  <text x="145" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">消費支出が多い</text>

  <!-- Bottom 5 header -->
  <rect x="290" y="56" width="250" height="28" rx="6" fill="#dc2626"/>
  <text x="415" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">消費支出が少ない</text>

  <!-- Top 5 bars -->
  <!-- 1. 埼玉 429万 -->
  <rect x="20" y="92" width="250" height="36" rx="4" fill="#eff6ff"/>
  <circle cx="42" cy="110" r="12" fill="#2563eb"/>
  <text x="42" y="114" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">1</text>
  <text x="60" y="114" font-size="12" font-weight="bold" fill="#1f2937">埼玉県</text>
  <text x="260" y="114" text-anchor="end" font-size="13" font-weight="bold" fill="#2563eb">429万円</text>

  <!-- 2. 東京 421万 -->
  <rect x="20" y="132" width="250" height="36" rx="4" fill="#ffffff"/>
  <circle cx="42" cy="150" r="12" fill="#2563eb"/>
  <text x="42" y="154" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">2</text>
  <text x="60" y="154" font-size="12" font-weight="bold" fill="#1f2937">東京都</text>
  <text x="260" y="154" text-anchor="end" font-size="13" font-weight="bold" fill="#2563eb">421万円</text>

  <!-- 3. 千葉 404万 -->
  <rect x="20" y="172" width="250" height="36" rx="4" fill="#eff6ff"/>
  <circle cx="42" cy="190" r="12" fill="#2563eb"/>
  <text x="42" y="194" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">3</text>
  <text x="60" y="194" font-size="12" font-weight="bold" fill="#1f2937">千葉県</text>
  <text x="260" y="194" text-anchor="end" font-size="13" font-weight="bold" fill="#2563eb">404万円</text>

  <!-- 4. 富山 398万 -->
  <rect x="20" y="212" width="250" height="36" rx="4" fill="#ffffff"/>
  <circle cx="42" cy="230" r="12" fill="#60a5fa"/>
  <text x="42" y="234" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">4</text>
  <text x="60" y="234" font-size="12" fill="#1f2937">富山県</text>
  <text x="260" y="234" text-anchor="end" font-size="13" fill="#2563eb">398万円</text>

  <!-- 5. 神奈川 397万 -->
  <rect x="20" y="252" width="250" height="36" rx="4" fill="#eff6ff"/>
  <circle cx="42" cy="270" r="12" fill="#60a5fa"/>
  <text x="42" y="274" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">5</text>
