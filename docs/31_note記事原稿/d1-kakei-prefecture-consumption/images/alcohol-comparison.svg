<svg width="560" height="300" viewBox="0 0 560 300" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif">
  <rect width="560" height="300" fill="#f9fafb" rx="6"/>
  <text x="280" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f2937">酒類消費の地域性 ── 何を飲むかは住む場所で決まる</text>
  <text x="280" y="42" text-anchor="middle" font-size="11" fill="#6b7280">各酒類1位の都道府県と年間支出額（2024年）</text>

  <!-- 3 columns -->
  <!-- 清酒 = 福島 -->
  <g transform="translate(100, 70)">
    <rect x="-75" y="0" width="150" height="190" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="-75" y="0" width="150" height="40" rx="8" fill="#1e3a5f"/>
    <rect x="-75" y="20" width="150" height="20" fill="#1e3a5f"/>
    <text x="0" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">清酒（日本酒）</text>
    <text x="0" y="72" text-anchor="middle" font-size="28" font-weight="900" fill="#1e3a5f">福島</text>
    <text x="0" y="102" text-anchor="middle" font-size="18" font-weight="bold" fill="#EA580C">11,811円</text>
    <text x="0" y="122" text-anchor="middle" font-size="11" fill="#6b7280">全国平均の 2.2倍</text>
    <line x1="-50" y1="135" x2="50" y2="135" stroke="#e5e7eb" stroke-width="1"/>
    <text x="0" y="155" text-anchor="middle" font-size="10" fill="#9ca3af">2位 秋田 8,918円</text>
    <text x="0" y="172" text-anchor="middle" font-size="10" fill="#9ca3af">東北の日本酒文化</text>
  </g>

  <!-- 焼酎 = 宮崎 -->
  <g transform="translate(280, 70)">
    <rect x="-75" y="0" width="150" height="190" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="-75" y="0" width="150" height="40" rx="8" fill="#7c2d12"/>
    <rect x="-75" y="20" width="150" height="20" fill="#7c2d12"/>
    <text x="0" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">焼酎</text>
    <text x="0" y="72" text-anchor="middle" font-size="28" font-weight="900" fill="#7c2d12">宮崎</text>
    <text x="0" y="102" text-anchor="middle" font-size="18" font-weight="bold" fill="#EA580C">14,008円</text>
    <text x="0" y="122" text-anchor="middle" font-size="11" fill="#6b7280">全国平均の 2.5倍</text>
    <line x1="-50" y1="135" x2="50" y2="135" stroke="#e5e7eb" stroke-width="1"/>
    <text x="0" y="155" text-anchor="middle" font-size="10" fill="#9ca3af">2位 鹿児島 10,138円</text>
    <text x="0" y="172" text-anchor="middle" font-size="10" fill="#9ca3af">南九州の焼酎圏</text>
  </g>

  <!-- ワイン = 東京 -->
  <g transform="translate(460, 70)">
    <rect x="-75" y="0" width="150" height="190" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="-75" y="0" width="150" height="40" rx="8" fill="#7f1d1d"/>
    <rect x="-75" y="20" width="150" height="20" fill="#7f1d1d"/>
    <text x="0" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">ワイン</text>
    <text x="0" y="72" text-anchor="middle" font-size="28" font-weight="900" fill="#7f1d1d">東京</text>
    <text x="0" y="102" text-anchor="middle" font-size="18" font-weight="bold" fill="#EA580C">8,116円</text>
    <text x="0" y="122" text-anchor="middle" font-size="11" fill="#6b7280">全国平均の 2.3倍</text>
    <line x1="-50" y1="135" x2="50" y2="135" stroke="#e5e7eb" stroke-width="1"/>
    <text x="0" y="155" text-anchor="middle" font-size="10" fill="#9ca3af">2位 埼玉 7,143円</text>
    <text x="0" y="172" text-anchor="middle" font-size="10" fill="#9ca3af">首都圏のワイン文化</text>
  </g>

  <text x="280" y="290" text-anchor="middle" font-size="9" fill="#9ca3af">家計調査（総務省）2024年・年間支出額</text>
</svg>