<svg width="1280" height="670" viewBox="0 0 1280 670" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif">
  <rect width="1280" height="670" fill="#ffffff"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="550" r="180" fill="#FEF3C7" opacity="0.5"/>
  <circle cx="1130" cy="130" r="160" fill="#FEE2E2" opacity="0.4"/>

  <!-- stats47 branding -->
  <text x="1230" y="40" text-anchor="end" font-size="22" font-weight="bold" fill="#d1d5db" font-style="italic">stats47</text>

  <!-- Headline -->
  <text x="640" y="100" text-anchor="middle" font-size="32" font-weight="bold" fill="#6b7280">家計調査</text>
  <text x="640" y="190" text-anchor="middle" font-size="84" font-weight="900" fill="#EA580C">690品目</text>
  <text x="640" y="240" text-anchor="middle" font-size="30" font-weight="bold" fill="#6b7280">× 47都道府県で見える「消費グセ」</text>

  <!-- Data highlights -->
  <g transform="translate(640, 350)">
    <g transform="translate(-380, 0)">
      <text x="0" y="-15" text-anchor="middle" font-size="16" fill="#6b7280">カステラ 長崎</text>
      <text x="0" y="25" text-anchor="middle" font-size="36" font-weight="900" fill="#EA580C">7.3倍</text>
    </g>
    <g transform="translate(-130, 0)">
      <text x="0" y="-15" text-anchor="middle" font-size="16" fill="#6b7280">灯油 青森</text>
      <text x="0" y="25" text-anchor="middle" font-size="36" font-weight="900" fill="#EA580C">6.2倍</text>
    </g>
    <g transform="translate(130, 0)">
      <text x="0" y="-15" text-anchor="middle" font-size="16" fill="#6b7280">教育費 埼玉vs秋田</text>
      <text x="0" y="25" text-anchor="middle" font-size="36" font-weight="900" fill="#EA580C">8.7倍</text>
    </g>
    <g transform="translate(380, 0)">
      <text x="0" y="-15" text-anchor="middle" font-size="16" fill="#6b7280">消費額 1位vs47位</text>
      <text x="0" y="25" text-anchor="middle" font-size="36" font-weight="900" fill="#EA580C">121万円差</text>
    </g>
  </g>

  <!-- Subtitle -->
  <text x="640" y="460" text-anchor="middle" font-size="20" fill="#6b7280">食卓・酒・教育・光熱費 ── データが映し出す47通りの暮らし</text>

  <!-- Footer -->
  <text x="640" y="560" text-anchor="middle" font-size="18" fill="#9ca3af">家計調査の全品目データを都道府県別に完全分析</text>
</svg>