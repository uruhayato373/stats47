<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670">
<style>
  text { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
</style>
<rect width="1280" height="670" fill="#ffffff"/>

<!-- Decorative circles -->
<circle cx="1050" cy="140" r="180" fill="#fef2f2" opacity="0.35"/>
<circle cx="230" cy="560" r="130" fill="#eff6ff" opacity="0.3"/>

<!-- stats47 watermark -->
<text x="1250" y="35" text-anchor="end" font-size="18" fill="#cbd5e1">stats47</text>

<!-- Lead text -->
<text x="640" y="115" text-anchor="middle" font-size="38" fill="#64748b">食費の割合だけでは見えない</text>

<!-- Main catch: two numbers side by side -->
<text x="420" y="275" text-anchor="end" font-size="160" font-weight="900" fill="#dc2626">33%</text>
<text x="490" y="240" text-anchor="middle" font-size="44" fill="#94a3b8">vs</text>
<text x="560" y="275" text-anchor="start" font-size="160" font-weight="900" fill="#3b82f6">25%</text>

<!-- Subtitle -->
<text x="640" y="330" text-anchor="middle" font-size="26" fill="#94a3b8">── エンゲル係数に隠れた格差の構造 ──</text>

<!-- Engel coefficient bars -->
<text x="326" y="444" text-anchor="end" font-size="15" fill="#475569">Q1（年収262万）</text>
<rect x="340" y="420" width="430.3" height="36" fill="#dc2626" rx="4" opacity="0.85"/>
<text x="782.3" y="444" font-size="16" font-weight="bold" fill="#dc2626">33.1%</text>
<text x="326" y="500" text-anchor="end" font-size="15" fill="#475569">Q5（年収1,242万）</text>
<rect x="340" y="476" width="325" height="36" fill="#3b82f6" rx="4" opacity="0.85"/>
<text x="677" y="500" font-size="16" font-weight="bold" fill="#3b82f6">25%</text>

<!-- Annotation: 8pt difference -->
<line x1="770.3" y1="412" x2="770.3" y2="520" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
<text x="778.3" y="466" font-size="13" fill="#94a3b8">差 8pt</text>

<!-- Separator -->
<line x1="400" y1="575" x2="880" y2="575" stroke="#e2e8f0" stroke-width="1"/>

<!-- Footer -->
<text x="640" y="612" text-anchor="middle" font-size="17" fill="#94a3b8">家計調査（2024年）年間収入五分位階級別 ── 二人以上の世帯</text>
<text x="640" y="645" text-anchor="middle" font-size="15" fill="#cbd5e1">stats47.jp</text>

</svg>