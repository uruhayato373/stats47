<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="1280" height="670">
<style>
  text { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
</style>
<rect width="1280" height="670" fill="#fafafa"/>

<!-- Left side: text content -->
<line x1="60" y1="120" x2="60" y2="170" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>

<text x="80" y="148" font-size="16" fill="#475569" font-weight="500">47都道府県「稼ぐ力」と「借金」の比較</text>

<text x="80" y="220" font-size="36" font-weight="bold" fill="#1e293b">財政力7位なのに</text>
<text x="80" y="268" font-size="36" font-weight="bold" fill="#1e293b">借金1位？</text>

<text x="80" y="330" font-size="22" fill="#334155" font-weight="500">財政力指数 × 地方債現在高比率</text>
<text x="80" y="362" font-size="22" fill="#334155" font-weight="500">のギャップを可視化</text>

<text x="80" y="420" font-size="16" fill="#64748b">静岡県の逆説：稼ぐ力は全国上位、</text>
<text x="80" y="446" font-size="16" fill="#64748b">しかし借金は全国で最も多い。</text>
<text x="80" y="472" font-size="16" fill="#64748b">3つの構造パターンで読み解く。</text>

<!-- stats47 branding -->
<text x="80" y="560" font-size="14" fill="#94a3b8">stats47.jp</text>

<!-- Right side: mini scatter plot -->
<rect x="550" y="50" width="690" height="570" rx="8" fill="white" fill-opacity="0.5"/>

<!-- Axis labels -->
<text x="890" y="622" text-anchor="middle" font-size="11" fill="#94a3b8">財政力指数 →</text>
<text x="554" y="330" text-anchor="middle" font-size="11" fill="#94a3b8" transform="rotate(-90, 554, 330)">地方債比率 →</text>

