name: 📈 CTR Improvement Candidates (monthly)

on:
  schedule:
    - cron: "0 0 5 * *" # JST every 5th 09:00 (UTC 00:00)
  workflow_dispatch:
    inputs:
      max:
        description: "抽出する上位 N 件 (default 10)"
        required: false
        default: "10"

permissions:
  contents: read
  issues: write

concurrency:
  group: ctr-improvement-monthly
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 🧰 Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 1

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📅 Resolve current month
        id: month
        run: |
          MONTH=$(date -u +%Y-%m)
          echo "month=$MONTH" >> $GITHUB_OUTPUT

      - name: 🔎 Extract low-CTR queries
        id: extract
        run: |
          MAX="${{ inputs.max || '10' }}"
          mkdir -p /tmp/ctr
          node .claude/scripts/gsc/extract-low-ctr-queries.mjs \
            --format markdown \
            --max "$MAX" > /tmp/ctr/body.md

          if grep -q "^skip:" /tmp/ctr/body.md; then
            echo "skipped=true" >> $GITHUB_OUTPUT
            echo "--- skipped ---"
            cat /tmp/ctr/body.md
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
            echo "--- preview ---"
            head -40 /tmp/ctr/body.md
          fi

      - name: 📝 Compose issue body
        if: steps.extract.outputs.skipped == 'false'
        run: |
          MONTH="${{ steps.month.outputs.month }}"
          {
            echo "# CTR Improvement Candidates ${MONTH}"
            echo
            echo "GSC snapshot から position 5-15 帯 × CTR < 業界平均 (Backlinko 2023) のクエリを抽出。"
            echo "上位クエリの seoTitle / description 改訂で CTR 改善余地が大きい。"
            echo "実証ベース判定ルール ([.claude/rules/evidence-based-judgment.md](https://github.com/${{ github.repository }}/blob/develop/.claude/rules/evidence-based-judgment.md)) に従い、改訂後は次月の本 Issue で再計測すること。"
            echo
            cat /tmp/ctr/body.md
            echo
            echo "---"
            echo "_Auto-generated by \`.github/workflows/ctr-improvement-monthly.yml\`_"
          } > /tmp/ctr/issue.md

      - name: 📄 Write GitHub Step Summary
        if: steps.extract.outputs.skipped == 'false'
        run: cat /tmp/ctr/issue.md >> $GITHUB_STEP_SUMMARY

      - name: 🚨 Open or update monthly issue
        if: steps.extract.outputs.skipped == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MONTH="${{ steps.month.outputs.month }}"
          TITLE="[CTR Improvement Candidates] ${MONTH}"

          EXISTING=$(gh issue list \
            --state open \
            --label ctr-improvement-candidate \
            --search "\"${TITLE}\" in:title" \
            --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "Existing open issue #$EXISTING — appending latest extraction"
            gh issue comment "$EXISTING" --body-file /tmp/ctr/issue.md
          else
            gh issue create \
              --title "$TITLE" \
              --label "ctr-improvement-candidate,auto-generated" \
              --body-file /tmp/ctr/issue.md
          fi
