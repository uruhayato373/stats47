name: 📊 PSI Audit (daily)

on:
  schedule:
    - cron: "0 17 * * *" # JST 02:00 daily (UTC 17:00)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: psi-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 🧰 Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Run PSI audit (mobile + desktop)
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
        run: npm run fetch-psi-audit

      - name: 📝 Update history.csv and LATEST.md
        run: npm run psi-audit:digest

      - name: 🔍 Threshold check
        id: check
        run: |
          mkdir -p /tmp/psi-report
          # bash -e で npm run の非ゼロ終了が即 exit する問題を回避し、exit code を変数に保存
          set +e
          npm run psi-audit:check -- --output /tmp/psi-report/report.md
          EXIT_CODE=$?
          set -e
          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
          echo "Threshold check exit code: ${EXIT_CODE}"

      - name: 📄 Write GitHub Step Summary
        if: always()
        run: |
          if [ -f /tmp/psi-report/report.md ]; then
            cat /tmp/psi-report/report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "PSI report not generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📦 Stage metrics outputs
        run: |
          mkdir -p /tmp/psi-publish
          cp -r .claude/state/metrics/psi/* /tmp/psi-publish/ 2>/dev/null || true
          ls -la /tmp/psi-publish

      - name: 📤 Publish to develop branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # working tree の変更は /tmp/psi-publish に退避済。branch 切替前にリセット。
          git reset --hard HEAD
          git clean -fd

          git fetch origin develop
          git checkout develop
          git pull --rebase origin develop

          mkdir -p .claude/state/metrics/psi
          cp -r /tmp/psi-publish/* .claude/state/metrics/psi/ 2>/dev/null || true

          git add .claude/state/metrics/psi
          if git diff --cached --quiet; then
            echo "No PSI changes to publish"
            exit 0
          fi

          git commit -m "chore(metrics): psi daily audit $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push origin develop

      - name: 🔍 Suggest CWV candidates for violated URLs
        if: steps.check.outputs.exit_code == '1'
        run: |
          # report.md から違反 URL を抽出 (https://stats47.jp/... or https://www.stats47.jp/... を全て拾う)
          URLS=$(grep -oE 'https://(www\.)?stats47\.jp[^ )"]+' /tmp/psi-report/report.md \
                 | sort -u \
                 | head -10)

          if [ -z "$URLS" ]; then
            echo "No stats47.jp URLs found in report.md; skipping candidate suggestion."
            : > /tmp/psi-report/candidates.md
            exit 0
          fi

          # 各 URL を --url 引数として渡す
          URL_ARGS=""
          while IFS= read -r u; do
            URL_ARGS="${URL_ARGS} --url ${u}"
          done <<< "$URLS"

          echo "" > /tmp/psi-report/candidates.md
          echo "---" >> /tmp/psi-report/candidates.md
          echo "" >> /tmp/psi-report/candidates.md
          echo "## 🔧 修正候補 component (自動提案)" >> /tmp/psi-report/candidates.md
          echo "" >> /tmp/psi-report/candidates.md
          echo "違反 URL ごとに \`apps/web/src/{app,features}/\` から候補ファイルを抽出 + git blame + 過去施策 hint。" >> /tmp/psi-report/candidates.md
          echo "詳細: \`.claude/scripts/psi/suggest-cwv-candidates.mjs\`" >> /tmp/psi-report/candidates.md
          echo "" >> /tmp/psi-report/candidates.md

          node .claude/scripts/psi/suggest-cwv-candidates.mjs $URL_ARGS --max 5 --format markdown \
            >> /tmp/psi-report/candidates.md 2>&1 || echo "_(candidate suggestion failed, see logs)_" >> /tmp/psi-report/candidates.md

          echo "=== candidates preview ==="
          head -40 /tmp/psi-report/candidates.md

      - name: 🚨 Open issue on threshold violations
        if: steps.check.outputs.exit_code == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TITLE="[PSI Alert] しきい値割れ検知 ${DATE}"
          # report.md + candidates.md を結合して body にする
          BODY_FILE=/tmp/psi-report/body-with-candidates.md
          cat /tmp/psi-report/report.md > "$BODY_FILE"
          if [ -s /tmp/psi-report/candidates.md ]; then
            cat /tmp/psi-report/candidates.md >> "$BODY_FILE"
          fi

          EXISTING=$(gh issue list --state open --label psi-alert --search "\"$TITLE\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Existing open issue #$EXISTING — appending comment instead of creating duplicate"
            gh issue comment "$EXISTING" --body-file "$BODY_FILE"
          else
            gh issue create \
              --title "$TITLE" \
              --label "psi-alert,auto-generated" \
              --body-file "$BODY_FILE"
          fi
