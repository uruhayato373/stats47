# .github/workflows/deploy.yml
name: 🚀 Deploy Next.js + Cloudflare D1/R2 Dashboard

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - develop
  workflow_dispatch: # 手動実行も可能にする

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: 20
      NEXT_PUBLIC_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ESTAT_API_KEY: ${{ secrets.ESTAT_API_KEY }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ github.ref_name == 'main' && secrets.CLOUDFLARE_D1_PROD_ID || secrets.CLOUDFLARE_D1_STAGING_ID }}
      CLOUDFLARE_R2_BUCKET: ${{ github.ref_name == 'main' && secrets.CLOUDFLARE_R2_PROD_BUCKET || secrets.CLOUDFLARE_R2_STAGING_BUCKET }}

    steps:
      - name: 🧰 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test -- --run
        continue-on-error: true # テストが失敗しても続行（必要に応じて変更）

      - name: 📝 Type check
        run: npx tsc --noEmit

      - name: 🧱 Build Next.js app for Cloudflare Pages
        run: npm run pages:build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

      - name: 🧩 Run database migrations (D1)
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            npx wrangler d1 migrations apply --env production --remote
          else
            npx wrangler d1 migrations apply --env staging --remote
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: ✅ Verify database migrations
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            npx wrangler d1 execute --env production --remote --command "SELECT name FROM sqlite_master WHERE type='table';" || echo "Database verification skipped"
          else
            npx wrangler d1 execute --env staging --remote --command "SELECT name FROM sqlite_master WHERE type='table';" || echo "Database verification skipped"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        continue-on-error: true

      - name: ☁️ Deploy to Cloudflare Pages
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            npx wrangler pages deploy .open-next --env production
          else
            npx wrangler pages deploy .open-next --env staging
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 🏥 Health check
        run: |
          echo "Waiting for deployment to complete..."
          sleep 30 # デプロイ完了を待つ
          if [ "${{ github.ref_name }}" == "main" ]; then
            curl -f https://stats47.pages.dev/api/health || echo "Health check failed, but deployment may still be in progress"
          else
            curl -f https://stats47-staging.pages.dev/api/health || echo "Health check failed, but deployment may still be in progress"
          fi
        continue-on-error: true

  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEXT_PUBLIC_ENV: preview

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run pages:build

      - name: 🔍 Deploy preview to Cloudflare Pages
        run: npx wrangler pages deploy .open-next --branch=${{ github.head_ref }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
