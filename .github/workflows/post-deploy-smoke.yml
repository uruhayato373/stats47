name: Post-Deploy Smoke Test

on:
  # deploy-workers 完了後に自動実行
  workflow_run:
    workflows: ["Deploy to Cloudflare Workers"]
    types:
      - completed
    branches:
      - main

  # 手動実行（URL 指定可能）
  workflow_dispatch:
    inputs:
      base_url:
        description: "テスト対象の URL"
        required: false
        default: "https://stats47.jp"

concurrency:
  group: smoke-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    # deploy が成功した場合のみ実行（手動実行時は常に実行）
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Wait for deployment propagation
        run: sleep 30

      - name: Run health check
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://stats47.jp' }}
        run: npx tsx apps/web/scripts/smoke-test.ts --base-url "$BASE_URL"

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: apps/web
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ github.event.inputs.base_url || 'https://stats47.jp' }}
        run: npx playwright test --config playwright.smoke.config.ts

      - name: Upload smoke test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: apps/web/playwright-smoke-report/
          retention-days: 7
