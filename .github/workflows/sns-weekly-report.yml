name: 📰 SNS Weekly Report

# 毎週日曜 JST 21:00（sns-metrics-weekly の 30 分後、snapshot 反映後に走らせる）

on:
  schedule:
    - cron: "0 12 * * 0" # JST 21:00 Sunday (UTC 12:00)
  workflow_dispatch:
    inputs:
      week:
        description: "Target ISO week (YYYY-Www). Empty = previous week"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: sns-weekly-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🧰 Checkout develop (latest snapshots)
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 1

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📰 Generate SNS weekly report
        run: |
          if [ -n "${{ inputs.week }}" ]; then
            node .claude/scripts/sns/sns-weekly-report.mjs "${{ inputs.week }}"
          else
            node .claude/scripts/sns/sns-weekly-report.mjs
          fi

      - name: 📄 Step Summary
        if: always()
        run: |
          REPORT_DIR="docs/04_レビュー/sns-weekly-report"
          LATEST=$(ls -t "$REPORT_DIR"/*.md 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            cat "$LATEST" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 💾 Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "docs/04_レビュー/sns-weekly-report"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs(sns): weekly report $(date -u +%Y-%m-%d) [skip ci]"
            git push origin develop
          fi
