name: 🔁 Improvement Log Triage (weekly)

on:
  schedule:
    - cron: "0 13 * * 0" # JST Sun 22:00 (UTC Sun 13:00)
  workflow_dispatch:
    inputs:
      overdue_days:
        description: "deployed_at から何日以上経過したエントリを対象にするか (default 14)"
        required: false
        default: "14"

permissions:
  contents: read
  issues: write

concurrency:
  group: improvement-log-reminder
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 🧰 Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 1

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📅 Resolve current ISO week
        id: week
        run: |
          WEEK=$(date -u +%G-W%V)
          echo "week=$WEEK" >> $GITHUB_OUTPUT

      - name: 🔍 Scan pending improvement entries
        id: scan
        run: |
          OVERDUE_DAYS="${{ inputs.overdue_days || '14' }}"
          mkdir -p /tmp/triage
          node .claude/scripts/lib/scan-pending-improvements.mjs \
            --overdue-days "$OVERDUE_DAYS" \
            --format markdown > /tmp/triage/body.md

          # 対象 0 件なら skip
          if grep -q "対象エントリなし" /tmp/triage/body.md; then
            echo "has_entries=false" >> $GITHUB_OUTPUT
          else
            echo "has_entries=true" >> $GITHUB_OUTPUT
          fi
          echo "--- preview ---"
          head -40 /tmp/triage/body.md

      - name: 📝 Compose issue body
        if: steps.scan.outputs.has_entries == 'true'
        run: |
          WEEK="${{ steps.week.outputs.week }}"
          OVERDUE_DAYS="${{ inputs.overdue_days || '14' }}"
          {
            echo "# Improvement Log Triage ${WEEK}"
            echo
            echo "デプロイ日から **${OVERDUE_DAYS} 日以上経過** した \`status: pending | in-progress\` エントリ一覧。"
            echo "実証ベース判定ルール ([.claude/rules/evidence-based-judgment.md](https://github.com/${{ github.repository }}/blob/develop/.claude/rules/evidence-based-judgment.md)) に従い、"
            echo "各エントリに検証コマンドを実行して effect/* 判定を更新してください。"
            echo
            cat /tmp/triage/body.md
            echo
            echo "---"
            echo "_Auto-generated by \`.github/workflows/improvement-log-reminder-weekly.yml\`_"
          } > /tmp/triage/issue.md

      - name: 📄 Write GitHub Step Summary
        if: steps.scan.outputs.has_entries == 'true'
        run: cat /tmp/triage/issue.md >> $GITHUB_STEP_SUMMARY

      - name: 🚨 Open or update triage issue
        if: steps.scan.outputs.has_entries == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WEEK="${{ steps.week.outputs.week }}"
          TITLE="[Improvement Triage] ${WEEK}"

          EXISTING=$(gh issue list \
            --state open \
            --label improvement-log-triage \
            --search "\"${TITLE}\" in:title" \
            --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "Existing open issue #$EXISTING — updating with latest scan"
            gh issue comment "$EXISTING" --body-file /tmp/triage/issue.md
          else
            gh issue create \
              --title "$TITLE" \
              --label "improvement-log-triage,auto-generated" \
              --body-file /tmp/triage/issue.md
          fi
