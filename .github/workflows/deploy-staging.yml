name: Deploy to Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch: # 手動実行も可能にする

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy to Staging Environment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run
        continue-on-error: true # テストが失敗しても続行（必要に応じて変更）

      - name: Type check
        run: npx tsc --noEmit

      - name: Build application
        run: npm run build:staging
        env:
          NODE_ENV: production
          NEXT_PUBLIC_ENV: staging

      - name: Configure Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "CLOUDFLARE_API_TOKEN configured"
          echo "CLOUDFLARE_ACCOUNT_ID configured"

      - name: Apply database migrations
        run: |
          npx wrangler d1 migrations apply stats47_staging --env staging --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify database migrations
        run: |
          npx wrangler d1 execute stats47_staging --env staging --remote --command "SELECT name FROM sqlite_master WHERE type='table';"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy .next --env staging --project-name=stats47-staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Health check
        run: |
          echo "Waiting for deployment to complete..."
          sleep 30 # デプロイ完了を待つ
          # ヘルスチェック（エラー時も続行してデプロイは完了とする）
          curl -f https://staging.stats47.pages.dev/api/health || echo "Health check failed, but deployment may still be in progress"
        continue-on-error: true

