name: ☁️ Cloudflare Monthly Snapshot

# Cloudflare の請求サイクルは「前月 15 日 → 当月 14 日」。
# 当月 15 日 JST 09:00 (UTC 当月 15 日 00:00) に走らせて直前で締まったサイクルを集計。

on:
  schedule:
    - cron: "0 0 15 * *" # UTC 15 日 00:00 = JST 15 日 09:00
  workflow_dispatch:
    inputs:
      cycle:
        description: "Cycle to aggregate (YYYY-MM). Empty = latest closed cycle"
        required: false
        default: ""
      no_issue:
        description: "Skip issue creation (dry-run mode)"
        required: false
        default: "false"

permissions:
  contents: write
  issues: write

concurrency:
  group: cloudflare-monthly-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 🧰 Checkout develop (latest daily snapshots)
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 1

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: ☁️ Run monthly snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=""
          if [ -n "${{ inputs.cycle }}" ]; then
            FLAGS="$FLAGS --cycle ${{ inputs.cycle }}"
          fi
          if [ "${{ inputs.no_issue }}" = "true" ]; then
            FLAGS="$FLAGS --no-issue"
          fi
          node .claude/scripts/cloudflare/monthly-snapshot.mjs $FLAGS

      - name: 💾 Commit snapshot to develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude/skills/analytics/cloudflare-cost-improvement/reference/monthly-snapshots
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "chore(cloudflare): monthly snapshot $(date -u +%Y-%m) [skip ci]"
            git push origin develop
          fi
