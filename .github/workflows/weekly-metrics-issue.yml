name: 📦 Weekly Metrics Commit

on:
  schedule:
    - cron: "0 0 * * 1" # Monday JST 09:00 (UTC Mon 00:00)
  workflow_dispatch:
    inputs:
      week:
        description: "Target ISO week (YYYY-Www). Empty = last week (recommended)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: weekly-metrics-commit
  cancel-in-progress: false

jobs:
  commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🧰 Checkout develop (latest metrics data)
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📅 Resolve target week
        id: week
        run: |
          INPUT_WEEK="${{ inputs.week }}"
          if [ -n "$INPUT_WEEK" ]; then
            echo "week=$INPUT_WEEK" >> $GITHUB_OUTPUT
          else
            # 月曜朝に回すと「昨日 = 前週の日曜」でその ISO 週を取る
            WEEK=$(date -u -d "1 day ago" +%G-W%V)
            echo "week=$WEEK" >> $GITHUB_OUTPUT
          fi

      - name: 📝 Generate weekly metrics markdown
        id: body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WEEK="${{ steps.week.outputs.week }}"
          OUT_DIR="docs/03_週次運用/メトリクス"
          OUT_FILE="$OUT_DIR/${WEEK}.md"
          mkdir -p "$OUT_DIR"

          # frontmatter
          {
            echo "---"
            echo "type: weekly-metrics"
            echo "week: ${WEEK}"
            echo "date: $(date -u +%Y-%m-%d)"
            echo "status: auto-generated"
            echo "---"
            echo
            node .claude/scripts/metrics/generate-weekly-metrics-issue.mjs --week "${WEEK}"
          } > "$OUT_FILE"

          echo "out_file=$OUT_FILE" >> $GITHUB_OUTPUT
          echo "--- preview ---"
          head -30 "$OUT_FILE"

      - name: 📄 Copy to GitHub Step Summary
        run: cat "${{ steps.body.outputs.out_file }}" >> $GITHUB_STEP_SUMMARY

      - name: 🚦 Skip if unchanged
        id: dup
        run: |
          if git diff --quiet "${{ steps.body.outputs.out_file }}" 2>/dev/null; then
            # ファイルが既に commit 済みで変更なし → skip
            if [ -z "$(git status --porcelain ${{ steps.body.outputs.out_file }})" ]; then
              echo "No changes — skipping commit"
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 🆕 Commit & push weekly metrics markdown
        if: steps.dup.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.body.outputs.out_file }}"
          git commit -m "metrics: weekly snapshot ${{ steps.week.outputs.week }} (auto-generated)"
          git push origin develop
