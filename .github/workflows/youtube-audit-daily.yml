name: 📺 YouTube Audit (daily)

on:
  schedule:
    - cron: "0 0 * * *" # JST 09:00 daily (UTC 00:00)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: youtube-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 🧰 Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔑 Compose .env.local from secrets
        run: |
          cat > .env.local <<EOF
          GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN=${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          EOF

      - name: 🚀 Run YouTube daily audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .claude/scripts/youtube/youtube-daily-audit.mjs

      - name: ⏰ Check pause expiry / recovery judgment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        continue-on-error: true
        run: node .claude/scripts/youtube/check-pause-events.mjs

      - name: 📄 Write GitHub Step Summary
        if: always()
        run: |
          if [ -f .claude/state/metrics/youtube/LATEST.md ]; then
            cat .claude/state/metrics/youtube/LATEST.md >> $GITHUB_STEP_SUMMARY
          else
            echo "YouTube LATEST.md not generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📦 Stage metrics outputs
        run: |
          mkdir -p /tmp/youtube-publish /tmp/youtube-state
          cp -r .claude/state/metrics/youtube/* /tmp/youtube-publish/ 2>/dev/null || true
          cp .claude/state/youtube-pause.json /tmp/youtube-state/ 2>/dev/null || true
          cp .claude/state/youtube-recovery-test.json /tmp/youtube-state/ 2>/dev/null || true
          ls -la /tmp/youtube-publish /tmp/youtube-state 2>/dev/null

      - name: 📤 Publish to develop branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # .env.local は削除、working tree は /tmp/youtube-publish に退避済なのでリセット
          rm -f .env.local
          git reset --hard HEAD
          git clean -fd

          git fetch origin develop
          git checkout develop
          git pull --rebase origin develop

          mkdir -p .claude/state/metrics/youtube .claude/state
          cp -r /tmp/youtube-publish/* .claude/state/metrics/youtube/ 2>/dev/null || true
          cp /tmp/youtube-state/youtube-pause.json .claude/state/ 2>/dev/null || true
          cp /tmp/youtube-state/youtube-recovery-test.json .claude/state/ 2>/dev/null || true
          # pause.json / recovery-test.json は判定で削除される場合がある — 元 develop に存在し /tmp に無ければ削除を反映
          if [ ! -f /tmp/youtube-state/youtube-pause.json ] && [ -f .claude/state/youtube-pause.json ]; then
            rm .claude/state/youtube-pause.json
          fi
          if [ ! -f /tmp/youtube-state/youtube-recovery-test.json ] && [ -f .claude/state/youtube-recovery-test.json ]; then
            rm .claude/state/youtube-recovery-test.json
          fi

          git add .claude/state/metrics/youtube
          git add -A .claude/state/youtube-pause.json .claude/state/youtube-recovery-test.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No YouTube metrics changes to publish"
            exit 0
          fi

          git commit -m "chore(metrics): youtube daily audit $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push origin develop
