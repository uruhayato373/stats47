name: 🤖 CWV Improvement PR (weekly)

# 毎週月曜 10:00 JST、最新 [PSI Alert] Issue から違反 URL を 1 つ取得し
# generate-cwv-pr.mjs --execute で LCP 改修 draft PR を起票。
# 起票 PR は draft 必須 (LLM 改修案の正確性保証なし、人手レビュー前提)。

on:
  schedule:
    - cron: "0 1 * * 1" # JST Mon 10:00 (UTC Mon 01:00)
  workflow_dispatch:
    inputs:
      url:
        description: "違反 URL (省略時は最新 [PSI Alert] Issue から自動取得)"
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  generate-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📦 Ensure @anthropic-ai/sdk
        run: npm i --no-save @anthropic-ai/sdk

      - name: 🎯 Resolve target URL
        id: url
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.url }}" ]; then
            echo "url=${{ inputs.url }}" >> $GITHUB_OUTPUT
          else
            BODY=$(gh issue list --state open --label psi-alert --limit 1 --json body --jq '.[0].body // ""')
            URL=$(echo "$BODY" | grep -oE 'https://(www\.)?stats47\.jp[^ )"]+' | head -1)
            if [ -z "$URL" ]; then
              echo "no URL found in latest [PSI Alert] Issue, skip"
              echo "url=" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "url=$URL" >> $GITHUB_OUTPUT
          fi

      - name: 🤖 Generate CWV PR
        if: steps.url.outputs.url != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          node .claude/scripts/psi/generate-cwv-pr.mjs \
            --url "${{ steps.url.outputs.url }}" \
            --execute

      - name: 📋 Skip notice
        if: steps.url.outputs.url == ''
        run: echo "::notice::No PSI alert URL found, skipping PR generation"
