name: 📊 Generate Article Charts (validate on PR)

on:
  pull_request:
    paths:
      - 'docs/21_ブログ記事原稿/**/article.md'
      - 'docs/21_ブログ記事原稿/**/data/*.json'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: generate-article-charts-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🧰 Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🔍 Detect changed slugs
        id: slugs
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1 || true
          SLUGS=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'docs/21_ブログ記事原稿/' | \
                  awk -F/ '/^docs\/21_/ {print $2}' | sort -u)
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SLUGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "--- changed slugs ---"
          echo "$SLUGS"

      - name: 📊 Validate charts
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/validate
          {
            echo "## 📊 Article Charts Validation"
            echo
            echo "| Slug | Result |"
            echo "|---|---|"
          } > /tmp/validate/report.md
          FAIL=0
          while IFS= read -r SLUG; do
            [ -z "$SLUG" ] && continue
            if OUT=$(node .claude/scripts/blog/generate-article-charts.mjs --slug "$SLUG" --validate 2>&1); then
              echo "| \`$SLUG\` | ✅ OK |" >> /tmp/validate/report.md
            else
              FAIL=1
              echo "| \`$SLUG\` | ❌ Failed |" >> /tmp/validate/report.md
              echo "<details><summary>$SLUG log</summary>" >> /tmp/validate/report.md
              echo >> /tmp/validate/report.md
              echo '```' >> /tmp/validate/report.md
              echo "$OUT" >> /tmp/validate/report.md
              echo '```' >> /tmp/validate/report.md
              echo "</details>" >> /tmp/validate/report.md
            fi
          done <<< "${{ steps.slugs.outputs.list }}"
          echo >> /tmp/validate/report.md
          echo "_Auto-generated by \`.github/workflows/generate-article-charts.yml\`_" >> /tmp/validate/report.md
          cat /tmp/validate/report.md
          echo "fail=$FAIL" >> "$GITHUB_OUTPUT"

      - name: 📄 Write GitHub Step Summary
        if: always()
        run: cat /tmp/validate/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: 💬 Comment on PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/validate/report.md || true

      - name: 🚦 Fail job if any slug failed
        if: steps.validate.outputs.fail == '1'
        run: exit 1
